  // ── BUILD PLATFORMS ───────────────────────────────────────
  _buildPlatforms: function() {
    var lv = LEVELS[GS.levelIdx];
    var plats = [
      // ground
      { x: 0, y: GROUND_Y, w: this.levelWidth, h: H - GROUND_Y, solid: true, type: 'ground' }
    ];
    // Floating platforms — varies by theme
    var theme = lv.theme;
    var px, pw, py;
    if (theme === 'forest') {
      var fp = [[200,120,GROUND_Y-80],[400,100,GROUND_Y-120],[650,120,GROUND_Y-70],
                [900,100,GROUND_Y-100],[1100,140,GROUND_Y-90],[1400,120,GROUND_Y-130],
                [1700,100,GROUND_Y-80],[2000,140,GROUND_Y-110],[2300,120,GROUND_Y-90],
                [2600,100,GROUND_Y-130],[2900,120,GROUND_Y-80],[3200,140,GROUND_Y-110]];
      fp.forEach(function(p){plats.push({x:p[0],y:p[2],w:p[1],h:20,solid:true,type:'plat'});});
    } else if (theme === 'ocean') {
      var op = [[250,140,GROUND_Y-100],[500,120,GROUND_Y-80],[800,160,GROUND_Y-130],
                [1100,140,GROUND_Y-90],[1400,120,GROUND_Y-110],[1700,160,GROUND_Y-100],
                [2000,140,GROUND_Y-80],[2300,120,GROUND_Y-130],[2600,140,GROUND_Y-100]];
      op.forEach(function(p){plats.push({x:p[0],y:p[2],w:p[1],h:20,solid:true,type:'plat'});});
      // water strips
      plats.push({x:0,y:GROUND_Y-30,w:this.levelWidth,h:30,solid:false,type:'water'});
    } else if (theme === 'river') {
      var rp = [[300,100,GROUND_Y-90],[500,80,GROUND_Y-120],[750,100,GROUND_Y-80],
                [1000,120,GROUND_Y-110],[1300,100,GROUND_Y-90],[1600,80,GROUND_Y-130],
                [1900,100,GROUND_Y-80],[2200,120,GROUND_Y-100],[2500,100,GROUND_Y-90]];
      rp.forEach(function(p){plats.push({x:p[0],y:p[2],w:p[1],h:20,solid:true,type:'plat'});});
      plats.push({x:0,y:GROUND_Y-20,w:this.levelWidth,h:20,solid:false,type:'current'});
    } else {
      // Default: generic platforms for other themes
      var gp = [[300,120,GROUND_Y-90],[600,100,GROUND_Y-120],[900,120,GROUND_Y-80],
                [1200,140,GROUND_Y-110],[1500,120,GROUND_Y-90],[1800,100,GROUND_Y-130],
                [2100,120,GROUND_Y-80],[2400,140,GROUND_Y-100],[2700,120,GROUND_Y-90],
                [3000,100,GROUND_Y-120],[3300,140,GROUND_Y-80]];
      gp.forEach(function(p){plats.push({x:p[0],y:p[2],w:p[1],h:20,solid:true,type:'plat'});});
    }
    return plats;
  },

  // ── DRAW STATIC BACKGROUND ────────────────────────────────
  _drawBackground: function() {
    var g = this.bgL;
    var lv = LEVELS[GS.levelIdx];
    var lw = this.levelWidth;
    var theme = lv.theme;
    var i, xi, tx, ty, tw, th;

    // sky gradient (fill rects layered)
    g.fillStyle(lv.bgColor, 1);
    g.fillRect(0, 0, lw, H);
    g.fillStyle(lv.midColor, 0.5);
    g.fillRect(0, H * 0.4, lw, H * 0.6);

    // night mode: stars
    if (this.nightMode) {
      for (i = 0; i < 180; i++) {
        var sx = (i * 113) % lw;
        var sy = (i * 77) % (H * 0.5);
        var sb = 0.4 + (i % 5) * 0.12;
        g.fillStyle(0xffffff, sb);
        g.fillCircle(sx, sy, 1 + (i % 3) * 0.5);
      }
      // moon
      g.fillStyle(0xe8e8cc, 0.9);
      g.fillCircle(lw * 0.8, 60, 28);
      g.fillStyle(lv.bgColor, 0.7);
      g.fillCircle(lw * 0.8 + 10, 54, 22);
    }

    // theme-specific bg elements
    if (theme === 'forest' || theme === 'jungle' || theme === 'deepjungle') {
      // tree silhouettes
      for (i = 0; i < 40; i++) {
        tx = (i * 197) % lw;
        th = 80 + (i * 53) % 80;
        tw = 20 + (i * 17) % 20;
        var trunkCol = theme === 'forest' ? 0x2d4a1e : 0x1a2d14;
        g.fillStyle(trunkCol, 0.6);
        g.fillRect(tx, H * 0.5 - th, tw, th);
        var leafCol = theme === 'forest' ? 0x1a3d1a : 0x0d2010;
        g.fillStyle(leafCol, 0.6);
        g.fillCircle(tx + tw/2, H * 0.5 - th - 20, 28 + (i*7)%20);
      }
    } else if (theme === 'ocean') {
      // wave bands
      for (i = 0; i < 5; i++) {
        g.fillStyle(0x1a5080, 0.2 + i * 0.06);
        g.fillRect(0, GROUND_Y - 40 + i * 8, lw, 10);
      }
    } else if (theme === 'peaks') {
      // mountain silhouettes
      for (i = 0; i < 10; i++) {
        tx = (i * 400) % lw;
        th = 160 + (i * 40) % 100;
        g.fillStyle(0x2a2a3e, 0.8);
        g.fillTriangle(tx - 80, GROUND_Y, tx + 80, GROUND_Y, tx, GROUND_Y - th);
        g.fillStyle(0xe8e8f0, 0.3);
        g.fillTriangle(tx - 20, GROUND_Y - th + 20, tx + 20, GROUND_Y - th + 20, tx, GROUND_Y - th);
      }
    } else if (theme === 'volcano') {
      // magma glow at bottom
      for (i = 0; i < 5; i++) {
        g.fillStyle(0xff2200, 0.04 + i * 0.02);
        g.fillRect(0, GROUND_Y - 20 + i * 4, lw, 30);
      }
      // volcano silhouettes
      for (i = 0; i < 5; i++) {
        tx = (i * 800 + 100) % lw;
        g.fillStyle(0x330800, 0.9);
        g.fillTriangle(tx - 120, GROUND_Y, tx + 120, GROUND_Y, tx, GROUND_Y - 200);
        // crater
        g.fillStyle(0x661100, 0.8);
        g.fillRect(tx - 20, GROUND_Y - 202, 40, 10);
        g.fillStyle(0xff4400, 0.3);
        g.fillRect(tx - 10, GROUND_Y - 200, 20, 8);
      }
    }

    // Draw platforms onto background
    var self = this;
    this.platforms.forEach(function(pl) {
      if (pl.type === 'ground') {
        // ground surface
        var gc = theme === 'peaks'   ? C.snow  :
                 theme === 'volcano' ? C.lava  :
                 theme === 'ocean'   ? 0x1a5080:
                 theme === 'river' || theme === 'ocean' ? 0x1a4060 :
                 C.ground;
        g.fillStyle(gc, 1);
        g.fillRect(pl.x, pl.y, pl.w, pl.h);
        // grass strip on top
        var grassC = theme === 'peaks'   ? 0xd0d0e8 :
                     theme === 'volcano' ? 0x661100 :
                     theme === 'ocean'   ? 0x1a5080 :
                     C.grass;
        g.fillStyle(grassC, 1);
        g.fillRect(pl.x, pl.y, pl.w, 5);
      } else if (pl.type === 'plat') {
        var platC = theme === 'peaks'   ? C.snow  :
                    theme === 'volcano' ? 0x661100 :
                    theme === 'ocean'   ? 0x2a608a :
                    0x5c3d1e;
        g.fillStyle(platC, 1);
        g.fillRect(pl.x, pl.y, pl.w, pl.h);
        g.fillStyle(theme === 'peaks' ? 0xe8e8f0 : theme === 'forest' ? C.grass : C.grass, 1);
        g.fillRect(pl.x, pl.y, pl.w, 4);
      } else if (pl.type === 'water' || pl.type === 'current') {
        g.fillStyle(C.water, 0.35);
        g.fillRect(pl.x, pl.y, pl.w, pl.h);
      }
    });
  },

  // ── SPAWN ENEMIES ─────────────────────────────────────────
  _spawnEnemies: function() {
    var self = this;
    this.enemyList = [];
    var types = ['goblin','skeleton','bat','snake'];
    var t, ex, eType;
    for (var i = 0; i < 14; i++) {
      ex = 400 + i * 220;
      eType = types[i % types.length];
      this.enemyList.push({
        x: ex, y: GROUND_Y,
        vx: 0, vy: 0,
        dir: -1,
        type: eType,
        hp: 60 + GS.levelIdx * 12,
        maxHp: 60 + GS.levelIdx * 12,
        alive: true,
        patrolDx: 80,
        patrolOrigin: ex,
        aggro: false,
        aggroRange: 240,
        attackCd: 0,
        stunTimer: 0
      });
    }
    // Boss: pre-position but NOT active until player reaches end
    var lv = LEVELS[GS.levelIdx];
    this.bossMaxHp = lv.boss.hp;
    this.bossHp = lv.boss.hp;
    this.bossX = this.levelWidth - 320;
    this.bossY = GROUND_Y;
    this.bossActive = false;
  },

  // ── SETUP TOUCH ───────────────────────────────────────────
  _setupTouch: function() {
    var self = this;
    this.touchLeft  = false;
    this.touchRight = false;
    this.touchJump  = false;
    this.touchAtk   = false;
    this.touchAb1   = false;
    this.touchAb2   = false;
    this.input.on('pointerdown', function(ptr) { self._touchDown(ptr); });
    this.input.on('pointerup',   function(ptr) { self._touchUp(ptr); });
    this.input.on('pointermove', function(ptr) { self._touchMove(ptr); });
  },

  _touchDown: function(ptr) {
    var x = ptr.x, y = ptr.y;
    if (this.uiMode !== 'game') {
      this._handleUITouch(x, y, 'down');
      return;
    }
    if (x < 100 && y > 360) { this.touchLeft = true; return; }
    if (x > 100 && x < 200 && y > 360) { this.touchRight = true; return; }
    if (x > 650 && y > 380) { this.touchJump = true; this._doJump(); return; }
    if (x > 500 && x < 640 && y > 380) { this.touchAtk = true; this._doAttack(); return; }
    if (x > 650 && y < 200) { this.touchAb1 = true; this._doAbility1(); return; }
    if (x > 500 && x < 640 && y < 200) { this.touchAb2 = true; this._doAbility2(); return; }
    if (x > 350 && x < 450 && y < 60) { this._togglePause(); return; }
  },
  _touchUp: function(ptr) {
    var x = ptr.x, y = ptr.y;
    this.touchLeft  = false;
    this.touchRight = false;
    this.touchJump  = false;
    this.touchAtk   = false;
    this.touchAb1   = false;
    this.touchAb2   = false;
    this.bowCharging = false;
  },
  _touchMove: function(ptr) {
    var x = ptr.x, y = ptr.y;
    if (y > 360) {
      this.touchLeft  = x < 100;
      this.touchRight = x > 100 && x < 200;
    }
  },
  _handleUITouch: function(x, y, type) {
    // Handled by UI system via this.menuObjs / this.shopObjs etc
    var objs = this.uiMode === 'shop'    ? this.shopObjs :
               this.uiMode === 'charsel' ? this.charSelObjs :
               this.menuObjs;
    objs.forEach(function(obj) {
      if (!obj.btn) return;
      if (x >= obj.x && x <= obj.x + obj.w && y >= obj.y && y <= obj.y + obj.h) {
        if (obj.action) obj.action();
      }
    });
  },

  // ── MAIN UPDATE ───────────────────────────────────────────
  update: function(time, delta) {
    var dt = Math.min(delta / 1000, 0.05);
    var t  = time / 1000;

    this._updateKeyJustDown();

    if (this.uiMode === 'game') {
      this._updateGame(dt, t);
    }

    this._draw(t);
    this._drawUI(t);
  },

  _updateKeyJustDown: function() {
    var kk = ['up','down','left','right','z','x','q','e','r','f','p','esc','enter','space','a','d','w','s'];
    var keys = this.keys;
    var cursors = this.cursors;
    var self = this;
    var combined = {
      up:    cursors.up.isDown    || keys.w.isDown,
      down:  cursors.down.isDown  || keys.s.isDown,
      left:  cursors.left.isDown  || keys.a.isDown,
      right: cursors.right.isDown || keys.d.isDown,
      z:     keys.z.isDown, x: keys.x.isDown,
      q:     keys.q.isDown, e: keys.e.isDown,
      r:     keys.r.isDown, f: keys.f.isDown,
      p:     keys.p.isDown, esc: keys.esc.isDown,
      enter: keys.enter.isDown, space: keys.space.isDown,
      a: keys.a.isDown, d: keys.d.isDown, w: keys.w.isDown, s: keys.s.isDown
    };
    kk.forEach(function(k) {
      self.keyJustDown[k] = combined[k] && !self._ktrack[k];
      self._ktrack[k] = combined[k];
    });
    this._combined = combined;
  },

  // ── GAME LOGIC UPDATE ─────────────────────────────────────
  _updateGame: function(dt, t) {
    var ch = CHARS[GS.charId];
    var timeScale = (this.timeSlow && this.timeSlowTimer > 0) ? 0.3 : 1;
    var eff_dt = dt * timeScale;

    // timers
    this.levelTime += dt;
    if (this.timeSlow) {
      this.timeSlowTimer -= dt;
      if (this.timeSlowTimer <= 0) { this.timeSlow = false; }
    }
    if (this.ab1Cd > 0) this.ab1Cd -= dt * 1000;
    if (this.ab2Cd > 0) this.ab2Cd -= dt * 1000;
    if (this.attackCd > 0) this.attackCd -= dt;
    if (this.attackAnim > 0) this.attackAnim -= dt;
    if (this.staffCd > 0) this.staffCd -= dt;
    if (this.invincTimer > 0) this.invincTimer -= dt;
    if (this.bossAttackCd > 0) this.bossAttackCd -= eff_dt;
    if (this.sonicRoarCd > 0) this.sonicRoarCd -= dt;
    if (this.apexTimer > 0) { this.apexTimer -= dt; if (this.apexTimer <= 0) this.apexActive = false; }
    if (this.batStormTimer > 0) { this.batStormTimer -= dt; if (this.batStormTimer <= 0) this.batStorm = false; }
    if (this.notifTimer > 0) this.notifTimer -= dt;
    if (this.dialogueTimer > 0) this.dialogueTimer -= dt;
    if (this.cameraShake > 0) this.cameraShake -= dt;

    // Companion: Eryn heals
    if (GS.companion === 'eryn' && this.invincTimer <= 0) {
      GS.hp = Math.min(GS.maxHp, GS.hp + 3 * dt);
    }

    // Input — movement
    var left  = this._combined.left  || this.touchLeft;
    var right = this._combined.right || this.touchRight;

    var spd = ch.speed * (GS.mount ? MOUNTS[GS.mount].speedMul : 1);

    if (left)  { this.pvx = -spd; this.pDir = -1; }
    else if (right) { this.pvx = spd; this.pDir = 1; }
    else { this.pvx *= 0.8; }

    // River current
    var onCurrent = false;
    this.platforms.forEach(function(pl) {
      if (pl.type === 'current') {
        // push player right
        onCurrent = true;
      }
    });
    if (onCurrent && this.py >= GROUND_Y - 25) {
      this.pvx += 60 * eff_dt;
    }

    // Jump input
    if (this.keyJustDown.up || this.keyJustDown.z) { this._doJump(); }
    if (this.keyJustDown.space) { this._doJump(); }

    // Attack input
    if (this.keyJustDown.x) { this._doAttack(); }
    if (this.keyJustDown.q) { this._doAbility1(); }
    if (this.keyJustDown.e) { this._doAbility2(); }
    if (this.keyJustDown.p || this.keyJustDown.esc) { this._togglePause(); }
    if (this.keyJustDown.enter) { this._doInteract(); }

    // Bow hold charge
    if (GS.weapon === 'bow' && this._combined.x) {
      this.bowCharging = true;
      this.bowCharge = Math.min(1, this.bowCharge + dt * 0.8);
    } else if (this.bowCharging && !this._combined.x) {
      if (this.bowCharge > 0.1) { this._firePowerShot(); }
      this.bowCharging = false;
      this.bowCharge = 0;
    }

    // Shield block
    this.blockActive = (GS.weapon === 'shield') && this._combined.s;

    // Apply physics
    var jumpMul = ch.jumpPow * (GS.mount ? MOUNTS[GS.mount].jumpMul : 1);
    this.pvy += GRAVITY * eff_dt;
    this.px  += this.pvx * eff_dt;
    this.py  += this.pvy * eff_dt;

    // Float characters hover
    var floatTarget = GROUND_Y - ch.floatY;
    if (ch.floatY > 0 && this.py > floatTarget && this.pvy > 0) {
      this.py = floatTarget;
      this.pvy = 0;
      this.onGround = true;
      this.hasDoubleJump = true;
    }

    // Collision with platforms
    this.onGround = false;
    var self = this;
    this.platforms.forEach(function(pl) {
      if (!pl.solid) return;
      if (self.px + 12 > pl.x && self.px - 12 < pl.x + pl.w) {
        if (self.py > pl.y && self.py < pl.y + pl.h && self.pvy >= 0) {
          // Only land if coming from above
          if (self.py - self.pvy * eff_dt <= pl.y + 2) {
            self.py = pl.y;
            self.pvy = 0;
            self.onGround = true;
            self.hasDoubleJump = true;
          }
        }
      }
    });

    // Clamp player to level
    this.px = clamp(this.px, 20, this.levelWidth - 20);
    if (this.py > H + 60) {
      // Fell off — respawn
      this.py = GROUND_Y;
      this.pvy = 0;
      GS.hp -= 15;
      this._showNotif('Fell off! -15 HP');
      if (GS.hp <= 0) { this._triggerGameOver(); return; }
    }

    // Scroll camera
    var targetScroll = this.px - W / 3;
    this.scrollX = clamp(targetScroll, 0, this.levelWidth - W);
    this.cameras.main.setScrollX(this.scrollX);
    if (this.cameraShake > 0) {
      var shk = Math.sin(this.levelTime * 40) * 4 * this.cameraShake;
      this.cameras.main.setScrollX(this.scrollX + shk);
    }

    // Update enemies
    this._updateEnemies(eff_dt, t);

    // Update boss
    if (this.bossActive) { this._updateBoss(eff_dt, t); }

    // Update projectiles
    this._updateProjectiles(eff_dt, t);

    // Update particles
    updateParticles(dt);

    // Shadow clone follows
    if (this.shadowClone) {
      this.shadowClone.x = lerp(this.shadowClone.x, this.px - this.pDir * 40, dt * 4);
      this.shadowClone.y = this.py;
      this.shadowClone.timer -= dt;
      if (this.shadowClone.timer <= 0) this.shadowClone = null;
    }

    // Online: send position
    if (GS.online && SB_CHANNEL) {
      this.sbSendTick += dt * 1000;
      if (this.sbSendTick > SB_SEND_INTERVAL) {
        this.sbSendTick = 0;
        sbSend('pos', { x: Math.round(this.px), y: Math.round(this.py), dir: this.pDir, charId: GS.charId });
        if (GS.isHost) {
          sbSend('enemy_sync', { enemies: self._serializeEnemies(), bossHp: self.bossHp });
        }
      }
    }

    // Boss reach end trigger (boss encounter at end of level)
    if (this.px > this.levelWidth - 450 && !this.bossTriggered) {
      this.bossTriggered = true;
      this.bossActive = true;
      sfxBoss();
      this._showNotif(LEVELS[GS.levelIdx].boss.name + ' approaches!');
    }

    // Check win condition
    if (this.bossTriggered && !this.bossActive && this.px > this.levelWidth - 80) {
      this._triggerLevelComplete();
    }
  },

  _doJump: function() {
    var ch = CHARS[GS.charId];
    var jumpMul = ch.jumpPow * (GS.mount ? MOUNTS[GS.mount].jumpMul : 1);
    if (this.onGround) {
      this.pvy = JUMP_VEL * jumpMul;
      this.onGround = false;
      sfxJump();
    } else if (this.hasDoubleJump) {
      this.pvy = DOUBLE_JUMP_VEL * jumpMul;
      this.hasDoubleJump = false;
      sfxJump();
      spawnHitParticles(this.px, this.py, 0x80b0ff);
    }
  },

  _doAttack: function() {
    if (this.attackCd > 0) return;
    var wpn = WEAPONS[GS.weapon];
    var ch = CHARS[GS.charId];
    var dmg = wpn.dmg;

    // Weapon affinity
    var native = ch.nativeWeapons || [];
    var weak   = ch.weakWeapons   || [];
    if (native.indexOf(GS.weapon) >= 0) dmg = Math.round(dmg * 1.3);
    if (weak.indexOf(GS.weapon) >= 0)   dmg = Math.round(dmg * 0.7);
    // Marcel: electric coating
    if (ch.id === 'marcel') dmg = Math.round(dmg * 1.1);

    if (GS.weapon === 'sword') {
      this.attackCd = 0.4;
      this.attackAnim = 0.25;
      sfxHit();
      this._meleeHit(dmg, 80);
    } else if (GS.weapon === 'axe') {
      if (this._combined.x || this.touchAtk) {
        // Hold to throw
        if (!this.thrownAxe) {
          this.thrownAxe = {
            x: this.px, y: this.py - 20,
            vx: this.pDir * 380, vy: -100,
            dmg: dmg, returning: false,
            owner: GS.charId
          };
          sfxAxe();
          this.attackCd = 0.8;
        }
      } else {
        this.attackCd = 0.45;
        this.attackAnim = 0.3;
        sfxHit();
        this._meleeHit(dmg, 70);
      }
    } else if (GS.weapon === 'bow') {
      if (!this.bowCharging) {
        this.attackCd = 0.5;
        sfxArrow();
        this.projectiles.push({
          type: 'arrow', x: this.px, y: this.py - 20,
          vx: this.pDir * 400, vy: 0, dmg: dmg,
          charge: 0, life: 2.5, stun: false
        });
      }
    } else if (GS.weapon === 'staff') {
      if (this.staffCd <= 0) {
        this.staffCd = 0.7;
        sfxStaff();
        // Find nearest enemy as homing target
        var target = this._nearestEnemy(this.px, this.py);
        this.projectiles.push({
          type: 'staff_orb', x: this.px, y: this.py - 24,
          vx: this.pDir * 180, vy: -60,
          dmg: dmg, life: 4, target: target,
          chain: ch.id === 'liam' // Liam staff chains
        });
      }
    } else if (GS.weapon === 'shield') {
      this.attackCd = 0.6;
      sfxBlock();
      this._meleeHit(Math.round(dmg * 0.5), 50);
    }
  },

  _meleeHit: function(dmg, range) {
    var self = this;
    var hitX = this.px + this.pDir * range * 0.5;
    var hitRange = range;

    this.enemyList.forEach(function(en) {
      if (!en.alive) return;
      if (Math.abs(en.x - hitX) < hitRange && Math.abs(en.y - self.py) < 60) {
        en.hp -= dmg;
        spawnHitParticles(en.x, en.y - 20, 0xff4444);
        sfxHit();
        en.stunTimer = 0.3;
        en.vx = self.pDir * 120;
        if (en.hp <= 0) { self._killEnemy(en); }
      }
    });

    // Boss melee
    if (this.bossActive && Math.abs(this.bossX - this.px) < 120 && Math.abs(this.bossY - this.py) < 120) {
      this._damageBoss(dmg);
    }
  },

  _firePowerShot: function() {
    var ch = CHARS[GS.charId];
    var dmg = WEAPONS.bow.dmg;
    if (ch.id === 'levi') dmg = Math.round(dmg * 1.3); // native
    var count = ch.id === 'levi' ? 5 : 3;
    sfxArrow();
    for (var i = 0; i < count; i++) {
      this.projectiles.push({
        type: 'arrow', x: this.px, y: this.py - 20,
        vx: this.pDir * (380 + i * 20), vy: (i - 1) * 40,
        dmg: Math.round(dmg * 1.8), charge: this.bowCharge,
        life: 2, stun: true
      });
    }
  },

  _nearestEnemy: function(x, y) {
    var best = null;
    var bestD = 99999;
    this.enemyList.forEach(function(en) {
      if (!en.alive) return;
      var d = Math.abs(en.x - x) + Math.abs(en.y - y);
      if (d < bestD) { bestD = d; best = en; }
    });
    if (this.bossActive) {
      var bd = Math.abs(this.bossX - x) + Math.abs(this.bossY - y);
      if (bd < bestD) best = { x: this.bossX, y: this.bossY, _isBoss: true };
    }
    return best;
  },

  _doAbility1: function() {
    var ch = CHARS[GS.charId];
    if (this.ab1Cd > 0) return;
    this.ab1Cd = ch.ab1Cd;
    sfxAbility();

    if (ch.id === 'alvano') {
      // Shadow dash
      sfxDash();
      var dashX = this.pDir * 200;
      this.invincTimer = 0.4;
      this.px += dashX;
      spawnHitParticles(this.px - dashX, this.py - 20, 0x6b4c8a);
      this._showNotif('Shadow Dash!');
    } else if (ch.id === 'liam') {
      // Teleport
      if (this.teleportCharges > 0) {
        this.teleportCharges--;
        var tpX = this.px + this.pDir * 280;
        tpX = clamp(tpX, 20, this.levelWidth - 20);
        spawnHitParticles(this.px, this.py - 20, 0x80b0ff);
        this.px = tpX;
        spawnHitParticles(this.px, this.py - 20, 0x80b0ff);
        sfxMagic();
        this._showNotif('Teleport! (' + this.teleportCharges + ' left)');
        if (this.teleportCharges > 0) this.ab1Cd = 0; // no cd while charges remain
      } else {
        this._showNotif('No teleport charges!');
        this.ab1Cd = 0;
      }
    } else if (ch.id === 'levi') {
      // Vine snare
      this.vineSnare = { x: this.px + this.pDir * 120, y: this.py, timer: 3 };
      this._showNotif('Vine Snare!');
      this._applyVineSnare();
    } else if (ch.id === 'kingroar') {
      // Sonic roar
      sfxRoar();
      this._showNotif('Sonic Roar!');
      var self = this;
      this.enemyList.forEach(function(en) {
        if (!en.alive) return;
        if (Math.abs(en.x - self.px) < 300) {
          var roarDmg = 40 + GS.levelIdx * 5;
          en.hp -= roarDmg;
          en.vx = self.pDir * 200;
          en.stunTimer = 0.8;
          spawnHitParticles(en.x, en.y - 20, 0xffcc44);
          if (en.hp <= 0) self._killEnemy(en);
        }
      });
      if (this.bossActive && Math.abs(this.bossX - this.px) < 300) {
        this._damageBoss(35 + GS.levelIdx * 4);
      }
    } else if (ch.id === 'vampirina') {
      // Bat storm
      this.batStorm = true;
      this.batStormTimer = 4;
      this._showNotif('Bat Storm!');
    } else if (ch.id === 'marcel') {
      // Thunder dash
      sfxThunder();
      var tdX = this.pDir * 240;
      this.invincTimer = 0.5;
      var oldX = this.px;
      this.px += tdX;
      this.px = clamp(this.px, 20, this.levelWidth - 20);
      // Electric damage along path
      var self2 = this;
      this.enemyList.forEach(function(en) {
        if (!en.alive) return;
        var minX = Math.min(oldX, self2.px);
        var maxX = Math.max(oldX, self2.px);
        if (en.x >= minX - 20 && en.x <= maxX + 20) {
          en.hp -= 30;
          en.stunTimer = 0.4;
          spawnHitParticles(en.x, en.y - 20, 0xffee44);
          sfxStun();
          if (en.hp <= 0) self2._killEnemy(en);
        }
      });
      spawnHitParticles(oldX, this.py - 20, 0xffee44);
      this._showNotif('Thunder Dash!');
    }
  },

  _doAbility2: function() {
    var ch = CHARS[GS.charId];
    if (this.ab2Cd > 0) return;
    this.ab2Cd = ch.ab2Cd;
    sfxAbility();

    if (ch.id === 'alvano') {
      // Shadow clone
      this.shadowClone = { x: this.px, y: this.py, dir: -this.pDir, timer: 6 };
      this._showNotif('Shadow Clone!');
    } else if (ch.id === 'liam') {
      // Time slow
      this.timeSlow = true;
      this.timeSlowTimer = 5;
      sfxMagic();
      this._showNotif('Time Slow! (5s)');
    } else if (ch.id === 'levi') {
      // Nature's fury — falling trunks
      sfxAbility();
      this._showNotif("Nature's Fury!");
      var self = this;
      for (var i = 0; i < 4; i++) {
        (function(ii) {
          var tx = self.px + self.pDir * (80 + ii * 60);
          setTimeout(function() {
            if (!self.scene) return;
            // Trunk falls — deal damage at that X
            self.enemyList.forEach(function(en) {
              if (!en.alive) return;
              if (Math.abs(en.x - tx) < 40) {
                en.hp -= 55;
                spawnHitParticles(en.x, en.y - 20, 0x3d7a3d);
                if (en.hp <= 0) self._killEnemy(en);
              }
            });
            if (self.bossActive && Math.abs(self.bossX - tx) < 60) { self._damageBoss(50); }
            spawnHitParticles(tx, self.bossY - 20, 0x4a9f4a);
            self.cameraShake = 0.3;
          }, ii * 200);
        })(i);
      }
    } else if (ch.id === 'kingroar') {
      // Apex predator
      this.apexActive = true;
      this.apexTimer = 6;
      this._showNotif('Apex Predator! (6s)');
    } else if (ch.id === 'vampirina') {
      // Drain life
      sfxAbility();
      this._showNotif('Drain Life!');
      var self2 = this;
      var drainDmg = 50;
      var heal = 0;
      this.enemyList.forEach(function(en) {
        if (!en.alive) return;
        if (Math.abs(en.x - self2.px) < 200) {
          en.hp -= drainDmg;
          heal += 25;
          spawnHitParticles(en.x, en.y - 20, 0xff44ff);
          if (en.hp <= 0) self2._killEnemy(en);
        }
      });
      if (this.bossActive && Math.abs(this.bossX - this.px) < 200) {
        this._damageBoss(40);
        heal += 20;
      }
      GS.hp = Math.min(GS.maxHp, GS.hp + heal);
      if (heal > 0) this._showNotif('Drained ' + heal + ' HP!');
    } else if (ch.id === 'marcel') {
      // Thunderstorm — 5 lightning bolts
      sfxThunder();
      this._showNotif('Thunderstorm!');
      var self3 = this;
      for (var j = 0; j < 5; j++) {
        (function(jj) {
          var bx = self3.px + (jj - 2) * 100 + self3.pDir * 80;
          self3.projectiles.push({
            type: 'thunder_bolt', x: bx, y: 0,
            vx: 0, vy: 600, dmg: 45, life: 1,
            triggerX: bx
          });
        })(j);
      }
      this.cameraShake = 0.4;
    }
  },

  _applyVineSnare: function() {
    if (!this.vineSnare) return;
    var vx = this.vineSnare.x;
    var vy = this.vineSnare.y;
    this.enemyList.forEach(function(en) {
      if (!en.alive) return;
      if (Math.abs(en.x - vx) < 60 && Math.abs(en.y - vy) < 60) {
        en.stunTimer = 3;
        spawnHitParticles(en.x, en.y - 10, 0x3d7a3d);
      }
    });
  },

  _togglePause: function() {
    if (this.uiMode === 'pause') {
      this.uiMode = 'game';
    } else if (this.uiMode === 'game') {
      this.uiMode = 'pause';
    }
  },

  _doInteract: function() {
    // Shop trigger at end of level
    if (!this.bossActive && this.px > this.levelWidth - 200) {
      this.uiMode = 'shop';
      sfxShop();
    }
  },

  _serializeEnemies: function() {
    return this.enemyList.map(function(en) {
      return { x: Math.round(en.x), y: Math.round(en.y), hp: en.hp, alive: en.alive };
    });
  },

  // ── ENEMY UPDATE ─────────────────────────────────────────
  _updateEnemies: function(dt, t) {
    var self = this;
    var ch = CHARS[GS.charId];
    var ignDmg = GS.companion === 'ignar' ? 5 * dt : 0;

    this.enemyList.forEach(function(en) {
      if (!en.alive) return;
      if (en.stunTimer > 0) { en.stunTimer -= dt; return; }

      // Ignar fire aura
      if (ignDmg > 0 && Math.abs(en.x - self.px) < 80) {
        en.hp -= ignDmg;
        if (en.hp <= 0) { self._killEnemy(en); return; }
      }

      // Vine snare
      if (self.vineSnare && Math.abs(en.x - self.vineSnare.x) < 60) { return; }

      var dx = self.px - en.x;
      en.aggro = Math.abs(dx) < en.aggroRange;

      if (en.aggro) {
        en.dir = dx > 0 ? 1 : -1;
        en.vx  = en.dir * (80 + GS.levelIdx * 10);
        // Night mode speed bonus
        if (self.nightMode) en.vx *= 1.3;
      } else {
        // Patrol
        en.x += en.dir * 50 * dt;
        if (en.x > en.patrolOrigin + en.patrolDx) en.dir = -1;
        if (en.x < en.patrolOrigin - en.patrolDx) en.dir = 1;
        en.vx = 0;
      }

      // Bat floats
      if (en.type === 'bat') {
        en.vy = Math.sin(t * 3 + en.x * 0.01) * 60;
        en.y = clamp(en.y + en.vy * dt, GROUND_Y - 120, GROUND_Y - 20);
      } else {
        en.vy += GRAVITY * dt;
        en.y  += en.vy * dt;
        if (en.y >= GROUND_Y) { en.y = GROUND_Y; en.vy = 0; }
      }
      en.x += en.vx * dt;

      // Attack player
      if (en.attackCd > 0) { en.attackCd -= dt; }
      if (Math.abs(en.x - self.px) < 50 && Math.abs(en.y - self.py) < 60 && en.attackCd <= 0) {
        en.attackCd = 1.2;
        if (self.invincTimer <= 0 && !self.blockActive) {
          var dmg = 10 + GS.levelIdx * 4;
          if (self.nightMode) dmg = Math.round(dmg * 1.2);
          var def = (ARMOURS[GS.armour] || { def: 0 }).def;
          dmg = Math.max(1, dmg - def);
          GS.hp -= dmg;
          self.invincTimer = 0.6;
          self.cameraShake = 0.2;
          spawnHitParticles(self.px, self.py - 20, 0xff4444);
          sfxHit();
          if (GS.hp <= 0) { self._triggerGameOver(); }
        } else if (self.blockActive) {
          sfxBlock();
          spawnHitParticles(self.px, self.py - 20, 0x6688aa);
        }
      }
    });

    // Vine snare tick
    if (this.vineSnare) {
      this.vineSnare.timer -= dt;
      if (this.vineSnare.timer <= 0) this.vineSnare = null;
    }

    // Bat storm
    if (this.batStorm && this.batStormTimer > 0) {
      this.enemyList.forEach(function(en) {
        if (!en.alive) return;
        if (Math.abs(en.x - self.px) < 180) {
          en.hp -= 20 * dt;
          if (en.hp <= 0) self._killEnemy(en);
        }
      });
      if (this.bossActive && Math.abs(this.bossX - this.px) < 200) {
        this._damageBoss(15 * dt);
      }
    }

    // Apex predator bonus attack
    if (this.apexActive) {
      this.enemyList.forEach(function(en) {
        if (!en.alive) return;
        if (Math.abs(en.x - self.px) < 100) {
          en.hp -= 60 * dt;
          if (en.hp <= 0) self._killEnemy(en);
        }
      });
    }
  },

  _killEnemy: function(en) {
    en.alive = false;
    en.hp = 0;
    spawnXpParticles(en.x, en.y - 20);
    var xpGain = 15 + GS.levelIdx * 5;
    if (this.nightMode) xpGain = Math.round(xpGain * 1.5);
    GS.xp += xpGain;
    GS.gold += 8 + GS.levelIdx * 2;
    sfxXp();
    this._showNotif('+' + xpGain + ' XP');
  },

  // ── BOSS UPDATE ──────────────────────────────────────────
  _updateBoss: function(dt, t) {
    if (this.bossHp <= 0) {
      this.bossActive = false;
      spawnXpParticles(this.bossX, this.bossY - 60);
      GS.xp += 200 + GS.levelIdx * 50;
      GS.gold += 80 + GS.levelIdx * 20;
      sfxLevelUp();
      this.cameraShake = 0.6;
      this._showNotif(LEVELS[GS.levelIdx].boss.name + ' defeated! +200 XP');
      return;
    }

    // Phase based on HP
    var hpFrac = this.bossHp / this.bossMaxHp;
    this.bossPhase = hpFrac < 0.33 ? 2 : hpFrac < 0.66 ? 1 : 0;

    // Boss AI: move toward player
    var dx = this.px - this.bossX;
    var bspd = (80 + GS.levelIdx * 15) * (this.bossPhase === 2 ? 1.5 : 1);
    this.bossDir = dx > 0 ? 1 : -1;
    this.bossX += this.bossDir * bspd * dt;
    this.bossX = clamp(this.bossX, 100, this.levelWidth - 100);

    // Boss attack
    if (this.bossAttackCd <= 0) {
      this.bossAttackCd = 1.8 - this.bossPhase * 0.4;
      if (Math.abs(this.bossX - this.px) < 130) {
        // Melee hit
        if (this.invincTimer <= 0 && !this.blockActive) {
          var def = (ARMOURS[GS.armour] || { def: 0 }).def;
          var bdmg = Math.max(1, LEVELS[GS.levelIdx].boss.dmg - def);
          if (this.bossPhase === 2) bdmg = Math.round(bdmg * 1.5);
          GS.hp -= bdmg;
          this.invincTimer = 0.5;
          this.cameraShake = 0.35;
          spawnHitParticles(this.px, this.py - 20, 0xff4444);
          sfxHit();
          if (GS.hp <= 0) this._triggerGameOver();
        }
      } else {
        // Ranged attack (projectile toward player)
        var ang2 = Math.atan2(this.py - this.bossY, this.px - this.bossX);
        var bspeed = 200 + GS.levelIdx * 20;
        this.projectiles.push({
          type: 'boss_shot', x: this.bossX, y: this.bossY - 60,
          vx: Math.cos(ang2) * bspeed, vy: Math.sin(ang2) * bspeed - 80,
          dmg: Math.round(LEVELS[GS.levelIdx].boss.dmg * 0.7),
          life: 3, owner: 'boss'
        });
      }
    }
  },

  _damageBoss: function(dmg) {
    if (!this.bossActive) return;
    this.bossHp -= dmg;
    spawnHitParticles(this.bossX, this.bossY - 60, 0xff4444);
    sfxHit();
    this.cameraShake = 0.2;
    if (this.bossHp <= 0) this.bossHp = 0;
  },

  // ── PROJECTILE UPDATE ────────────────────────────────────
  _updateProjectiles: function(dt, t) {
    var self = this;
    var ch = CHARS[GS.charId];

    // Thrown axe
    if (this.thrownAxe) {
      var ax = this.thrownAxe;
      ax.x += ax.vx * dt;
      ax.y += ax.vy * dt;
      ax.vy += GRAVITY * 0.4 * dt;

      // Levi: axe returns faster; Marcel: axe crackles
      var returnSpeed = ch.id === 'levi' ? 480 : 360;

      if (!ax.returning && (ax.x > this.px + 300 || ax.x < 20 || ax.x > this.levelWidth - 20)) {
        ax.returning = true;
        ax.vx = 0; ax.vy = 0;
      }
      if (ax.returning) {
        var adx = this.px - ax.x;
        var ady = (this.py - 20) - ax.y;
        var alen = Math.sqrt(adx*adx + ady*ady);
        if (alen < 20) { this.thrownAxe = null; }
        else {
          ax.vx = (adx / alen) * returnSpeed;
          ax.vy = (ady / alen) * returnSpeed;
          ax.x += ax.vx * dt;
          ax.y += ax.vy * dt;
        }
      }

      // Axe hits enemies
      if (ax) {
        this.enemyList.forEach(function(en) {
          if (!en.alive) return;
          if (Math.abs(en.x - ax.x) < 24 && Math.abs(en.y - ax.y) < 24) {
            en.hp -= ax.dmg;
            spawnHitParticles(en.x, en.y - 10, 0x808090);
            if (ch.id === 'marcel') sfxThunder();
            else sfxHit();
            en.stunTimer = 0.25;
            if (en.hp <= 0) self._killEnemy(en);
          }
        });
        if (this.bossActive && Math.abs(this.bossX - ax.x) < 50 && Math.abs(this.bossY - ax.y) < 80) {
          this._damageBoss(ax.dmg);
        }
      }
    }

    // Other projectiles
    var toRemove = [];
    this.projectiles.forEach(function(p, i) {
      p.life -= dt;
      if (p.life <= 0) { toRemove.push(i); return; }

      // Staff orb homing
      if (p.type === 'staff_orb' && p.target) {
        var tdx = p.target.x - p.x;
        var tdy = (p.target.y - 40) - p.y;
        var tlen = Math.sqrt(tdx*tdx+tdy*tdy);
        if (tlen > 10) {
          p.vx = lerp(p.vx, (tdx/tlen)*220, dt*3);
          p.vy = lerp(p.vy, (tdy/tlen)*220, dt*3);
        }
      }

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // Gravity on arrows
      if (p.type === 'arrow') p.vy += 120 * dt;

      // Thunder bolt falls
      if (p.type === 'thunder_bolt') {
        if (p.y >= GROUND_Y) {
          spawnHitParticles(p.x, GROUND_Y, 0xffee44);
          self.cameraShake = 0.25;
          // Hit enemies
          self.enemyList.forEach(function(en) {
            if (!en.alive) return;
            if (Math.abs(en.x - p.x) < 50) {
              en.hp -= p.dmg;
              en.stunTimer = 0.5;
              if (en.hp <= 0) self._killEnemy(en);
            }
          });
          if (self.bossActive && Math.abs(self.bossX - p.x) < 70) self._damageBoss(p.dmg);
          toRemove.push(i);
          return;
        }
      }

      // Player projectile hits enemies
      if (p.owner !== 'boss') {
        self.enemyList.forEach(function(en) {
          if (!en.alive) return;
          if (Math.abs(en.x - p.x) < 20 && Math.abs(en.y - p.y) < 30) {
            en.hp -= p.dmg;
            spawnHitParticles(en.x, en.y - 10, 0xff8844);
            sfxHit();
            if (p.stun) { en.stunTimer = 1.5; sfxStun(); }
            if (en.hp <= 0) self._killEnemy(en);
            // Staff chain (Liam)
            if (!p.chain) toRemove.push(i);
          }
        });
        if (self.bossActive && Math.abs(self.bossX - p.x) < 50 && Math.abs(self.bossY - p.y) < 80) {
          self._damageBoss(p.dmg);
          toRemove.push(i);
        }
      } else {
        // Boss shot hits player
        if (Math.abs(p.x - self.px) < 22 && Math.abs(p.y - self.py) < 36) {
          if (self.invincTimer <= 0 && !self.blockActive) {
            var def = (ARMOURS[GS.armour] || { def: 0 }).def;
            var d = Math.max(1, p.dmg - def);
            GS.hp -= d;
            self.invincTimer = 0.5;
            self.cameraShake = 0.3;
            spawnHitParticles(self.px, self.py - 20, 0xff4444);
            sfxHit();
            if (GS.hp <= 0) self._triggerGameOver();
          }
          toRemove.push(i);
        }
      }
    });

    // Remove dead projectiles (reverse order)
    toRemove.sort(function(a,b){return b-a;}).forEach(function(i) {
      self.projectiles.splice(i, 1);
    });
  },

  // ── TRIGGER STATES ───────────────────────────────────────
  _triggerGameOver: function() {
    GS.hp = 0;
    sfxDie();
    this.uiMode = 'gameover';
  },

  _triggerLevelComplete: function() {
    if (this.uiMode === 'win') return;
    this.uiMode = 'win';
    sfxLevelUp();
    GS.save();
    this._showNotif('Chapter complete!');
  },

  _showNotif: function(msg) {
    this.notification = msg;
    this.notifTimer = 2.5;
  },

  // ── ONLINE EVENTS ────────────────────────────────────────
  _handleSBEvent: function(payload) {
    var ev = payload.event;
    var d  = payload.payload;
    if (ev === 'pos') {
      this.remoteX = d.x;
      this.remoteY = d.y;
    } else if (ev === 'attack') {
      if (GS.isHost) {
        // apply damage to enemy
        var en = this.enemyList[d.idx];
        if (en && en.alive) {
          en.hp -= d.dmg;
          if (en.hp <= 0) this._killEnemy(en);
        }
      }
    } else if (ev === 'enemy_sync' && !GS.isHost) {
      var synced = d.enemies;
      for (var i = 0; i < synced.length && i < this.enemyList.length; i++) {
        if (!synced[i].alive) this.enemyList[i].alive = false;
        else {
          this.enemyList[i].x  = lerp(this.enemyList[i].x, synced[i].x, 0.3);
          this.enemyList[i].hp = synced[i].hp;
        }
      }
      this.bossHp = d.bossHp;
    }
  },

  // ============================================================
  //  DRAW ROUTINES
  // ============================================================
  _draw: function(t) {
    var self = this;

    // ── fx layer: particles, vine, shadow, weather ──────────
    this.fxL.clear();

    // Night mode: darkness vignette (fill only)
    if (this.nightMode) {
      this.fxL.fillStyle(0x000010, 0.45);
      this.fxL.fillRect(this.scrollX, 0, W, H);
      // Torch around player
      this.fxL.fillStyle(0xffaa44, 0.08);
      this.fxL.fillCircle(this.px, this.py - 20, 160);
    }

    // Time slow tint
    if (this.timeSlow && this.timeSlowTimer > 0) {
      this.fxL.fillStyle(0x4060c0, 0.08);
      this.fxL.fillRect(this.scrollX, 0, W, H);
    }

    // Vine snare
    if (this.vineSnare) {
      for (var vi = 0; vi < 6; vi++) {
        this.fxL.fillStyle(0x3d7a3d, 0.8);
        this.fxL.fillCircle(
          this.vineSnare.x + Math.sin(vi * 1.05) * 12,
          this.vineSnare.y - vi * 6,
          4
        );
      }
    }

    // Bat storm aura
    if (this.batStorm) {
      for (var bi = 0; bi < 8; bi++) {
        var bang = bi / 8 * Math.PI * 2 + t * 4;
        this.fxL.fillStyle(0x440033, 0.5);
        this.fxL.fillCircle(
          this.px + Math.cos(bang) * 80,
          this.py - 20 + Math.sin(bang) * 40,
          6
        );
      }
    }

    // Projectiles
    this.projectiles.forEach(function(p) {
      drawProjectile(self.fxL, p.type, p.x, p.y, p.vx > 0 ? 1 : -1, p.charge, t);
    });

    // Thrown axe
    if (this.thrownAxe) {
      drawProjectile(self.fxL, 'thrown_axe', this.thrownAxe.x, this.thrownAxe.y, this.thrownAxe.vx > 0 ? 1 : -1, 0, t);
    }

    // Particles
    drawParticles(this.fxL);

    // Volcano: falling rocks
    if (LEVELS[GS.levelIdx].theme === 'volcano') {
      for (var ri = 0; ri < 4; ri++) {
        var rvx = this.scrollX + (ri * 200 + (t * 80 + ri * 60) % W);
        var rvy = (t * 120 + ri * 80) % (H + 20) - 10;
        this.fxL.fillStyle(0x661100, 0.7);
        this.fxL.fillCircle(rvx, rvy, 6 + ri * 2);
        this.fxL.fillStyle(0xff4400, 0.4);
        this.fxL.fillCircle(rvx - 2, rvy - 2, 3 + ri);
      }
    }

    // ── character layer ──────────────────────────────────────
    this.chL.clear();

    // Remote player (online)
    if (GS.online) {
      this.remoteLerpX = lerp(this.remoteLerpX, this.remoteX, 0.25);
      this.remoteLerpY = lerp(this.remoteLerpY, this.remoteY, 0.25);
      // Draw as a tinted ghost
      this.chL.fillStyle(0x88aaff, 0.5);
      this.chL.fillRect(this.remoteLerpX - 10, this.remoteLerpY - 48, 20, 48);
      this.chL.fillStyle(0xaabbff, 0.6);
      this.chL.fillRect(this.remoteLerpX - 6, this.remoteLerpY - 56, 12, 12);
    }

    // Shadow clone
    if (this.shadowClone) {
      this.chL.fillStyle(0x4a2066, 0.4);
      drawAlvano(this.chL, this.shadowClone.x, this.shadowClone.y, this.shadowClone.dir, t);
    }

    // Mount
    if (GS.mount) {
      drawMount(this.chL, GS.mount, this.px, this.py, t);
    }

    // Companion (offset to side)
    if (GS.companion) {
      drawCompanion(this.chL, GS.companion, this.px - this.pDir * 48, this.py - 4, t);
    }

    // Player
    var ch = CHARS[GS.charId];
    var playerY = this.py - (GS.mount ? 28 : 0);

    // Invincibility flash
    var drawPlayer = true;
    if (this.invincTimer > 0 && Math.floor(this.invincTimer * 12) % 2 === 0) drawPlayer = false;

    if (drawPlayer) {
      if (ch.id === 'alvano')    drawAlvano(this.chL, this.px, playerY, this.pDir, t);
      else if (ch.id === 'liam') drawLiam(this.chL, this.px, playerY, this.pDir, t);
      else if (ch.id === 'levi') drawLevi(this.chL, this.px, playerY, this.pDir, t);
      else if (ch.id === 'kingroar') drawKingRoar(this.chL, this.px, playerY, this.pDir, t);
      else if (ch.id === 'vampirina') drawVampirina(this.chL, this.px, playerY, this.pDir, t);
      else if (ch.id === 'marcel') drawMarcel(this.chL, this.px, playerY, this.pDir, t);

      drawWeaponHeld(this.chL, GS.weapon, this.px, playerY, this.pDir, t);
    }

    // Apex predator glow
    if (this.apexActive) {
      this.chL.fillStyle(0xffcc44, 0.15 + Math.sin(t*6)*0.08);
      this.chL.fillCircle(this.px, this.py - 24, 36);
    }

    // Enemies
    this.enemyList.forEach(function(en) {
      if (!en.alive) return;
      drawEnemy(self.chL, en.type, en.x, en.y, en.hp, en.maxHp, t);
    });

    // Boss
    if (this.bossActive) {
      drawBoss(this.chL, GS.levelIdx, this.bossX, this.bossY, this.bossHp, this.bossMaxHp, t);
    }

    // Attack swing arc (fill only)
    if (this.attackAnim > 0 && GS.weapon !== 'bow' && GS.weapon !== 'staff') {
      var swingAlpha = this.attackAnim / 0.3;
      this.chL.fillStyle(0xffffff, swingAlpha * 0.25);
      this.chL.fillEllipse(
        this.px + this.pDir * 36, playerY - 20,
        72, 36
      );
    }
  },

  // ── HUD DRAW ─────────────────────────────────────────────
  _drawUI: function(t) {
    this.huL.clear();
    this.paL.clear();

    if (this.uiMode === 'game') {
      this._drawHUD(t);
    } else if (this.uiMode === 'pause') {
      this._drawHUD(t);
      this._drawPauseOverlay(t);
    } else if (this.uiMode === 'shop') {
      this._drawShop(t);
    } else if (this.uiMode === 'gameover') {
      this._drawGameOver(t);
    } else if (this.uiMode === 'win') {
      this._drawWin(t);
    }
  },

  _drawHUD: function(t) {
    var g = this.huL;
    var ch = CHARS[GS.charId];
    var px = 10, py = 10;

    // ── HP bar ────────────────────────────────────────────
    // bg
    g.fillStyle(0x220000, 1);
    g.fillRect(px, py, 160, 14);
    // fill
    var hpFrac = clamp(GS.hp / GS.maxHp, 0, 1);
    var hpCol = hpFrac > 0.5 ? C.hp : hpFrac > 0.25 ? 0xe09020 : 0xff2020;
    g.fillStyle(hpCol, 1);
    g.fillRect(px, py, 160 * hpFrac, 14);
    // border
    fillBorder(g, px, py, 160, 14, 1, 0x880000);

    // ── MP bar ────────────────────────────────────────────
    g.fillStyle(0x001a44, 1);
    g.fillRect(px, py + 16, 130, 10);
    g.fillStyle(C.mp, 1);
    g.fillRect(px, py + 16, 130 * clamp(GS.mp / GS.maxMp, 0, 1), 10);
    fillBorder(g, px, py + 16, 130, 10, 1, 0x003388);

    // XP text (drawn as filled blocks for digits)
    // Use text object via camera-anchored approach
    // We draw a compact XP bar
    g.fillStyle(0x221100, 1);
    g.fillRect(px, py + 28, 100, 7);
    g.fillStyle(C.xp, 1);
    var xpFrac = (GS.xp % 500) / 500;
    g.fillRect(px, py + 28, 100 * xpFrac, 7);
    fillBorder(g, px, py + 28, 100, 7, 1, 0x664400);

    // ── Ability cooldown indicators ───────────────────────
    var ab1f = clamp(1 - this.ab1Cd / ch.ab1Cd, 0, 1);
    var ab2f = clamp(1 - this.ab2Cd / ch.ab2Cd, 0, 1);
    var abY = py + 38;

    // Ab1
    g.fillStyle(0x1a1a00, 1);
    g.fillRect(px, abY, 56, 8);
    g.fillStyle(ch.statsColor, 1);
    g.fillRect(px, abY, 56 * ab1f, 8);
    fillBorder(g, px, abY, 56, 8, 1, 0x444400);

    // Ab2
    g.fillStyle(0x1a1a00, 1);
    g.fillRect(px + 60, abY, 56, 8);
    g.fillStyle(ch.statsColor, 0.7);
    g.fillRect(px + 60, abY, 56 * ab2f, 8);
    fillBorder(g, px + 60, abY, 56, 8, 1, 0x444400);

    // Liam teleport charges
    if (GS.charId === 'liam') {
      for (var tc = 0; tc < 3; tc++) {
        g.fillStyle(tc < this.teleportCharges ? 0x80b0ff : 0x222244, 1);
        g.fillCircle(px + tc * 12, abY + 12, 4);
      }
    }

    // ── Level badge top-right ─────────────────────────────
    g.fillStyle(0x0d150d, 0.85);
    g.fillRoundedRect(W - 180, 6, 170, 28, 4);
    fillBorder(g, W - 180, 6, 170, 28, 1, C.uiBorder);

    // ── Boss HP (if active and near) ──────────────────────
    if (this.bossActive && Math.abs(this.bossX - this.px) < 600) {
      var bfrac = clamp(this.bossHp / this.bossMaxHp, 0, 1);
      var bbarY = H - 30;
      g.fillStyle(0x1a0000, 0.9);
      g.fillRect(100, bbarY, W - 200, 18);
      g.fillStyle(0xcc2020, 1);
      g.fillRect(100, bbarY, (W - 200) * bfrac, 18);
      // phase indicator
      if (this.bossPhase === 1) {
        g.fillStyle(0xff6600, 0.4);
        g.fillRect(100, bbarY, (W - 200) * bfrac, 18);
      } else if (this.bossPhase === 2) {
        g.fillStyle(0xff0000, 0.5);
        g.fillRect(100, bbarY, (W - 200) * bfrac, 18);
      }
      fillBorder(g, 100, bbarY, W - 200, 18, 1, 0x880000);
    }

    // ── Gold / XP counters (top bar blocks) ──────────────
    g.fillStyle(0x0d150d, 0.7);
    g.fillRoundedRect(px, H - 36, 200, 28, 3);

    // ── Time slow overlay pulse ───────────────────────────
    if (this.timeSlow && this.timeSlowTimer > 0) {
      var pulse = Math.sin(t * 6) * 0.04 + 0.04;
      g.fillStyle(0x4060c0, pulse);
      g.fillRect(0, 0, W, H);
    }

    // ── Notification ─────────────────────────────────────
    if (this.notifTimer > 0) {
      var na = Math.min(1, this.notifTimer);
      g.fillStyle(0x000000, na * 0.6);
      g.fillRoundedRect(W/2 - 120, 60, 240, 28, 4);
      fillBorder(g, W/2 - 120, 60, 240, 28, 1, 0x4a9f4a);
    }

    // ── Dialogue ─────────────────────────────────────────
    if (this.dialogueTimer > 0) {
      var da = Math.min(1, this.dialogueTimer * 0.5);
      g.fillStyle(0x000000, da * 0.75);
      g.fillRoundedRect(60, H - 120, W - 120, 90, 6);
      fillBorder(g, 60, H - 120, W - 120, 90, 2, C.uiBorder);
    }

    // ── Bow charge bar ────────────────────────────────────
    if (this.bowCharging && this.bowCharge > 0) {
      g.fillStyle(0x442200, 1);
      g.fillRect(this.px - 20 - this.scrollX, this.py - 65, 40, 6);
      g.fillStyle(0xffaa00, 1);
      g.fillRect(this.px - 20 - this.scrollX, this.py - 65, 40 * this.bowCharge, 6);
    }

    // ── Touch controls hint (mobile only) ────────────────
    // Left/Right movement zones
    g.fillStyle(0xffffff, 0.06);
    g.fillRect(0, 360, 100, 140);
    g.fillRect(100, 360, 100, 140);
    // Action buttons
    g.fillStyle(0xffffff, 0.08);
    g.fillCircle(720, 440, 28);  // Jump
    g.fillCircle(580, 430, 22);  // Attack
    g.fillStyle(0xffffff, 0.06);
    g.fillCircle(720, 130, 20);  // Ab1
    g.fillCircle(580, 130, 20);  // Ab2

    // Pause button
    g.fillStyle(0xffffff, 0.1);
    g.fillRect(360, 6, 80, 22);
    fillBorder(g, 360, 6, 80, 22, 1, 0x4a9f4a);
  },

  // ── PAUSE OVERLAY ────────────────────────────────────────
  _drawPauseOverlay: function(t) {
    var g = this.paL;
    // Dim
    g.fillStyle(0x000000, 0.7);
    g.fillRect(0, 0, W, H);

    // Panel
    var px = W/2 - 140;
    var py = H/2 - 160;
    var pw = 280;
    var ph = 320;
    g.fillStyle(C.uiDark, 0.95);
    g.fillRoundedRect(px, py, pw, ph, 8);
    fillBorder(g, px, py, pw, ph, 2, C.uiBorder);

    // Title bar
    g.fillStyle(C.uiBorder, 0.2);
    g.fillRoundedRect(px + 4, py + 4, pw - 8, 36, 6);

    // Menu items as fill blocks
    var items = [
      { label: 'Resume',      action: 'resume' },
      { label: 'Character',   action: 'charsel' },
      { label: 'Shop',        action: 'shop' },
      { label: 'Online',      action: 'online' },
      { label: 'Quit Level',  action: 'quit' }
    ];
    var self = this;
    this.menuObjs = [];
    items.forEach(function(it, idx) {
      var iy = py + 60 + idx * 44;
      var iw = pw - 32;
      var ix = px + 16;
      g.fillStyle(0x1a2a1a, 0.9);
      g.fillRoundedRect(ix, iy, iw, 34, 4);
      fillBorder(g, ix, iy, iw, 34, 1, 0x2d5c2d);
      self.menuObjs.push({ x: ix, y: iy, w: iw, h: 34, btn: true, action: function() {
        if (it.action === 'resume') { self.uiMode = 'game'; }
        else if (it.action === 'charsel') { self.uiMode = 'charsel'; }
        else if (it.action === 'shop') { self.uiMode = 'shop'; sfxShop(); }
        else if (it.action === 'online') { self.uiMode = 'online'; }
        else if (it.action === 'quit') { GS.levelIdx = 0; self.uiMode = 'game'; }
      }});
    });
  },

  // ── SHOP ─────────────────────────────────────────────────
  _drawShop: function(t) {
    var g = this.paL;
    g.fillStyle(0x000000, 0.85);
    g.fillRect(0, 0, W, H);

    var px = 30, py = 20, pw = W - 60, ph = H - 40;
    g.fillStyle(C.uiDark, 1);
    g.fillRoundedRect(px, py, pw, ph, 8);
    fillBorder(g, px, py, pw, ph, 2, C.uiBorder);

    // Header
    g.fillStyle(C.uiBorder, 0.2);
    g.fillRoundedRect(px+4, py+4, pw-8, 38, 6);

    // Grid of shop items
    var cols = 3;
    var cellW = (pw - 24) / cols;
    var cellH = 68;
    var startX = px + 12;
    var startY = py + 54;
    var self = this;
    this.shopObjs = [];

    SHOP_ITEMS.forEach(function(item, i) {
      var col = i % cols;
      var row = Math.floor(i / cols);
      var ix = startX + col * cellW;
      var iy = startY + row * cellH;
      var canAfford = GS.gold >= item.cost;
      var owned = false;
      if (item.type === 'weapon')    owned = GS.unlockedWeapons.indexOf(item.ref) >= 0;
      if (item.type === 'armour')    owned = GS.unlockedArmours.indexOf(item.ref) >= 0;
      if (item.type === 'mount')     owned = GS.unlockedMounts.indexOf(item.ref) >= 0;
      if (item.type === 'companion') owned = GS.unlockedCompanions.indexOf(item.ref) >= 0;

      var bgCol = owned ? 0x0d200d : (canAfford ? 0x152015 : 0x110a0a);
      g.fillStyle(bgCol, 0.95);
      g.fillRoundedRect(ix, iy, cellW - 4, cellH - 4, 4);
      fillBorder(g, ix, iy, cellW - 4, cellH - 4, 1, owned ? 0x3d9f3d : (canAfford ? 0x2a4a2a : 0x3a1a1a));

      // Cost indicator strip
      g.fillStyle(canAfford ? C.gold : 0x666666, 1);
      g.fillRect(ix + 2, iy + 2, 6, cellH - 8);

      if (!owned && canAfford) {
        self.shopObjs.push({ x: ix, y: iy, w: cellW - 4, h: cellH - 4, btn: true, action: function() {
          self._buyItem(item);
        }});
      }
    });

    // Close button
    var cx = W/2 - 60, cy = py + ph - 44;
    g.fillStyle(0x2d6e2d, 1);
    g.fillRoundedRect(cx, cy, 120, 34, 4);
    fillBorder(g, cx, cy, 120, 34, 1, C.uiBorder);
    self.shopObjs.push({ x: cx, y: cy, w: 120, h: 34, btn: true, action: function() {
      self.uiMode = 'game';
    }});
  },

  _buyItem: function(item) {
    if (GS.gold < item.cost) return;
    GS.gold -= item.cost;
    sfxShop();
    if (item.type === 'consumable') {
      if (item.hp) GS.hp = Math.min(GS.maxHp, GS.hp + item.hp);
      if (item.mp) GS.mp = Math.min(GS.maxMp, GS.mp + item.mp);
      this._showNotif('Used ' + item.name + '!');
    } else if (item.type === 'weapon') {
      if (GS.unlockedWeapons.indexOf(item.ref) < 0) GS.unlockedWeapons.push(item.ref);
      GS.weapon = item.ref;
      this._showNotif('Equipped ' + item.name + '!');
    } else if (item.type === 'armour') {
      if (GS.unlockedArmours.indexOf(item.ref) < 0) GS.unlockedArmours.push(item.ref);
      GS.armour = item.ref;
      this._showNotif('Equipped ' + item.name + '!');
    } else if (item.type === 'mount') {
      if (GS.unlockedMounts.indexOf(item.ref) < 0) GS.unlockedMounts.push(item.ref);
      GS.mount = item.ref;
      this._showNotif('Riding ' + item.name + '!');
    } else if (item.type === 'companion') {
      if (GS.unlockedCompanions.indexOf(item.ref) < 0) GS.unlockedCompanions.push(item.ref);
      GS.companion = item.ref;
      this._showNotif(item.name + ' joins you!');
    }
    GS.save();
  },

  // ── GAME OVER ────────────────────────────────────────────
  _drawGameOver: function(t) {
    var g = this.paL;
    g.fillStyle(0x000000, 0.88);
    g.fillRect(0, 0, W, H);

    var px = W/2 - 160, py = H/2 - 100;
    g.fillStyle(0x1a0000, 1);
    g.fillRoundedRect(px, py, 320, 200, 8);
    fillBorder(g, px, py, 320, 200, 2, 0x880000);

    // Skull decoration (fill only)
    var skx = W/2, sky = py + 50;
    g.fillStyle(0xc8c0b0, 1);
    g.fillCircle(skx, sky, 22);
    g.fillStyle(0x1a0000, 1);
    g.fillCircle(skx - 8, sky - 4, 6);
    g.fillCircle(skx + 8, sky - 4, 6);
    g.fillRect(skx - 10, sky + 12, 6, 8);
    g.fillRect(skx - 2, sky + 12, 6, 8);
    g.fillRect(skx + 6, sky + 12, 6, 8);

    // Retry button
    var rx = W/2 - 80, ry = py + 148;
    g.fillStyle(0x2d6e2d, 1);
    g.fillRoundedRect(rx, ry, 160, 36, 4);
    fillBorder(g, rx, ry, 160, 36, 1, C.uiBorder);

    var self = this;
    this.menuObjs = [{ x: rx, y: ry, w: 160, h: 36, btn: true, action: function() {
      GS.resetHp();
      self.uiMode = 'game';
      self.gameOver = false;
      self.px = 120; self.py = GROUND_Y;
      self.pvx = 0; self.pvy = 0;
      self.bossTriggered = false;
      self.bossActive = false;
      self.bossHp = self.bossMaxHp;
      self.enemyList.forEach(function(en) { en.alive = true; en.hp = en.maxHp; });
    }}];
  },

  // ── LEVEL WIN ────────────────────────────────────────────
  _drawWin: function(t) {
    var g = this.paL;
    g.fillStyle(0x000000, 0.82);
    g.fillRect(0, 0, W, H);

    var px = W/2 - 180, py = H/2 - 130;
    g.fillStyle(0x0d1a0d, 1);
    g.fillRoundedRect(px, py, 360, 260, 8);
    fillBorder(g, px, py, 360, 260, 2, C.uiBorder);

    // Star / celebration
    var pulse = Math.sin(t * 3) * 5;
    for (var si = 0; si < 5; si++) {
      var sang = si / 5 * Math.PI * 2 + t;
      g.fillStyle(C.gold, 0.8);
      g.fillCircle(W/2 + Math.cos(sang) * (40 + pulse), py + 60 + Math.sin(sang) * 20, 5);
    }
    g.fillStyle(C.gold, 1);
    g.fillCircle(W/2, py + 60, 18 + pulse * 0.3);

    // Buttons: Next Level, Shop, Character Select
    var items = [
      { lbl: 'Next Chapter', act: 'next' },
      { lbl: 'Visit Shop',   act: 'shop' },
      { lbl: 'Main Menu',    act: 'menu' }
    ];
    var self = this;
    this.menuObjs = [];
    items.forEach(function(it, i) {
      var bx = W/2 - 100, by = py + 130 + i * 44;
      g.fillStyle(0x2d6e2d, 1);
      g.fillRoundedRect(bx, by, 200, 34, 4);
      fillBorder(g, bx, by, 200, 34, 1, C.uiBorder);
      self.menuObjs.push({ x: bx, y: by, w: 200, h: 34, btn: true, action: function() {
        if (it.act === 'next') {
          GS.levelIdx = Math.min(GS.levelIdx + 1, LEVELS.length - 1);
          GS.resetHp();
          GS.save();
          self.uiMode = 'game';
          self._resetLevel();
        } else if (it.act === 'shop') {
          self.uiMode = 'shop'; sfxShop();
        } else if (it.act === 'menu') {
          GS.levelIdx = 0; GS.save();
          self.uiMode = 'game';
          self._resetLevel();
        }
      }});
    });
  },

  // ── LEVEL RESET (no scene.restart) ───────────────────────
  _resetLevel: function() {
    var self = this;
    // Reset in-place — no scene.restart()
    this.px = 120; this.py = GROUND_Y;
    this.pvx = 0; this.pvy = 0;
    this.pDir = 1;
    this.onGround = false;
    this.hasDoubleJump = true;
    this.ab1Cd = 0; this.ab2Cd = 0;
    this.attackCd = 0; this.attackAnim = 0;
    this.invincTimer = 0; this.hitFlash = 0;
    this.projectiles = [];
    this.thrownAxe = null;
    this.bowCharge = 0; this.bowCharging = false;
    this.shadowClone = null; this.vineSnare = null;
    this.batStorm = false; this.batStormTimer = 0;
    this.apexActive = false; this.apexTimer = 0;
    this.timeSlow = false; this.timeSlowTimer = 0;
    this.levelTime = 0;
    this.bossTriggered = false;
    this.notification = ''; this.notifTimer = 0;
    this.scrollX = 0;
    this.cameras.main.setScrollX(0);
    this.nightMode = LEVELS[GS.levelIdx].night;
    this.levelWidth = W * 5;
    GS.resetHp();
    var ch = CHARS[GS.charId];
    this.teleportCharges = ch.id === 'liam' ? 3 : 0;

    // Reset platforms and background
    this.platforms = this._buildPlatforms();
    this.bgL.clear();
    this._drawBackground();

    // Reset enemies
    this._spawnEnemies();

    // Level dialogue
    this.dialogueText = 'Chapter ' + LEVELS[GS.levelIdx].id + ': ' + LEVELS[GS.levelIdx].name + '\n' + LEVELS[GS.levelIdx].story;
    this.dialogueTimer = 5;

    GS.resetHp();
  }

}); // end GameScene

// ── MENU SCENE ───────────────────────────────────────────────
var MenuScene = new Phaser.Class({
  Extends: Phaser.Scene,
  initialize: function MenuScene() {
    Phaser.Scene.call(this, { key: 'MenuScene' });
  },
  create: function() {
    var self = this;
    GS.load();
    this.g = this.add.graphics().setDepth(10).setScrollFactor(0);
    this.bg = this.add.graphics().setDepth(0);
    this.t = 0;
    this.mode = 'main'; // main | charsel | online
    this.selChar = GS.charId;
    this.charObjs = [];
    this.mainObjs = [];
    this.onlineObjs = [];
    this._drawBG();

    // Keyboard
    this.enter = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
    this.input.on('pointerdown', function(ptr) { self._onTouch(ptr.x, ptr.y); });
  },
  _drawBG: function() {
    var g = this.bg;
    g.fillStyle(0x0d1a0d, 1);
    g.fillRect(0, 0, W, H);
    // Stars
    for (var i = 0; i < 120; i++) {
      var sx = (i * 137) % W;
      var sy = (i * 89) % (H * 0.6);
      g.fillStyle(0xffffff, 0.3 + (i % 4) * 0.15);
      g.fillCircle(sx, sy, 1 + (i % 2));
    }
    // Tree silhouettes
    for (var j = 0; j < 12; j++) {
      var tx = j * 70 + 20;
      var th = 80 + (j * 37) % 60;
      g.fillStyle(0x0d2010, 0.9);
      g.fillRect(tx, H - th, 18, th);
      g.fillStyle(0x112a14, 0.9);
      g.fillCircle(tx + 9, H - th - 16, 22);
    }
  },
  update: function(time) {
    this.t = time / 1000;
    this.g.clear();
    if (this.mode === 'main')    this._drawMain();
    else if (this.mode === 'charsel') this._drawCharSel();
    else if (this.mode === 'online')  this._drawOnline();
  },
  _drawMain: function() {
    var g = this.g;
    var t = this.t;
    this.mainObjs = [];
    var self = this;

    // Animated title glow
    var gw = 80 + Math.sin(t * 1.5) * 30;
    g.fillStyle(0x4a9f4a, 0.08 + Math.sin(t)*0.04);
    g.fillCircle(W/2, 80, gw);

    // Title text bars (visual stand-in for text — actual text via DOM)
    // Forest floor glow
    g.fillStyle(0x2d6e2d, 0.15);
    g.fillRect(0, H - 80, W, 80);

    // Menu buttons
    var btns = [
      { lbl: 'Play', act: 'play' },
      { lbl: 'Characters', act: 'chars' },
      { lbl: 'Online', act: 'online' }
    ];
    btns.forEach(function(btn, i) {
      var bx = W/2 - 100;
      var by = 200 + i * 70;
      g.fillStyle(0x1a2a1a, 0.95);
      g.fillRoundedRect(bx, by, 200, 48, 6);
      fillBorder(g, bx, by, 200, 48, 2, C.uiBorder);
      // Highlight effect
      g.fillStyle(C.uiBorder, 0.12);
      g.fillRoundedRect(bx + 4, by + 4, 192, 20, 4);
      self.mainObjs.push({ x: bx, y: by, w: 200, h: 48, act: btn.act });
    });

    // Decorative particles (deterministic)
    for (var pi = 0; pi < 12; pi++) {
      var px2 = (pi * 127 + Math.sin(t * 0.8 + pi) * 40) % W;
      var py2 = H - 100 - ((t * 30 + pi * 36) % 80);
      g.fillStyle(0x4a9f4a, 0.3 + Math.sin(t + pi) * 0.15);
      g.fillCircle(px2, py2, 2 + (pi % 3));
    }
  },
  _drawCharSel: function() {
    var g = this.g;
    var t = this.t;
    var self = this;
    this.charObjs = [];

    // Dim background
    g.fillStyle(0x000000, 0.7);
    g.fillRect(0, 0, W, H);

    // Panel
    var px = 30, py = 20, pw = W - 60, ph = H - 40;
    g.fillStyle(C.uiDark, 0.97);
    g.fillRoundedRect(px, py, pw, ph, 8);
    fillBorder(g, px, py, pw, ph, 2, C.uiBorder);

    // Header
    g.fillStyle(C.uiBorder, 0.2);
    g.fillRoundedRect(px+4, py+4, pw-8, 38, 6);

    // Character cards — 3 per row
    var charIds = Object.keys(CHARS);
    var cols = 3;
    var cw = (pw - 24) / cols;
    var ch = 110;

    charIds.forEach(function(cid, i) {
      var col = i % cols;
      var row = Math.floor(i / cols);
      var cx2 = px + 12 + col * cw;
      var cy2 = py + 56 + row * ch;
      var charDef = CHARS[cid];
      var unlocked = GS.unlockedChars.indexOf(cid) >= 0;
      var selected = self.selChar === cid;

      // Card bg
      var cardCol = selected ? 0x1a3a1a : (unlocked ? 0x121e12 : 0x1a0808);
      g.fillStyle(cardCol, 1);
      g.fillRoundedRect(cx2, cy2, cw - 8, ch - 8, 6);
      fillBorder(g, cx2, cy2, cw - 8, ch - 8, selected ? 2 : 1, selected ? C.uiBorder : 0x2a3a2a);

      // Mini character preview
      if (unlocked) {
        var previewX = cx2 + 22;
        var previewY = cy2 + 65;
        if (cid === 'alvano')    drawAlvano(g, previewX, previewY, 1, t);
        else if (cid === 'liam') drawLiam(g, previewX, previewY, 1, t);
        else if (cid === 'levi') drawLevi(g, previewX, previewY, 1, t);
        else if (cid === 'kingroar') drawKingRoar(g, previewX, previewY, 1, t);
        else if (cid === 'vampirina') drawVampirina(g, previewX, previewY, 1, t);
        else if (cid === 'marcel') drawMarcel(g, previewX, previewY, 1, t);
      } else {
        // Lock indicator
        g.fillStyle(0x880000, 0.4);
        g.fillRoundedRect(cx2 + 2, cy2 + 2, cw - 12, ch - 12, 4);
        g.fillStyle(0x666666, 0.8);
        g.fillRect(cx2 + cw/2 - 8, cy2 + 30, 16, 16);
        g.fillRect(cx2 + cw/2 - 4, cy2 + 22, 8, 12);
        g.fillStyle(0x1a0808, 1);
        g.fillCircle(cx2 + cw/2, cy2 + 38, 3);
      }

      // Stats bar (HP)
      g.fillStyle(0x220000, 1);
      g.fillRect(cx2 + 4, cy2 + ch - 20, cw - 16, 5);
      g.fillStyle(0xe04040, 1);
      g.fillRect(cx2 + 4, cy2 + ch - 20, (cw - 16) * (charDef.hp / 150), 5);

      if (unlocked) {
        self.charObjs.push({ x: cx2, y: cy2, w: cw - 8, h: ch - 8, btn: true, action: function(id) {
          return function() {
            self.selChar = id;
            GS.charId = id;
            GS.resetHp();
            GS.save();
          };
        }(cid) });
      }
    });

    // Play button
    var pbx = W/2 - 80, pby = py + ph - 52;
    g.fillStyle(0x2d6e2d, 1);
    g.fillRoundedRect(pbx, pby, 160, 38, 5);
    fillBorder(g, pbx, pby, 160, 38, 2, C.uiBorder);
    self.charObjs.push({ x: pbx, y: pby, w: 160, h: 38, btn: true, action: function() {
      self._startGame();
    }});

    // Back button
    var bbx = W/2 + 90, bby = py + ph - 52;
    g.fillStyle(0x1a1a2a, 1);
    g.fillRoundedRect(bbx, bby, 80, 38, 5);
    fillBorder(g, bbx, bby, 80, 38, 1, 0x444466);
    self.charObjs.push({ x: bbx, y: bby, w: 80, h: 38, btn: true, action: function() {
      self.mode = 'main';
    }});
  },
  _drawOnline: function() {
    var g = this.g;
    var self = this;
    this.onlineObjs = [];
    g.fillStyle(0x000000, 0.75);
    g.fillRect(0, 0, W, H);

    var px = W/2 - 160, py = H/2 - 140, pw = 320, ph = 280;
    g.fillStyle(C.uiDark, 0.97);
    g.fillRoundedRect(px, py, pw, ph, 8);
    fillBorder(g, px, py, pw, ph, 2, C.uiBorder);

    // Host button
    var hbx = W/2 - 100, hby = py + 80;
    g.fillStyle(0x1a3a1a, 1);
    g.fillRoundedRect(hbx, hby, 200, 40, 5);
    fillBorder(g, hbx, hby, 200, 40, 1, C.uiBorder);
    self.onlineObjs.push({ x: hbx, y: hby, w: 200, h: 40, btn: true, action: function() {
      var code = '' + (1000 + Math.floor(Math.abs(Math.sin(Date.now())) * 8999));
      sbJoinRoom(code, true, function(ev) {});
      self._startGame();
    }});

    // Join button / input simulation
    var jbx = W/2 - 100, jby = py + 140;
    g.fillStyle(0x1a1a3a, 1);
    g.fillRoundedRect(jbx, jby, 200, 40, 5);
    fillBorder(g, jbx, jby, 200, 40, 1, 0x4466aa);
    self.onlineObjs.push({ x: jbx, y: jby, w: 200, h: 40, btn: true, action: function() {
      var code = window.prompt('Enter 4-digit room code:');
      if (code && code.length === 4) {
        sbJoinRoom(code, false, function(ev) {});
        self._startGame();
      }
    }});

    // Back
    var bbx = W/2 - 60, bby = py + 210;
    g.fillStyle(0x1a1a1a, 1);
    g.fillRoundedRect(bbx, bby, 120, 36, 4);
    fillBorder(g, bbx, bby, 120, 36, 1, 0x444444);
    self.onlineObjs.push({ x: bbx, y: bby, w: 120, h: 36, btn: true, action: function() {
      self.mode = 'main';
    }});
  },
  _onTouch: function(x, y) {
    var objs = this.mode === 'main'   ? this.mainObjs :
               this.mode === 'charsel'? this.charObjs :
               this.onlineObjs;

    var self = this;
    if (this.mode === 'main') {
      this.mainObjs.forEach(function(o) {
        if (x >= o.x && x <= o.x + o.w && y >= o.y && y <= o.y + o.h) {
          if (o.act === 'play')   { self._startGame(); }
          if (o.act === 'chars')  { self.mode = 'charsel'; }
          if (o.act === 'online') { self.mode = 'online'; }
        }
      });
    } else {
      objs.forEach(function(o) {
        if (o.btn && x >= o.x && x <= o.x + o.w && y >= o.y && y <= o.y + o.h) {
          if (o.action) o.action();
        }
      });
    }
  },
  _startGame: function() {
    this.scene.start('GameScene');
  }
});

// ── PHASER CONFIG ────────────────────────────────────────────
var config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  parent: 'game-container',
  backgroundColor: '#0a0a0f',
  scene: [MenuScene, GameScene],
  render: {
    antialias: false,
    pixelArt: false
  }
};

// ── TEXT OVERLAY SYSTEM ──────────────────────────────────────
// Since Phaser graphics can't render text, we use floating DOM elements
// synced to game state. This avoids bitmap fonts and keeps file lean.
var domLabels = {};

function ensureLabel(id) {
  if (domLabels[id]) return domLabels[id];
  var el = document.createElement('div');
  el.id = 'lbl_' + id;
  el.style.cssText = 'position:absolute;pointer-events:none;user-select:none;';
  document.getElementById('game-container').appendChild(el);
  domLabels[id] = el;
  return el;
}

function setLabel(id, text, x, y, style) {
  var el = ensureLabel(id);
  el.style.cssText = 'position:absolute;pointer-events:none;user-select:none;' + (style || '');
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  el.textContent = text;
}

function hideLabel(id) {
  if (domLabels[id]) domLabels[id].style.cssText = 'display:none;position:absolute;';
}

// ── START BUTTON ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', function() {
  initAudio();
  document.getElementById('start-overlay').style.display = 'none';
  var game = new Phaser.Game(config);

  // Per-frame labels update
  function updateLabels() {
    var g = game.scene.getScene('GameScene');
    if (!g || !g.sys.isActive()) {
      // Menu
      setLabel('chaptitle', '', 0, 0);
      setLabel('hptxt', '', 0, 0);
      setLabel('goldxp', '', 0, 0);
      requestAnimationFrame(updateLabels);
      return;
    }

    var mode = g.uiMode;

    // HP / MP / XP
    setLabel('hptxt', 'HP: ' + Math.ceil(GS.hp) + ' / ' + GS.maxHp, 12, 12,
      'font:11px monospace;color:#e04040;');
    setLabel('mptxt', 'MP: ' + Math.ceil(GS.mp) + ' / ' + GS.maxMp, 12, 29,
      'font:11px monospace;color:#4080e0;');
    setLabel('xptxt', 'XP: ' + GS.xp, 12, 42,
      'font:10px monospace;color:#d4a020;');
    setLabel('goldtxt', '⬡ ' + GS.gold, 12, H - 22,
      'font:13px monospace;color:#f0c040;');

    // Character + weapon
    var ch2 = CHARS[GS.charId];
    setLabel('chartxt', ch2.name + ' · ' + (GS.weapon.charAt(0).toUpperCase()+GS.weapon.slice(1)), W - 175, 12,
      'font:11px monospace;color:#e8d5a3;');
    setLabel('leveltxt', 'Chapter ' + LEVELS[GS.levelIdx].id + ' / 8', W - 175, 24,
      'font:10px monospace;color:#7ab87a;');

    // Ability names
    setLabel('ab1lbl', '[Q] ' + ch2.ability1, 12, 56,
      'font:9px monospace;color:#aaa;');
    setLabel('ab2lbl', '[E] ' + ch2.ability2, 72, 56,
      'font:9px monospace;color:#aaa;');

    // Notification
    if (g.notifTimer > 0) {
      setLabel('notif', g.notification, W/2 - 110, 66,
        'font:13px Georgia,serif;color:#e8d5a3;text-align:center;width:220px;text-shadow:0 1px 3px #000;');
    } else {
      hideLabel('notif');
    }

    // Dialogue
    if (g.dialogueTimer > 0) {
      setLabel('dialogue', g.dialogueText, 70, H - 112,
        'font:12px Georgia,serif;color:#e8d5a3;width:' + (W - 140) + 'px;line-height:1.5;text-shadow:0 1px 2px #000;');
    } else {
      hideLabel('dialogue');
    }

    // Pause label
    setLabel('pauselbl', 'II', 390, 9,
      'font:10px monospace;color:#4a9f4a;');

    // Pause menu labels
    if (mode === 'pause') {
      ['Resume','Character','Shop','Online','Quit Level'].forEach(function(lbl, i) {
        setLabel('pmenu'+i, lbl, W/2 - 120, H/2 - 100 + i * 44 + 12,
          'font:14px Georgia,serif;color:#e8d5a3;width:240px;text-align:center;');
      });
    } else {
      for (var i = 0; i < 5; i++) hideLabel('pmenu'+i);
    }

    // Shop labels
    if (mode === 'shop') {
      setLabel('shoptitle', 'SHOP', W/2 - 20, 28,
        'font:bold 20px Georgia,serif;color:#e8d5a3;letter-spacing:4px;');
      SHOP_ITEMS.forEach(function(item, i) {
        var cols2 = 3;
        var cw2 = (W - 60 - 24) / cols2;
        var ix = 30 + 12 + (i % cols2) * cw2;
        var iy = 20 + 54 + Math.floor(i / cols2) * 68;
        var owned2 = false;
        if (item.type==='weapon')    owned2 = GS.unlockedWeapons.indexOf(item.ref)>=0;
        if (item.type==='armour')    owned2 = GS.unlockedArmours.indexOf(item.ref)>=0;
        if (item.type==='mount')     owned2 = GS.unlockedMounts.indexOf(item.ref)>=0;
        if (item.type==='companion') owned2 = GS.unlockedCompanions.indexOf(item.ref)>=0;
        var costCol = GS.gold >= item.cost ? '#f0c040' : '#888';
        setLabel('sitem'+i, item.name + '\n' + (owned2 ? '✓ Owned' : '⬡' + item.cost),
          ix + 12, iy + 10,
          'font:10px Georgia,serif;color:' + (owned2 ? '#4a9f4a' : costCol) + ';width:' + (cw2-16) + 'px;white-space:pre;');
      });
      setLabel('shopclose', 'Close', W/2 - 20, H - 40,
        'font:14px Georgia,serif;color:#e8d5a3;');
    } else {
      hideLabel('shoptitle');
      for (var si = 0; si < SHOP_ITEMS.length; si++) hideLabel('sitem'+si);
      hideLabel('shopclose');
    }

    // Game over
    if (mode === 'gameover') {
      setLabel('govr', 'GAME OVER', W/2 - 55, H/2 - 40,
        'font:bold 24px Georgia,serif;color:#cc2020;letter-spacing:2px;');
      setLabel('govrsub', 'Liam and Levi believe in you!', W/2 - 120, H/2 - 8,
        'font:12px Georgia,serif;color:#e8d5a3;width:240px;text-align:center;');
      setLabel('retry', 'Try Again', W/2 - 34, H/2 + 90,
        'font:14px Georgia,serif;color:#e8d5a3;');
    } else {
      hideLabel('govr'); hideLabel('govrsub'); hideLabel('retry');
    }

    // Win
    if (mode === 'win') {
      var lvName = LEVELS[GS.levelIdx].name;
      setLabel('win', '✦ Chapter ' + LEVELS[GS.levelIdx].id + ' Complete! ✦', W/2 - 150, H/2 - 88,
        'font:bold 17px Georgia,serif;color:#f0c040;width:300px;text-align:center;');
      setLabel('winsub', lvName + '\ndefeated!', W/2 - 100, H/2 - 60,
        'font:12px Georgia,serif;color:#e8d5a3;width:200px;text-align:center;white-space:pre;');
      ['Next Chapter','Visit Shop','Main Menu'].forEach(function(lbl, i) {
        setLabel('wbtn'+i, lbl, W/2 - 56, H/2 + 54 + i * 44,
          'font:13px Georgia,serif;color:#e8d5a3;');
      });
    } else {
      hideLabel('win'); hideLabel('winsub');
      for (var wi = 0; wi < 3; wi++) hideLabel('wbtn'+wi);
    }

    // Menu scene labels
    var m = game.scene.getScene('MenuScene');
    if (m && m.sys.isActive()) {
      setLabel('title',    'SONARIA',           W/2 - 90, 42,
        'font:bold 52px Georgia,serif;color:#e8d5a3;text-shadow:0 0 40px #4a9f4a,0 2px 4px #000;letter-spacing:4px;');
      setLabel('subtitle', 'Heart of the Forest', W/2 - 84, 98,
        'font:14px Georgia,serif;color:#7ab87a;letter-spacing:5px;');
      if (m.mode === 'main') {
        ['Play', 'Characters', 'Online'].forEach(function(lbl, i) {
          setLabel('mbtn'+i, lbl, W/2 - 38, 218 + i * 70,
            'font:18px Georgia,serif;color:#e8d5a3;');
        });
        for (var i = 0; i < 3; i++) hideLabel('cbtn'+i);
        hideLabel('cseltitle');
      } else if (m.mode === 'charsel') {
        hideLabel('title'); hideLabel('subtitle');
        for (var i = 0; i < 3; i++) hideLabel('mbtn'+i);
        setLabel('cseltitle', 'Choose Your Hero', W/2 - 74, 28,
          'font:bold 18px Georgia,serif;color:#e8d5a3;letter-spacing:2px;');
        Object.keys(CHARS).forEach(function(cid, i) {
          var cols3 = 3;
          var cw3 = (W - 60 - 24) / cols3;
          var col3 = i % cols3, row3 = Math.floor(i / cols3);
          var cx3 = 30 + 12 + col3 * cw3;
          var cy3 = 20 + 56 + row3 * 110;
          var charDef2 = CHARS[cid];
          var unlocked3 = GS.unlockedChars.indexOf(cid) >= 0;
          setLabel('cname'+i, charDef2.name, cx3 + 30, cy3 + 4,
            'font:11px Georgia,serif;color:' + (unlocked3 ? '#e8d5a3' : '#666') + ';width:' + (cw3-40) + 'px;');
          setLabel('cdesc'+i, unlocked3 ? charDef2.desc : '???', cx3 + 30, cy3 + 18,
            'font:9px Georgia,serif;color:#888;width:' + (cw3-40) + 'px;');
        });
        setLabel('cbtn0', 'Play with ' + CHARS[m.selChar].name, W/2 - 68, H - 56,
          'font:13px Georgia,serif;color:#e8d5a3;');
        setLabel('cbtn1', 'Back', W/2 + 102, H - 56,
          'font:13px Georgia,serif;color:#aaa;');
      } else if (m.mode === 'online') {
        hideLabel('title'); hideLabel('subtitle');
        setLabel('onlinetitle', 'Online Co-op', W/2 - 52, H/2 - 118,
          'font:bold 18px Georgia,serif;color:#e8d5a3;');
        setLabel('hostlbl', 'Host Game', W/2 - 34, H/2 - 56,
          'font:14px Georgia,serif;color:#e8d5a3;');
        setLabel('joinlbl', 'Join Game', W/2 - 34, H/2 + 4,
          'font:14px Georgia,serif;color:#e8d5a3;');
        if (GS.online && GS.roomCode) {
          setLabel('roomcode', 'Room: ' + GS.roomCode, W/2 - 30, H/2 + 54,
            'font:bold 14px monospace;color:#f0c040;');
        }
        setLabel('backlbl2', 'Back', W/2 - 16, H/2 + 130,
          'font:13px Georgia,serif;color:#aaa;');
      }
    } else {
      // In game scene — hide menu labels
      hideLabel('title'); hideLabel('subtitle');
      for (var i = 0; i < 3; i++) hideLabel('mbtn'+i);
      hideLabel('cseltitle');
    }

    requestAnimationFrame(updateLabels);
  }
  requestAnimationFrame(updateLabels);
});
</script>
</body>
</html>
