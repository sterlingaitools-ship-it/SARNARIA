const SUPABASE_URL = 'https://your-project.supabase.co';
const SUPABASE_KEY = 'your-anon-key';

const ONLINE = {
  active: false,
  isHost: false,
  roomCode: null,
  channel: null,
  client: null,
  // Remote player — interpolated position
  remotePlayer: null,
  remoteRender: null, // smooth interpolated state
  lastSent: 0,
  // Callbacks
  _onEnemySync: null,
  _onBossSync: null,

  init(){
    if(typeof window.supabase === 'undefined') return false;
    this.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  },

  genCode(){
    return Math.floor(1000+Math.random()*9000).toString();
  },

  async host(code, onJoin, onState, onDisconnect){
    if(!this.client) return false;
    this.roomCode = code; this.isHost = true;
    this.channel = this.client.channel(`sonaria-${code}`,{config:{broadcast:{self:false}}});
    this.channel
      .on('broadcast',{event:'join'},()=> onJoin&&onJoin())
      .on('broadcast',{event:'pstate'},(d)=> onState&&onState(d.payload))
      .on('broadcast',{event:'attack'},(d)=> this._handleRemoteAttack&&this._handleRemoteAttack(d.payload))
      .on('broadcast',{event:'leave'},()=> onDisconnect&&onDisconnect())
      .subscribe();
    return true;
  },

  async join(code, onHostState, onEnemySync, onBossSync, onDisconnect){
    if(!this.client) return false;
    this.roomCode = code; this.isHost = false;
    this._onEnemySync = onEnemySync;
    this._onBossSync = onBossSync;
    this.channel = this.client.channel(`sonaria-${code}`,{config:{broadcast:{self:false}}});
    this.channel
      .on('broadcast',{event:'pstate'},(d)=> onHostState&&onHostState(d.payload))
      .on('broadcast',{event:'enemies'},(d)=> onEnemySync&&onEnemySync(d.payload))
      .on('broadcast',{event:'boss'},(d)=> onBossSync&&onBossSync(d.payload))
      .on('broadcast',{event:'start'},(d)=>{ this._onStart&&this._onStart(d.payload); })
      .on('broadcast',{event:'leave'},()=> onDisconnect&&onDisconnect())
      .subscribe(async(status)=>{
        if(status==='SUBSCRIBED'){
          await this.channel.send({type:'broadcast',event:'join',payload:{}});
        }
      });
    return true;
  },

  sendPlayerState(data){
    if(!this.channel||!this.active) return;
    const now=Date.now();
    if(now-this.lastSent<33) return; // ~30fps
    this.lastSent=now;
    this.channel.send({type:'broadcast',event:'pstate',payload:data});
  },

  sendEnemyState(enemies, boss){
    if(!this.channel||!this.active||!this.isHost) return;
    // Send compact enemy state
    const eState=enemies.filter(e=>!e.dead).map(e=>({
      id:e._id, hp:e.hp, x:Math.round(e.spr.x), dead:e.dead
    }));
    this.channel.send({type:'broadcast',event:'enemies',payload:{enemies:eState}});
    if(boss){
      this.channel.send({type:'broadcast',event:'boss',payload:{hp:boss.hp,dead:boss.dead,phase:boss.phase}});
    }
  },

  sendAttack(enemyId, damage){
    // Guest sends attack to host for processing
    if(!this.channel||!this.active||this.isHost) return;
    this.channel.send({type:'broadcast',event:'attack',payload:{id:enemyId,dmg:damage}});
  },

  interpolate(dt){
    // Smooth remote player position
    if(!this.remotePlayer) return;
    if(!this.remoteRender){
      this.remoteRender={...this.remotePlayer};
    } else {
      const lerp=(a,b,t)=>a+(b-a)*t;
      const speed=Math.min(1, dt*12); // interpolation speed
      this.remoteRender.x=lerp(this.remoteRender.x||this.remotePlayer.x, this.remotePlayer.x, speed);
      this.remoteRender.y=lerp(this.remoteRender.y||this.remotePlayer.y, this.remotePlayer.y, speed);
      this.remoteRender.hp=this.remotePlayer.hp;
      this.remoteRender.maxHp=this.remotePlayer.maxHp;
      this.remoteRender.dir=this.remotePlayer.dir;
      this.remoteRender.atk=this.remotePlayer.atk;
      this.remoteRender.skin=this.remotePlayer.skin;
      this.remoteRender.weapon=this.remotePlayer.weapon;
      this.remoteRender.wk=this.remotePlayer.wk;
    }
  },

  async leave(){
    if(this.channel){
      await this.channel.send({type:'broadcast',event:'leave',payload:{}});
      this.client.removeChannel(this.channel);
    }
    this.active=false; this.channel=null;
    this.remotePlayer=null; this.remoteRender=null;
  }
};

// ── AUDIO ENGINE ──────────────────────────────────────────────────────────────
let audioCtx=null;
let masterGain=null;
let audioMuted=false;
let audioReady=false; // true once context confirmed running

function initAudio(){
  if(audioCtx) return;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    audioCtx=new AC();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.55;
    masterGain.connect(audioCtx.destination);
    // Resume is async — chain off the promise
    const doUnlock=()=>{
      audioReady=true;
      // Play a real audible test tone so user knows it's working
      try{
        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.connect(g);g.connect(masterGain);
        o.frequency.value=440;g.gain.value=0.06;
        o.start();o.stop(audioCtx.currentTime+0.08);
      }catch(e){}
    };
    if(audioCtx.state==='suspended'){
      audioCtx.resume().then(doUnlock).catch(e=>console.warn('resume failed',e));
    } else {
      doUnlock();
    }
  }catch(e){ console.warn('Audio init failed:',e); }
}

function ensureAudio(){
  if(!audioCtx) return;
  if(audioCtx.state==='suspended'){
    audioCtx.resume().then(()=>{ audioReady=true; }).catch(()=>{});
  }
}

function toggleMute(){
  audioMuted=!audioMuted;
  if(masterGain) masterGain.gain.value=audioMuted?0:0.55;
  const btn=document.getElementById('mute-btn');
  if(btn) btn.textContent=audioMuted?'🔇':'🔊';
}

function playTone(freq,dur,type='sine',vol=0.12,attack=0.01){
  if(audioMuted||!audioCtx||!audioReady) return;
  // Auto-resume if something suspended it
  if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(masterGain);
    o.type=type;
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+attack);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start(audioCtx.currentTime);
    o.stop(audioCtx.currentTime+dur+0.05);
  }catch(e){}
}

function playNoise(dur,vol=0.08,freq=800){
  if(audioMuted||!audioCtx||!audioReady) return;
  if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
  try{
    const sr=audioCtx.sampleRate;
    const buf=audioCtx.createBuffer(1,Math.max(1,Math.floor(sr*dur)),sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    const f=audioCtx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=freq;f.Q.value=1;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    src.connect(f);f.connect(g);g.connect(masterGain);
    src.start();src.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// Ambient loops per biome
let ambientNodes=[];
function stopAmbient(){ ambientNodes.forEach(n=>{try{n.stop();}catch(e){}}); ambientNodes=[]; }
function playAmbient(bg){
  stopAmbient();
  if(audioMuted) return;
  const _try=(attempt)=>{
    if(!audioCtx||!audioReady){
      if(attempt<12) setTimeout(()=>_try(attempt+1),500);
      return;
    }
    try{
      const ctx=audioCtx;
      const configs={
        forest:   [{f:80,vol:0.025,rate:0.3},{f:160,vol:0.02,rate:0.7}],
        ocean:    [{f:60,vol:0.04,rate:0.15},{f:90,vol:0.025,rate:0.25}],
        river:    [{f:70,vol:0.03,rate:0.2},{f:110,vol:0.025,rate:0.5}],
        jungle:   [{f:120,vol:0.03,rate:0.5},{f:200,vol:0.02,rate:1.2}],
        jungle2:  [{f:100,vol:0.03,rate:0.4},{f:180,vol:0.02,rate:0.9}],
        mountain: [{f:50,vol:0.03,rate:0.1},{f:70,vol:0.02,rate:0.18}],
        volcano:  [{f:45,vol:0.045,rate:0.08},{f:65,vol:0.03,rate:0.12}],
        peak:     [{f:40,vol:0.04,rate:0.08},{f:55,vol:0.025,rate:0.12}],
      };
      (configs[bg]||configs.forest).forEach(c=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        const lfo=ctx.createOscillator(),lg=ctx.createGain();
        lfo.frequency.value=c.rate;lfo.connect(lg);lg.gain.value=c.vol*0.4;
        lg.connect(g.gain);
        o.type='sine';o.frequency.value=c.f;
        g.gain.value=c.vol;
        o.connect(g);g.connect(masterGain);
        lfo.start();o.start();
        ambientNodes.push(o,lfo);
      });
    }catch(e){}
  };
  _try(0);
}

// ── DAY/NIGHT CYCLE ───────────────────────────────────────────────────────────
// 15 real minutes = full cycle. timeOfDay 0=dawn, 0.25=day, 0.5=dusk, 0.75=night
let timeOfDay=0.25; // start at day
let dayNightSpeed=1/(15*60); // full cycle in 15 minutes
function updateDayNight(dt){ timeOfDay=(timeOfDay+dayNightSpeed*dt)%1; }
function getDayTint(){
  // Returns {skyMix, ambientAlpha, moonAlpha, label}
  const t=timeOfDay;
  if(t<0.15) return {mix:t/0.15,label:'Dawn',   moonAlpha:1-t/0.15,  starAlpha:1-t/0.15};
  if(t<0.45) return {mix:1,      label:'Day',    moonAlpha:0,         starAlpha:0};
  if(t<0.55) return {mix:1-(t-0.45)/0.1,label:'Dusk',moonAlpha:(t-0.45)/0.1,starAlpha:(t-0.45)/0.1};
  return              {mix:0,      label:'Night',  moonAlpha:1,         starAlpha:1};
}

// STORY INTRO CINEMATIC
// ═══════════════════════════════════════════════════════════════════════════════
class IntroScene extends Phaser.Scene {
  constructor(){super('Intro');}
  create(){
    this.lines=STORY_BEATS.intro;
    this.idx=0;
    this._typing=false;
    this._typeTimeout=null;
    this._advancing=false; // guard against double-advance

    const bg=this.add.graphics();
    bg.fillStyle(0x000000,1);bg.fillRect(0,0,W,H);
    bg.lineStyle(1,0xc9a84c,0.3);bg.strokeRect(30,30,W-60,H-60);
    bg.lineStyle(1,0xc9a84c,0.15);bg.strokeRect(36,36,W-72,H-72);

    this.add.text(W/2,42,'✦  The Legend of Sonaria  ✦',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#c9a84c'}).setOrigin(0.5);
    this.storyTxt=this.add.text(W/2,H/2,'',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'15px',color:'#e8dcc8',wordWrap:{width:W-140},align:'center',lineSpacing:8}).setOrigin(0.5);
    this.pageTxt=this.add.text(W/2,H-50,'',{fontFamily:'monospace',fontSize:'10px',color:'#5a4a3a'}).setOrigin(0.5);
    const hint=this.add.text(W/2,H-38,'tap or press any key to continue',{fontFamily:'monospace',fontSize:'10px',color:'#4a3a2a'}).setOrigin(0.5);
    this.tweens.add({targets:hint,alpha:{from:0.3,to:1},duration:800,yoyo:true,repeat:-1});

    // Skip button — always visible
    const skipBtn=document.createElement('button');
    skipBtn.textContent='Skip Story ➜';
    Object.assign(skipBtn.style,{
      position:'absolute',bottom:'14px',right:'14px',
      background:'rgba(10,6,24,0.9)',border:'1px solid #5a3d80',
      color:'#8a7a9a',fontFamily:'monospace',fontSize:'12px',
      padding:'8px 16px',cursor:'pointer',borderRadius:'4px',
      zIndex:'500',touchAction:'manipulation',
    });
    skipBtn.addEventListener('click',()=>{ this._cleanup(); this.scene.start('Difficulty'); });
    document.getElementById('game-container').appendChild(skipBtn);
    this._skipBtn=skipBtn;
    this.events.once('shutdown',()=>this._cleanup());

    this.stars=Array.from({length:40},()=>({x:rnd(40,W-40),y:rnd(60,H-60),r:Math.random()*1.5+0.3,ph:Math.random()*Math.PI*2}));
    this.starGfx=this.add.graphics();
    this.t=0;

    this.showLine();

    // Single tap/key handler — advance() protected against rapid fire
    this.input.keyboard.on('keydown',()=>this.advance());
    this.input.on('pointerdown',()=>this.advance());
  }

  _cleanup(){
    if(this._typeTimeout){ clearTimeout(this._typeTimeout); this._typeTimeout=null; }
    if(this._skipBtn&&this._skipBtn.parentNode){ this._skipBtn.remove(); this._skipBtn=null; }
  }

  showLine(){
    const txt=this.lines[this.idx];
    this.storyTxt.setText('');
    this.pageTxt.setText(`${this.idx+1} / ${this.lines.length}`);
    this._typing=true;
    this._advancing=false;
    let i=0;
    const tick=()=>{
      if(!this._typing) return; // cancelled
      if(i<txt.length){
        this.storyTxt.setText(txt.slice(0,++i));
        this._typeTimeout=setTimeout(tick,22);
      } else {
        this._typing=false;
        this._typeTimeout=null;
      }
    };
    tick();
  }

  advance(){
    if(this._advancing) return; // block double-fire
    // If still typing — show full line immediately
    if(this._typing){
      this._typing=false;
      if(this._typeTimeout){ clearTimeout(this._typeTimeout); this._typeTimeout=null; }
      this.storyTxt.setText(this.lines[this.idx]);
      return;
    }
    // Move to next line
    this._advancing=true;
    this.idx++;
    if(this.idx>=this.lines.length){
      this._cleanup();
      this.scene.start('Difficulty');
    } else {
      this.showLine();
    }
  }

  update(){
    this.t+=0.016;
    this.starGfx.clear();
    this.stars.forEach(s=>{
      this.starGfx.fillStyle(0xc9a84c,0.2+Math.sin(this.t+s.ph)*0.2);
      this.starGfx.fillCircle(s.x,s.y,s.r);
    });
  }
}

  _buildCodeInput(x, y){
    const canvas = this.sys.canvas;
    const rect = canvas.getBoundingClientRect();
    const scaleX = rect.width/W, scaleY = rect.height/H;
    const inp = document.createElement('input');
    inp.maxLength = 4;
    inp.placeholder = '0000';
    inp.id = 'room-code-input';
    Object.assign(inp.style,{
      position:'absolute',
      left:`${rect.left + x*scaleX}px`,
      top:`${rect.top + y*scaleY}px`,
      width:`${148*scaleX}px`,
      height:`${36*scaleY}px`,
      background:'rgba(10,6,24,0.95)',
      border:'2px solid #c9a84c',
      color:'#ffffff',
      fontFamily:"'Cinzel Decorative',cursive",
      fontSize:`${22*scaleY}px`,
      textAlign:'center',
      letterSpacing:'8px',
      outline:'none',
      borderRadius:'6px',
      zIndex:'999',
    });
    inp.oninput = ()=>{ inp.value = inp.value.replace(/[^0-9]/g,'').slice(0,4); };
    document.body.appendChild(inp);
    this._inputEl = inp;
    this.events.once('shutdown', ()=> this._cleanup());
  }

  _cleanup(){
    if(this._inputEl){ this._inputEl.remove(); this._inputEl = null; }
  }

  async hostGame(code){
    if(this.isConnecting) return;
    if(!ONLINE.client){ this.statusTxt.setText('⚠ Supabase not configured.').setColor('#ff4040'); return; }
    this.isConnecting = true;
    this.statusTxt.setText('Creating room...').setColor('#40c0ff');
    ONLINE.active = true;
    MP.active = true;
    MP.p1name = MP.p1name || 'Host';

    await ONLINE.host(code,
      // P2 joined
      ()=>{
        MP.p2name = 'Player 2';
        this.p2Slot.setText(`P2: ${MP.p2name} ✓`).setColor('#40ff80');
        this.statusTxt.setText('Player 2 connected! Start when ready.').setColor('#40ff80');
        // Enable start button
        this.startBtn.setStyle({color:'#000000',backgroundColor:'#40c060'})
          .setInteractive({cursor:'pointer'})
          .on('pointerdown',()=> this._startOnlineGame(code));
      },
      // Received P2 state
      (payload)=>{ ONLINE.remotePlayer = payload; },
      // P2 disconnected
      ()=>{ this.p2Slot.setText('P2: Disconnected').setColor('#ff4040'); this.statusTxt.setText('Player 2 left.').setColor('#ff4040'); }
    );
    this.p1Slot.setText(`P1: ${MP.p1name} (you) ✓`).setColor('#40c0ff');
    this.statusTxt.setText(`Room ${code} created. Waiting for Player 2...`).setColor('#c9a84c');
  }

  async joinGame(){
    const inp = this._inputEl;
    const code = inp ? inp.value.trim() : '';
    if(code.length !== 4){ this.statusTxt.setText('Enter the 4-digit code first.').setColor('#ff4040'); return; }
    if(this.isConnecting) return;
    if(!ONLINE.client){ this.statusTxt.setText('⚠ Supabase not configured.').setColor('#ff4040'); return; }
    this.isConnecting = true;
    this.statusTxt.setText(`Joining room ${code}...`).setColor('#c9a84c');
    ONLINE.active = true; ONLINE.isHost = false;
    MP.active = true; MP.p2name = MP.p2name || 'Guest';

    await ONLINE.join(code,
      // Host player state
      (payload)=>{ ONLINE.remotePlayer = payload; },
      // Enemy sync from host
      (payload)=>{ ONLINE._pendingEnemySync = payload; },
      // Boss sync from host
      (payload)=>{ ONLINE._pendingBossSync = payload; },
      // Disconnect
      ()=>{ this.statusTxt.setText('Host disconnected.').setColor('#ff4040'); }
    );

    // Listen for start signal
    ONLINE._onStart = ()=>{
      this._cleanup();
      this.scene.start('SkinSelect');
    };

    this.p2Slot.setText(`P2: ${MP.p2name} (you) ✓`).setColor('#40ff80');
    this.statusTxt.setText(`Joined room ${code}. Waiting for host...`).setColor('#40ff80');
  }

  _startOnlineGame(code){
    this._cleanup();
    // Tell P2 to start
    ONLINE.channel.send({ type:'broadcast', event:'start', payload:{ level:0 } });
    this.scene.start('SkinSelect');
  }

  update(time, delta){
    // Animate waiting dots
    this.waitTimer += delta;
    if(this.waitTimer > 500){
      this.waitTimer = 0;
      this.waitDots = (this.waitDots+1)%4;
    }
    // Listen for start signal if we're P2
    if(ONLINE.active && !ONLINE.isHost && ONLINE.channel){
      // Handled via subscription in join()
    }
  }
}

    this.add.text(W/2,78,'This affects enemy strength, boss aggression, and challenge',{fontFamily:'monospace',fontSize:'10px',color:'#5a4a6a'}).setOrigin(0.5);

    const diffs=[
      {key:'peaceful',label:'🌿 Peaceful', col:'#40c060', desc:'Enemies deal half damage. Perfect for first playthrough.'},
      {key:'normal',  label:'⚔ Normal',   col:'#c9a84c', desc:'Balanced challenge. The intended experience.'},
      {key:'hard',    label:'🔥 Hard',     col:'#e06020', desc:'Enemies are stronger and bosses more aggressive.'},
      {key:'sarnaria',label:'💀 Sonaria', col:'#c020c0', desc:'Enemies enrage at low HP. Bosses have a third phase. No mercy.'},
    ];

    diffs.forEach((d,i)=>{
      const bx=80, by=110+i*76, bw=W-160, bh=64;
      const isSelected=SAVE.difficulty===d.key;
      const box=this.add.graphics();
      box.fillStyle(isSelected?0x201040:0x100820,0.95);box.fillRoundedRect(bx,by,bw,bh,8);
      box.lineStyle(2,isSelected?0xc9a84c:0x3a2a5a,1);box.strokeRoundedRect(bx,by,bw,bh,8);
      if(isSelected){ box.fillStyle(0xc9a84c,0.05);box.fillRoundedRect(bx,by,bw,bh,8); }

      this.add.text(bx+16,by+12,d.label,{fontFamily:"'Cinzel Decorative',cursive",fontSize:'15px',color:isSelected?d.col:'#8a7a9a'});
      this.add.text(bx+16,by+34,d.desc,{fontFamily:'monospace',fontSize:'10px',color:isSelected?'#c8b898':'#5a4a6a'});
      if(isSelected) this.add.text(bx+bw-12,by+bh/2,'✓',{fontFamily:'monospace',fontSize:'18px',color:'#c9a84c'}).setOrigin(1,0.5);

      const zone=this.add.zone(bx,by,bw,bh).setOrigin(0).setInteractive();
      zone.on('pointerdown',()=>{ SAVE.difficulty=d.key; this.scene.restart(); });
    });

    // Continue
    const cb=this.add.graphics();
    cb.fillStyle(0x1a3010,0.95);cb.fillRoundedRect(W/2-90,H-44,180,30,6);
    cb.lineStyle(1,0x40c060,0.9);cb.strokeRoundedRect(W/2-90,H-44,180,30,6);
    const ct=this.add.text(W/2,H-29,'Continue  →',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#40c060'}).setOrigin(0.5);
    this.tweens.add({targets:ct,alpha:{from:0.4,to:1},duration:700,yoyo:true,repeat:-1});
    const cz=this.add.zone(W/2-90,H-44,180,30).setOrigin(0).setInteractive();
    cz.on('pointerdown',()=>this.scene.start('ModeSelect'));
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('ModeSelect'));
  }
}

    b2.lineStyle(2,s2?0x40c0ff:0x3a2a5a,1);b2.strokeRoundedRect(m2x,m2y,m2w,m2h,8);

    const b3=this.add.graphics();

    b3.fillStyle(s3?0x102010:0x100818,0.95);b3.fillRoundedRect(m3x,m3y,m3w,m3h,8);

    const z3=this.add.zone(m3x,m3y,m3w,m3h).setOrigin(0).setInteractive();
    z3.on('pointerdown',()=>{ document.querySelectorAll('.sarnaria-input').forEach(e=>e.remove()); this.scene.start('OnlineLobby'); });

    // Controls info
    const cy=180;
    if(!MP.active){
      g.fillStyle(0x100820,0.8);g.fillRoundedRect(90,cy,W-180,80,6);
      this.add.text(W/2,cy+14,'Player Controls',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'12px',color:'#c9a84c'}).setOrigin(0.5);
      this.add.text(W/2,cy+34,'Move: ← →    Jump: ↑ or Z    Attack: X    Special: C    Shield: C (with Shield)',{fontFamily:'monospace',fontSize:'10px',color:'#8a7a9a'}).setOrigin(0.5);
      this.add.text(W/2,cy+52,'Mobile: use on-screen buttons',{fontFamily:'monospace',fontSize:'10px',color:'#5a4a6a'}).setOrigin(0.5);
    } else {
      g.fillStyle(0x100820,0.8);g.fillRoundedRect(90,cy,W-180,110,6);
      this.add.text(W/2,cy+12,'Co-op Controls',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'12px',color:'#40c0ff'}).setOrigin(0.5);
      this.add.text(90+12,cy+30,'Player 1',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'10px',color:'#c9a84c'});
      this.add.text(90+12,cy+46,'Move: ← →   Jump: ↑/Z   Attack: X   Special: C',{fontFamily:'monospace',fontSize:'10px',color:'#8a7a9a'});
      this.add.text(W/2+12,cy+30,'Player 2',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'10px',color:'#40c0ff'});
      this.add.text(W/2+12,cy+46,'Move: A D   Jump: W   Attack: F   Special: G',{fontFamily:'monospace',fontSize:'10px',color:'#7a9aaa'});
    }

    // Username inputs (HTML overlay)
    this.buildNameInputs(cy+170);

    // Start
    const sb=this.add.graphics();
    sb.fillStyle(0x1a3010,0.95);sb.fillRoundedRect(W/2-90,H-44,180,30,6);
    sb.lineStyle(1,0x40c060,0.9);sb.strokeRoundedRect(W/2-90,H-44,180,30,6);
    const st=this.add.text(W/2,H-29,'Begin Quest →',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#40c060'}).setOrigin(0.5);
    this.tweens.add({targets:st,alpha:{from:0.4,to:1},duration:700,yoyo:true,repeat:-1});
    const sz=this.add.zone(W/2-90,H-44,180,30).setOrigin(0).setInteractive();
    sz.on('pointerdown',()=>this.startGame());
    this.input.keyboard.once('keydown-ENTER',()=>this.startGame());
  }

  buildNameInputs(y){
    // Clean up old inputs
    document.querySelectorAll('.sarnaria-input').forEach(e=>e.remove());
    const canvas=this.sys.canvas;
    const rect=canvas.getBoundingClientRect();
    const scaleX=rect.width/W, scaleY=rect.height/H;

    const mkInput=(val,left,top,w,cb)=>{
      const inp=document.createElement('input');
      inp.className='sarnaria-input';
      inp.value=val; inp.maxLength=16;
      inp.placeholder='Enter name...';
      Object.assign(inp.style,{
        position:'absolute',
        left:`${rect.left+left*scaleX}px`,
        top:`${rect.top+top*scaleY}px`,
        width:`${w*scaleX}px`,
        height:`${24*scaleY}px`,
        background:'rgba(10,6,24,0.95)',
        border:'1px solid #5a3d80',
        color:'#e8dcc8',
        fontFamily:'monospace',
        fontSize:`${11*scaleY}px`,
        padding:'2px 6px',
        outline:'none',
        borderRadius:'4px',
        zIndex:'999',
      });
      inp.oninput=()=>cb(inp.value||'Player');
      document.body.appendChild(inp);
    };

    if(MP.active){
      this.add.text(110,y,'P1 Name:',{fontFamily:'monospace',fontSize:'11px',color:'#c9a84c'});
      mkInput(MP.p1name,160,y,130,(v)=>MP.p1name=v);
      this.add.text(W/2+10,y,'P2 Name:',{fontFamily:'monospace',fontSize:'11px',color:'#40c0ff'});
      mkInput(MP.p2name,W/2+68,y,130,(v)=>MP.p2name=v);
    } else {
      this.add.text(W/2-140,y,'Your Name:',{fontFamily:'monospace',fontSize:'11px',color:'#c9a84c'});
      mkInput(MP.p1name,W/2-60,y,160,(v)=>MP.p1name=v);
    }
  }

  startGame(){
    document.querySelectorAll('.sarnaria-input').forEach(e=>e.remove());
    this.scene.start('SkinSelect');
  }
}

// SKIN SELECT
// ═══════════════════════════════════════════════════════════════════════════════
class SkinScene extends Phaser.Scene {
  constructor(){super('SkinSelect');}

  create(){
    this.selected=SAVE.skin||'alvano';
    this.skinKeys=Object.keys(SKINS);
    this.bg=this.add.graphics();
    this.previewGfx=this.add.graphics();
    this.buildUI();
  }

  buildUI(){
    const g=this.bg;
    g.fillStyle(0x06020f,1);g.fillRect(0,0,W,H);
    g.fillStyle(0x1a0a30,0.5);g.fillRect(40,20,W-80,H-40);
    g.lineStyle(1,0xc9a84c,0.4);g.strokeRect(40,20,W-80,H-40);

    this.add.text(W/2,36,'CHOOSE YOUR HERO',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'18px',color:'#c9a84c'}).setOrigin(0.5);
    this.add.text(W/2,58,'You can change skin any time from the shop',{fontFamily:'monospace',fontSize:'10px',color:'#4a3a5a'}).setOrigin(0.5);

    // 6 skin cards
    const cardW=116,cardH=200,startX=40,cardY=82;
    this.skinKeys.forEach((key,i)=>{
      const sk=SKINS[key];
      const cx=startX+i*(cardW+8)+cardW/2;
      const cy=cardY+cardH/2;
      const isSelected=key===this.selected;

      const card=this.add.graphics();
      this.drawCard(card,startX+i*(cardW+8),cardY,cardW,cardH,key,isSelected);

      // Preview character in card
      const pg=this.add.graphics();
      this.drawSkinPreview(pg,cx,cardY+100,sk);

      this.add.text(cx,cardY+168,sk.name,{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:isSelected?'#c9a84c':'#8a7a9a'}).setOrigin(0.5);
      this.add.text(cx,cardY+186,sk.desc,{fontFamily:'monospace',fontSize:'9px',color:'#6a5a7a'}).setOrigin(0.5);

      // Clickable zone
      const zone=this.add.zone(startX+i*(cardW+8),cardY,cardW,cardH).setOrigin(0).setInteractive();
      zone.on('pointerdown',()=>{
        SAVE.skin=key;
        this.scene.restart();
      });
    });

    // Start button
    const startBox=this.add.graphics();
    startBox.fillStyle(0x1a3010,0.95);startBox.fillRect(W/2-90,H-46,180,30);
    startBox.lineStyle(1,0x40c060,0.9);startBox.strokeRect(W/2-90,H-46,180,30);
    const st=this.add.text(W/2,H-31,'BEGIN QUEST  →',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#40c060'}).setOrigin(0.5);
    this.tweens.add({targets:st,alpha:{from:0.4,to:1},duration:700,yoyo:true,repeat:-1});
    const sz=this.add.zone(W/2-90,H-46,180,30).setOrigin(0).setInteractive();
    sz.on('pointerdown',()=>this.scene.start('Game',{level:0}));
    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Game',{level:0}));
    this.input.keyboard.once('keydown-SPACE',()=>this.scene.start('Game',{level:0}));  }

  drawCard(g,x,y,w,h,key,selected){
    const sk=SKINS[key];
    g.fillStyle(selected?0x2a1a50:0x100820,0.95);
    g.fillRect(x,y,w,h);
    g.lineStyle(2,selected?0xc9a84c:0x3a2a5a,1);
    g.strokeRect(x,y,w,h);
    if(selected){
      g.lineStyle(1,0xc9a84c,0.3);
      g.strokeRect(x+3,y+3,w-6,h-6);
      g.fillStyle(0xc9a84c,0.06);
      g.fillRect(x,y,w,h);
    }
  }

  drawSkinPreview(g,x,y,sk){
    // Simple standing figure with skin colours
    g.fillStyle(0x000000,0.2);g.fillEllipse(x,y+30,32,8);
    // Legs
    g.fillStyle(sk.bodyCol,1);g.fillRect(x-8,y+8,7,18);g.fillRect(x+1,y+8,7,18);
    g.fillStyle(sk.bootCol,1);g.fillRect(x-9,y+24,9,7);g.fillRect(x,y+24,9,7);
    // Cloak
    g.fillStyle(sk.cloakCol,1);g.fillTriangle(x,y-8,x-16,y+14,x+16,y+14);
    // Body
    g.fillStyle(sk.bodyCol,1);g.fillRect(x-8,y-8,16,20);
    // Arms
    g.fillStyle(sk.bodyCol,1);g.fillRect(x-18,y-6,10,4);g.fillRect(x+8,y-6,10,4);
    // Sword
    g.fillStyle(0x8090b0,0.9);g.fillRect(x+10,y-12,3,22);
    g.fillStyle(sk.accentCol,1);g.fillRect(x+7,y-2,10,2);
    // Head
    g.fillStyle(sk.headCol,1);g.fillCircle(x,y-18,10);
    // Hood
    g.fillStyle(sk.hoodCol,0.9);g.fillCircle(x,y-20,8);
    g.fillTriangle(x-3,y-20,x-12,y-14,x,y-14);
    // Eye
    g.fillStyle(sk.eyeCol,0.9);g.fillCircle(x+4,y-19,2.5);
    // King Roar extras
    if(sk.name==='King Roar'){
      g.fillStyle(sk.hairCol,0.9);g.fillCircle(x,y-26,14);
      g.fillStyle(sk.accentCol,0.7);
      g.fillTriangle(x-6,y-34,x-4,y-34,x-8,y-44);g.fillTriangle(x+6,y-34,x+4,y-34,x+8,y-44);
      g.fillCircle(x,y-36,4);
    }
    // Levi ranger hat
    if(sk.name==='Levi'){
      g.fillStyle(sk.cloakCol,1);g.fillRect(x-12,y-26,24,5);
      g.fillTriangle(x,y-38,x-8,y-26,x+8,y-26);
    }
    // Liam wizard hat
    if(sk.name.includes('Wizard')){
      g.fillStyle(sk.cloakCol,1);g.fillTriangle(x,y-46,x-10,y-28,x+10,y-28);g.fillRect(x-13,y-30,26,5);
      g.fillStyle(0xc9a84c,0.8);g.fillCircle(x,y-40,2.5);
      g.fillStyle(sk.hairCol,0.7);g.fillTriangle(x-5,y-22,x+5,y-22,x,y-14);
    }
    // Vampirina bat wings + fangs
    if(sk.name==='Vampirina'){
      g.fillStyle(0x300040,0.8);
      g.fillTriangle(x-6,y-12,x-26,y-30,x,y-4);g.fillTriangle(x+6,y-12,x+26,y-28,x,y-4);
      g.fillStyle(0xff0030,0.9);g.fillCircle(x-4,y-22,2.5);g.fillCircle(x+4,y-22,2.5);
      g.fillStyle(0xffffff,0.9);g.fillTriangle(x-2,y-18,x-1,y-18,x-1.5,y-14);g.fillTriangle(x+2,y-18,x+1,y-18,x+1.5,y-14);
    }
    // Marcel — Raichu ears, cheeks, tail, lightning bolt
    if(sk.name==='Marcel'){
      // Raichu ears
      g.fillStyle(sk.hairCol,1);
      g.fillTriangle(x-5,y-22,x-9,y-38,x-1,y-24);
      g.fillTriangle(x+5,y-22,x+9,y-38,x+1,y-24);
      g.fillStyle(0x1a0a04,0.7);
      g.fillTriangle(x-5,y-22,x-8,y-36,x-2,y-24);
      g.fillTriangle(x+5,y-22,x+8,y-36,x+2,y-24);
      g.fillStyle(sk.accentCol,0.9);g.fillCircle(x-8,y-37,2);g.fillCircle(x+8,y-37,2);
      // Cheek patches — glowing
      g.fillStyle(0xff2020,0.85);g.fillCircle(x-5,y-16,4);g.fillCircle(x+5,y-16,4);
      g.fillStyle(0xff6060,0.4);g.fillCircle(x-5,y-16,6);g.fillCircle(x+5,y-16,6);
      // Lightning bolt emblem on chest
      g.fillStyle(sk.accentCol,0.9);
      g.fillTriangle(x-1,y-6,x+3,y-6,x+1,y-2);
      g.fillTriangle(x-2,y-2,x+2,y-2,x,y+2);
      // Zigzag tail
      g.lineStyle(3,sk.bodyCol,0.9);
      g.lineBetween(x-5,y+8,x-9,y+3);
      g.lineBetween(x-9,y+3,x-5,y-1);
      g.lineBetween(x-5,y-1,x-11,y-5);
      g.fillStyle(sk.hairCol,1);g.fillCircle(x-11,y-5,3);
    }
  }
}

// TITLE
// ═══════════════════════════════════════════════════════════════════════════════
class TitleScene extends Phaser.Scene {
  constructor(){super('Title');}
  create(){
    this.t=0;
    this.bg=this.add.graphics();
    this.pts=Array.from({length:60},()=>({
      x:rnd(0,W),y:rnd(0,H),vy:-Math.random()*0.7-0.2,
      r:Math.random()*2+0.5,ph:Math.random()*Math.PI*2,
      col:Math.random()>0.5?0xc9a84c:0x8040c0
    }));
    this.add.text(W/2,H*0.22,'SARNARIA',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'54px',color:'#c9a84c',stroke:'#4a2000',strokeThickness:4,shadow:{x:0,y:0,color:'#c9a84c',blur:40,fill:true}}).setOrigin(0.5);
    this.add.text(W/2,H*0.38,'Heart of the Forest',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'18px',color:'#8a6a9a'}).setOrigin(0.5);
    if(SAVE.highScore>0){
      this.add.text(W/2,H*0.48,`High Score: ${SAVE.highScore.toLocaleString()}`,{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#c9a84c'}).setOrigin(0.5);
    }
    this.add.text(W/2,H*0.55,'← → Move   ↑/Z Jump   X Attack   Q Special   ESC Pause',{fontFamily:'monospace',fontSize:'13px',color:'#6a5a7a'}).setOrigin(0.5);
    this.add.text(W/2,H*0.62,'Kill enemies to earn XP — spend it in the Shop between levels',{fontFamily:'monospace',fontSize:'11px',color:'#4a3a5a'}).setOrigin(0.5);
    // Sound unlock prompt — shows until audio context running
    const sndPrompt=this.add.text(W/2,H*0.7,'🔊 Tap anywhere to enable sound',{fontFamily:'monospace',fontSize:'11px',color:'#4a8a4a'}).setOrigin(0.5);
    this.tweens.add({targets:sndPrompt,alpha:{from:0.3,to:1},duration:900,yoyo:true,repeat:-1});
    const _chk=setInterval(()=>{
      if(!sndPrompt.active){clearInterval(_chk);return;}
      if(audioCtx&&audioCtx.state==='running'){
        sndPrompt.setText('🔊 Sound enabled!').setColor('#40c060');
        clearInterval(_chk);
        this.time.delayedCall(2000,()=>{if(sndPrompt.active)sndPrompt.destroy();});
      }
    },400);
    // Use an HTML button so Chrome treats it as a trusted gesture for audio
    const startBtn=document.createElement('button');
    startBtn.id='start-btn';
    startBtn.textContent='TAP TO START + ENABLE SOUND';
    Object.assign(startBtn.style,{
      position:'absolute',bottom:'80px',left:'50%',transform:'translateX(-50%)',
      background:'rgba(10,6,24,0.95)',border:'2px solid #c9a84c',
      color:'#c9a84c',fontFamily:"'Cinzel Decorative',cursive",fontSize:'14px',
      padding:'14px 28px',cursor:'pointer',letterSpacing:'2px',
      borderRadius:'4px',zIndex:'500',touchAction:'manipulation',
      webkitTapHighlightColor:'rgba(201,168,76,0.3)',
    });
    startBtn.addEventListener('click',()=>{
      initAudio();
      startBtn.textContent='🔊 Sound enabled — loading...';
      startBtn.style.borderColor='#40c060';
      startBtn.style.color='#40c060';
      // Small delay so the tone plays before scene change
      setTimeout(()=>{
        startBtn.remove();
        this.scene.start('Intro');
      }, 200);
    });
    // Also allow keyboard
    this.input.keyboard.once('keydown',()=>{
      startBtn.remove();
      this.scene.start('Intro');
    });
    document.getElementById('game-container').appendChild(startBtn);
    // Cleanup if scene changes without clicking
    this.events.once('shutdown',()=>{ if(startBtn.parentNode) startBtn.remove(); });
  }
  update(){
    this.t+=0.016;const g=this.bg;g.clear();
    g.fillStyle(0x06020f,1);g.fillRect(0,0,W,H);
    this.pts.forEach((p,i)=>{
      p.y+=p.vy;if(p.y<-5)p.y=H+5;
      g.fillStyle(p.col,0.4+Math.sin(this.t*2+p.ph)*0.4);
      g.fillCircle(p.x,p.y,p.r);
    });
    g.fillStyle(0x200838,0.5);g.fillRect(0,H*0.88,W,H*0.12);
  }
}

// SHOP
// ═══════════════════════════════════════════════════════════════════════════════
class ShopScene extends Phaser.Scene {
  constructor(){super('Shop');}
  init(d){this.nextLevel=d.nextLevel;this.playerHp=d.playerHp;}

  create(){
    this.bg=this.add.graphics();
    this.bg.fillStyle(0x060210,1);this.bg.fillRect(0,0,W,H);
    this.bg.fillStyle(0x1a0a30,0.6);this.bg.fillRect(40,30,W-80,H-60);
    this.bg.lineStyle(1,0xc9a84c,0.5);this.bg.strokeRect(40,30,W-80,H-60);

    this.add.text(W/2,50,'⚔  SARNARIA SHOP  ⚔',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'18px',color:'#c9a84c'}).setOrigin(0.5);
    this.xpTxt=this.add.text(W/2,76,`XP: ${SAVE.xp}`,{fontFamily:'monospace',fontSize:'14px',color:'#80ff80'}).setOrigin(0.5);
    this.add.text(W/2,95,`${SKINS[SAVE.skin].name}  ·  ${WEAPONS[SAVE.weapon].name}  ·  ${ARMOURS[SAVE.armour].name}  ·  Companion: ${SAVE.companion?COMPANIONS[SAVE.companion].name:'None'}`,{fontFamily:'monospace',fontSize:'10px',color:'#8a7a6a'}).setOrigin(0.5);

    // King Roar story greeting
    const greeting=STORY_BEATS.shopGreeting[Math.floor(Math.random()*STORY_BEATS.shopGreeting.length)];
    this.add.text(W/2,108,`"${greeting}"`,{fontFamily:"'Cinzel Decorative',cursive",fontSize:'9px',color:'#6a5a3a',wordWrap:{width:W-100},align:'center'}).setOrigin(0.5);

    // Change skin button
    const skinBox=this.add.graphics();
    skinBox.fillStyle(0x101828,0.9);skinBox.fillRect(W-160,62,150,22);
    skinBox.lineStyle(1,0x4a6a8a,0.7);skinBox.strokeRect(W-160,62,150,22);
    const skinTxt=this.add.text(W-85,73,'Change Skin',{fontFamily:'monospace',fontSize:'10px',color:'#80b0d0'}).setOrigin(0.5);
    const skinZone=this.add.zone(W-160,62,150,22).setOrigin(0).setInteractive();
    skinZone.on('pointerdown',()=>this.scene.start('SkinSelect'));

    this.msgTxt=this.add.text(W/2,H-52,'',{fontFamily:'monospace',fontSize:'12px',color:'#ff8060'}).setOrigin(0.5);

    // Draw items
    const cols=2, rows=Math.ceil(SHOP_ITEMS.length/cols);
    const iw=(W-120)/cols, ih=46;
    const startY=114;

    SHOP_ITEMS.forEach((item,i)=>{
      const col=i%cols, row=Math.floor(i/cols);
      const ix=60+col*iw, iy=startY+row*ih;

      const owned=(item.type==='weapon'&&SAVE.weapon===item.id)||
        (item.type==='armour'&&SAVE.armour===item.id)||
        (item.type==='companion'&&SAVE.companion===item.id)||
        (item.type==='mount'&&SAVE.mount===item.id);
      const canAfford=SAVE.xp>=item.cost;

      const box=this.add.graphics();
      if(owned){
        box.fillStyle(0x204020,0.9);box.fillRect(ix,iy,iw-6,ih-4);
        box.lineStyle(2,0x40c040,0.9);box.strokeRect(ix,iy,iw-6,ih-4);
      } else if(canAfford){
        box.fillStyle(0x1a1030,0.9);box.fillRect(ix,iy,iw-6,ih-4);
        box.lineStyle(1,0x5a3d80,1);box.strokeRect(ix,iy,iw-6,ih-4);
      } else {
        box.fillStyle(0x1a0808,0.9);box.fillRect(ix,iy,iw-6,ih-4);
        box.lineStyle(1,0x4a1818,0.8);box.strokeRect(ix,iy,iw-6,ih-4);
        // Red X overlay
        box.lineStyle(1,0x6a1a1a,0.3);
        box.lineBetween(ix,iy,ix+iw-6,iy+ih-4);
        box.lineBetween(ix+iw-6,iy,ix,iy+ih-4);
      }

      this.add.text(ix+8,iy+5,item.name,{fontFamily:'monospace',fontSize:'12px',color:owned?'#60ff60':canAfford?'#e8dcc8':'#5a3030'});
      this.add.text(ix+8,iy+19,item.desc,{fontFamily:'monospace',fontSize:'9px',color:owned?'#40a040':canAfford?'#6a6080':'#4a2828'});

      if(!canAfford&&!owned){
        const need=item.cost-SAVE.xp;
        this.add.text(ix+iw-14,iy+5,`🔒 Need ${need}`,{fontFamily:'monospace',fontSize:'10px',color:'#7a3030'}).setOrigin(1,0);
      } else {
        this.add.text(ix+iw-14,iy+5,owned?'✓ OWNED':`${item.cost}XP`,{fontFamily:'monospace',fontSize:'11px',color:owned?'#40ff40':'#c9a84c'}).setOrigin(1,0);
      }

      if(!owned&&canAfford){
        const zone=this.add.zone(ix,iy,iw-6,ih-4).setOrigin(0).setInteractive();
        zone.on('pointerover',()=>{box.clear();box.fillStyle(0x3a2060,0.9);box.fillRect(ix,iy,iw-6,ih-4);box.lineStyle(1,0xc9a84c,1);box.strokeRect(ix,iy,iw-6,ih-4);});
        zone.on('pointerout',()=>{box.clear();box.fillStyle(0x1a1030,0.9);box.fillRect(ix,iy,iw-6,ih-4);box.lineStyle(1,0x5a3d80,1);box.strokeRect(ix,iy,iw-6,ih-4);});
        zone.on('pointerdown',()=>this.buy(item));
      }
    });

    // Continue button
    const contBox=this.add.graphics();
    contBox.fillStyle(0x1a3010,0.9);contBox.fillRect(W/2-80,H-40,160,28);
    contBox.lineStyle(1,0x40c060,0.8);contBox.strokeRect(W/2-80,H-40,160,28);
    const contTxt=this.add.text(W/2,H-26,'CONTINUE  →',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#40c060'}).setOrigin(0.5);
    const contZone=this.add.zone(W/2-80,H-40,160,28).setOrigin(0).setInteractive();
    contZone.on('pointerdown',()=>this.scene.start('Game',{level:this.nextLevel}));
    this.tweens.add({targets:contTxt,alpha:{from:0.5,to:1},duration:700,yoyo:true,repeat:-1});

    this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('Game',{level:this.nextLevel}));
  }

  buy(item){
    if(SAVE.xp<item.cost){this.msgTxt.setText('Not enough XP!');return;}
    SAVE.xp-=item.cost;
    if(item.type==='weapon'){
      SAVE.weapon=item.id;
      if(!SAVE._ownedWeapons) SAVE._ownedWeapons=['sword'];
      if(!SAVE._ownedWeapons.includes(item.id)) SAVE._ownedWeapons.push(item.id);
    }
    else if(item.type==='armour'){
      SAVE.armour=item.id;
      SAVE.maxHp=ARMOURS[item.id].maxHp;
    } else if(item.type==='companion') SAVE.companion=item.id;
    else if(item.type==='mount') SAVE.mount=item.id;
    else if(item.type==='consumable'){
      if(item.id==='heal'){ /* applied on next game start */ }
      if(item.id==='orb') SAVE.orbsLeft=(SAVE.orbsLeft||0)+3;
    }
    this.xpTxt.setText(`XP: ${SAVE.xp}`);
    this.msgTxt.setText(`Purchased: ${item.name}!`);
    this.scene.restart({nextLevel:this.nextLevel,playerHp:this.playerHp});
  }
}

// GAME
// ═══════════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor(){super('Game');}
  init(d){
    this.levelIndex=d.level||0;
    this.ld=LEVELS[this.levelIndex];
  }

  create(){
    this.t=0;
    this.worldW=W*3.2;
    this.groundY=H-62;
    this.physics.world.setBounds(0,0,this.worldW,H+200);

    this.bgGfx=this.add.graphics().setDepth(0);
    this.fxGfx=this.add.graphics().setDepth(1);
    this.platGfx=this.add.graphics().setDepth(2);
    this.weatherGfx=this.add.graphics().setDepth(3).setScrollFactor(0);
    this.projGfx=this.add.graphics().setDepth(8);
    this.charGfx=this.add.graphics().setDepth(9);
    this.hudGfx=this.add.graphics().setDepth(100).setScrollFactor(0);
    this.vignetteGfx=this.add.graphics().setDepth(110).setScrollFactor(0);
    this.pauseGfx=this.add.graphics().setDepth(200).setScrollFactor(0);
    this.minimapGfx=this.add.graphics().setDepth(105).setScrollFactor(0);

    this.platforms=this.physics.add.staticGroup();
    this.projectiles=[];
    this.enemyProjectiles=[];
    this.hitParticles=[];
    this.snowFlakes=[];
    this.rainDrops=[];
    this.portalOpen=false;
    this.heartCollected=false;
    this.comboCount=0;
    this.comboTimer=0;

    // New v7 state
    gamePaused=false;
    hitPauseFrames=0;
    this.bossEntrancePlaying=false;
    this.victoryPosing=false;
    this.victoryTimer=0;
    this.xpLevelPrev=SAVE.xpLevel;
    this.weatherParticles=[];
    this.p2respawnTimer=0;
    this.p2ghost=null;
    this.lastP2HitTime=0;
    this.lastP1HitTime=0;
    this.teamworkTimer=0;

    this.buildWorld();
    this.spawnPlayer();
    this.spawnEnemies();
    this.spawnBoss();
    this.spawnCompanion();
    this.buildHUD();
    this.buildControls();
    this.buildMobileControls();
    this.buildWeather();
    this.buildPauseMenu();

    if(['mountain','peak'].includes(this.ld.bg)){
      for(let i=0;i<70;i++) this.snowFlakes.push({x:rnd(0,this.worldW),y:rnd(0,H),vy:Math.random()*1.4+0.4,vx:Math.random()*0.4-0.2,r:Math.random()*2.5+0.5});
    }

    this.cameras.main.setBounds(0,0,this.worldW,H);
    this.cameras.main.startFollow(this.player.spr,true,0.09,0.09);
    this.showIntro();
  }

  // ── WORLD ──────────────────────────────────────────────────────────────────
  buildWorld(){
    const ld=this.ld, gy=this.groundY, g=this.platGfx;

    // Ground — ocean is SOLID, water is visual only (no gaps)
    const segs=[[0,this.worldW]];

    segs.forEach(([sx,ex])=>{
      const gw=ex-sx;
      g.fillStyle(ld.platCol,1);g.fillRect(sx,gy,gw,62);
      g.fillStyle(0xffffff,0.06);g.fillRect(sx,gy,gw,3);
      g.fillStyle(ld.platTop,0.18);g.fillRect(sx,gy,gw,5);
      const ph=this.platforms.create(sx+gw/2,gy+31,null);
      ph.setVisible(false);ph.displayWidth=gw;ph.displayHeight=62;ph.refreshBody();
    });

    // Platforms
    this.getPlatDefs().forEach(([px,py,pw])=>{
      g.fillStyle(ld.platCol,1);g.fillRect(px-pw/2,py-14,pw,22);
      g.fillStyle(0xffffff,0.07);g.fillRect(px-pw/2,py-14,pw,3);
      g.fillStyle(ld.platTop,0.25);g.fillRect(px-pw/2,py-14,pw,4);
      const p=this.platforms.create(px,py,null);
      p.setVisible(false);p.displayWidth=pw;p.displayHeight=22;p.refreshBody();
    });

    // Heart of Forest (before portal opens)
    this.heartX=this.worldW-120;
    this.heartY=this.groundY-45;
    this.heartGfx=this.add.graphics().setDepth(5);

    // Portal
    this.portalX=this.worldW-100;
    this.portalY=this.groundY-50;
    this.portalGfx=this.add.graphics().setDepth(6);

    // Boss zone marker
    this.bossArenaX=this.worldW-380;

    // Enemy spawn zone: starts at x=400, ends before boss arena
    this.enemySpawnEnd=this.bossArenaX-80;
  }

  getPlatDefs(){
    const gy=this.groundY;
    const sets=[
      [[300,gy-85,120],[520,gy-145,100],[740,gy-95,130],[980,gy-130,110],[1200,gy-80,140],[1420,gy-155,100],[1650,gy-100,120],[1880,gy-175,100],[2100,gy-90,130],[2320,gy-140,110],[2550,gy-85,120],[2780,gy-160,100]],
      [[180,gy-70,80],[460,gy-100,70],[840,gy-80,90],[1060,gy-110,80],[1380,gy-90,70],[1680,gy-120,80],[2020,gy-85,90],[2260,gy-130,80],[2520,gy-85,100],[2700,gy-70,80]],
      [[240,gy-100,110],[470,gy-165,90],[700,gy-115,120],[940,gy-185,100],[1170,gy-120,110],[1410,gy-200,90],[1640,gy-140,100],[1870,gy-210,80],[2100,gy-155,110],[2330,gy-185,100],[2570,gy-120,120]],
      [[260,gy-110,100],[510,gy-180,90],[760,gy-130,110],[1010,gy-210,80],[1260,gy-150,100],[1510,gy-220,90],[1760,gy-160,110],[2010,gy-230,80],[2260,gy-170,100],[2510,gy-190,90]]
    ];
    return sets[this.levelIndex]||sets[0];
  }

  // ── PLAYER ─────────────────────────────────────────────────────────────────
  spawnPlayer(){
    const diff=DIFFICULTY[SAVE.difficulty]||DIFFICULTY.normal;
    this.diff=diff;
    const arm=ARMOURS[SAVE.armour];
    this.player={
      spr:this.physics.add.sprite(80,this.groundY-40,null),
      hp:SAVE.maxHp, maxHp:SAVE.maxHp,
      atk:false,atkTimer:0,
      inv:false,invTimer:0,
      dir:1,wk:0,wkT:0,
      dead:false, onGround:false,
      rollTimer:0, rolling:false,
      comboHits:0, comboT:0,
      regenTimer:0,
      atkHeld:0, axeThrown:false,
      blocking:false,
      specialCD:0,
      specialCharges:SPECIALS[SAVE.skin]?.charges||1,
      specialActive:false, specialTimer:0,
      dashAfterImages:[],
      vineSnares:[],
      roarWaves:[],
      teleportFlash:0,
      isP2:false,
      // Mount state
      mount:SAVE.mount,
      mountDoubleJumped:false,
      mountWormCooldown:0,
      mountSparkles:[],
      mountContactTimer:0,
      // Superpower
      superCD:0,
      superActive:false, superTimer:0,
      // Clone (Alvano)
      clone:null,
      // Time slow (Liam)
      timeSlowActive:false,
      // Nature's Fury (Levi)
      fallingTrunks:[],
      // Bat storm (Vampirina)
      bats:[],
    };

    // Spawn HP orbs from previous purchase
    this.hpOrbs=[];
    for(let i=0;i<SAVE.orbsLeft;i++){
      const ox=300+i*280+rnd(-40,40);
      this.hpOrbs.push({x:ox,y:this.groundY-20,bob:Math.random()*Math.PI*2,collected:false});
    }
    SAVE.orbsLeft=0;
    const p=this.player.spr;
    p.setVisible(false);p.setGravityY(520);p.setCollideWorldBounds(true);p.body.setSize(22,44);
    this.physics.add.collider(p,this.platforms);

    // P2
    this.p2=null;
    if(MP.active){
      this.p2={
        spr:this.physics.add.sprite(120,this.groundY-40,null),
        hp:SAVE.p2maxHp||100, maxHp:SAVE.p2maxHp||100,
        atk:false,atkTimer:0,inv:false,invTimer:0,
        dir:1,wk:0,wkT:0,dead:false,onGround:false,
        atkHeld:0,axeThrown:false,blocking:false,
        specialCD:0,specialCharges:SPECIALS[SAVE.p2skin||'liam']?.charges||1,
        dashAfterImages:[],vineSnares:[],roarWaves:[],teleportFlash:0,
        regenTimer:0,comboCount:0,comboTimer:0,
        isP2:true,
      };
      const p2s=this.p2.spr;
      p2s.setVisible(false);p2s.setGravityY(520);p2s.setCollideWorldBounds(true);p2s.body.setSize(22,44);
      this.physics.add.collider(p2s,this.platforms);
    }
  }

  // ── ENEMIES ────────────────────────────────────────────────────────────────
  spawnEnemies(){
    this.enemies=[];
    const ld=this.ld,diffMult=1+this.levelIndex*0.35;
    let xCursor=380;

    ld.enemies.forEach(group=>{
      for(let i=0;i<group.count;i++){
        xCursor+=rnd(180,280);
        if(xCursor>this.enemySpawnEnd) break;
        this.enemies.push(this.makeEnemy(group.type,xCursor,diffMult));
      }
    });
  }

  makeEnemy(type,ex,diff){
    const d=this.diff||DIFFICULTY.normal;
    const baseHp={soldier:30,ogre:55,kraken:40,siren:28,wraith:38,giant:70,shadow:45,demon:65};
    const baseSpd={soldier:65,ogre:45,kraken:55,siren:80,wraith:70,giant:40,shadow:90,demon:60};
    const baseDmg={soldier:10,ogre:18,kraken:14,siren:8,wraith:12,giant:22,shadow:16,demon:24};
    const hp=Math.round((baseHp[type]||30)*diff*d.enemyHpMult);
    const dmg=Math.round((baseDmg[type]||10)*d.enemyDmgMult);
    // Extra HP in 2P mode
    const hpFinal=MP.active?Math.round(hp*1.4):hp;
    const e={
      spr:this.physics.add.sprite(ex,this.groundY-30,null),
      gfx:this.add.graphics().setDepth(9),
      type,hp:hpFinal,maxHp:hpFinal,
      spd:baseSpd[type]||60,
      dmg,
      dir:-1,atkT:0,dead:false,
      startX:ex,wk:0,wkT:0,
      ranged:['siren','wraith','shadow'].includes(type),
      atkRange:['siren','wraith','shadow'].includes(type)?200:48,
      projT:0,frozen:0,knockback:0,
      enraged:false,
      _id:`${type}_${ex}_${Math.floor(Math.random()*9999)}`, // unique network ID
    };
    e.spr.setVisible(false);e.spr.setGravityY(520);e.spr.setCollideWorldBounds(true);
    e.spr.body.setSize(20,36);
    this.physics.add.collider(e.spr,this.platforms);
    return e;
  }

  // ── BOSS ───────────────────────────────────────────────────────────────────
  spawnBoss(){
    const ld=this.ld,diff=1+this.levelIndex*0.4;
    const d=this.diff||DIFFICULTY.normal;
    const baseHp=Math.round(ld.boss.hp*diff*d.bossHpMult*(MP.active?1.5:1));
    this.boss={
      spr:this.physics.add.sprite(this.worldW-200,this.groundY-55,null),
      gfx:this.add.graphics().setDepth(9),
      type:ld.boss.type,
      hp:baseHp,maxHp:baseHp,
      dir:-1,spd:Math.round(50*d.bossAggrMult),active:false,dead:false,
      phase:0,atkT:0,jumpT:2,
      projT:0,wk:0,wkT:0,knockback:0,
      hasPhase3:d.enrage,
    };
    const b=this.boss.spr;
    b.setVisible(false);b.setGravityY(520);b.setCollideWorldBounds(true);
    b.body.setSize(40,58);
    this.physics.add.collider(b,this.platforms);
  }

  // ── COMPANION ──────────────────────────────────────────────────────────────
  spawnCompanion(){
    this.companion=null;
    if(!SAVE.companion) return;
    const cd=COMPANIONS[SAVE.companion];
    this.companion={
      spr:this.physics.add.sprite(60,this.groundY-30,null),
      gfx:this.add.graphics().setDepth(9),
      type:SAVE.companion,
      atkT:0, wk:0, wkT:0,
      charges:cd.chargeMax,   // shots remaining before cooldown
      cooldownT:0,            // seconds until recharge
      onCooldown:false,
      hp:cd.maxHp, maxHp:cd.maxHp,
      dead:false, respawnT:0,
      invTimer:0,
    };
    const c=this.companion.spr;
    c.setVisible(false);c.setGravityY(520);c.setCollideWorldBounds(true);
    c.body.setSize(20,36);
    this.physics.add.collider(c,this.platforms);
  }

  // ── HUD ────────────────────────────────────────────────────────────────────
  buildHUD(){
    const g=this.hudGfx;
    this.hpTxt=this.add.text(14,26,'',{fontFamily:'monospace',fontSize:'11px',color:'#c9a84c'}).setScrollFactor(0).setDepth(101);
    this.xpTxt=this.add.text(14,40,'',{fontFamily:'monospace',fontSize:'11px',color:'#80ff80'}).setScrollFactor(0).setDepth(101);
    this.wepTxt=this.add.text(W-14,14,'',{fontFamily:'monospace',fontSize:'11px',color:'#c0a0ff'}).setOrigin(1,0).setScrollFactor(0).setDepth(101);
    this.chapTxt=this.add.text(W/2,8,`Chapter ${this.ld.chapter}: ${this.ld.name}`,{fontFamily:"'Cinzel Decorative',cursive",fontSize:'11px',color:'#c9a84c'}).setOrigin(0.5,0).setScrollFactor(0).setDepth(101);
    this.comboTxt=this.add.text(W/2,H*0.35,'',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'20px',color:'#ffa040'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

  updateHUD(){
    const p=this.player,g=this.hudGfx;
    g.clear();

    // HP bar
    const bw=150,bh=12,bx=12,by=12;
    g.fillStyle(0x000000,0.65);g.fillRect(bx-2,by-2,bw+4,bh+4);
    g.fillStyle(0x440000,1);g.fillRect(bx,by,bw,bh);
    const hPct=Math.max(0,p.hp/p.maxHp);
    g.fillStyle(hPct>0.5?0x30c050:hPct>0.25?0xffa000:0xe03030,1);
    g.fillRect(bx,by,bw*hPct,bh);
    g.lineStyle(1,0xc9a84c,0.5);g.strokeRect(bx,by,bw,bh);
    this.hpTxt.setText(`${MP.active?MP.p1name:'HP'} ${p.hp}/${p.maxHp}`);

    // Special move cooldown bar
    const sp=SPECIALS[SAVE.skin];
    if(sp){
      const sbw=80,sbh=5,sbx=12,sby=38;
      g.fillStyle(0x000000,0.5);g.fillRect(sbx-1,sby-1,sbw+2,sbh+2);
      const spPct=p.specialCD>0?1-(p.specialCD/sp.cooldown):1;
      g.fillStyle(p.specialCD>0?0x400040:0x8040c0,1);g.fillRect(sbx,sby,sbw,sbh);
      g.fillStyle(p.specialCD>0?0xc040ff:0xff80ff,1);g.fillRect(sbx,sby,sbw*spPct,sbh);
    }

    // P2 HUD
    if(this.p2&&!this.p2.dead){
      const p2bw=120,p2bh=10,p2bx=W-136,p2by=12;
      g.fillStyle(0x000000,0.65);g.fillRect(p2bx-2,p2by-2,p2bw+4,p2bh+4);
      g.fillStyle(0x002040,1);g.fillRect(p2bx,p2by,p2bw,p2bh);
      g.fillStyle(0x40c0ff,1);g.fillRect(p2bx,p2by,p2bw*(this.p2.hp/this.p2.maxHp),p2bh);
      g.lineStyle(1,0x40c0ff,0.5);g.strokeRect(p2bx,p2by,p2bw,p2bh);
      if(!this._p2HudTxt) this._p2HudTxt=this.add.text(W-14,26,'',{fontFamily:'monospace',fontSize:'11px',color:'#40c0ff'}).setOrigin(1,0).setScrollFactor(0).setDepth(101);
      this._p2HudTxt.setText(`${MP.p2name} ${this.p2.hp}/${this.p2.maxHp}`);
    }

    // XP bar
    const xbw=100,xbh=6,xbx=12,xby=27;
    g.fillStyle(0x000000,0.5);g.fillRect(xbx-1,xby-1,xbw+2,xbh+2);
    g.fillStyle(0x006020,1);g.fillRect(xbx,xby,xbw,xbh);
    g.fillStyle(0x40ff80,1);g.fillRect(xbx,xby,Math.min(xbw,xbw*(SAVE.xp%100)/100),xbh);
    this.xpTxt.setText(`XP ${SAVE.xp}`);
    this.wepTxt.setText(`${WEAPONS[SAVE.weapon].name}  ${ARMOURS[SAVE.armour].name.split(' ')[0]}`);

    // Combo
    if(this.comboCount>=3){
      this.comboTxt.setText(`${this.comboCount}x COMBO!`);
      this.comboTxt.setAlpha(Math.min(1,this.comboTimer/0.5));
    } else this.comboTxt.setText('');

    // Companion charge bar
    if(this.companion&&!this.companion.dead){
      const comp=this.companion;
      const cd=COMPANIONS[SAVE.companion];
      const cbw=80,cbh=5,cbx=W-94,cby=32;
      g.fillStyle(0x000000,0.5);g.fillRect(cbx-1,cby-1,cbw+2,cbh+2);
      if(comp.onCooldown){
        const pct=1-(comp.cooldownT/cd.cooldown);
        g.fillStyle(0x400000,1);g.fillRect(cbx,cby,cbw,cbh);
        g.fillStyle(0xff4040,1);g.fillRect(cbx,cby,cbw*pct,cbh);
      } else {
        g.fillStyle(0x002000,1);g.fillRect(cbx,cby,cbw,cbh);
        g.fillStyle(0x40ff80,1);g.fillRect(cbx,cby,cbw*(comp.charges/cd.chargeMax),cbh);
      }
    }
    // Boss HP bar
    if(this.boss.active&&!this.boss.dead){
      const bbw=260,bbh=10,bbx=W/2-130,bby=H-46;
      g.fillStyle(0x000000,0.7);g.fillRect(bbx-2,bby-2,bbw+4,bbh+4);
      g.fillStyle(0x220022,1);g.fillRect(bbx,bby,bbw,bbh);
      const bp=Math.max(0,this.boss.hp/this.boss.maxHp);
      g.fillStyle(bp>0.5?0xe03030:0xff6600,1);g.fillRect(bbx,bby,bbw*bp,bbh);
      g.lineStyle(1,0xaa40ff,0.7);g.strokeRect(bbx,bby,bbw,bbh);
    }
  }

  buildMobileControls(){
    // Transparent D-pad — low opacity at rest, visible when pressed
    const BASE_ALPHA=0.18;  // very transparent at rest
    const PRESS_ALPHA=0.65; // visible when pressed

    const dpadY=H-52;
    // Button layout
    const BTNS=[
      {cx:38,  cy:dpadY,    w:50,h:44, key:'left',      label:'◀', col:0xc9a84c},
      {cx:92,  cy:dpadY,    w:50,h:44, key:'right',     label:'▶', col:0xc9a84c},
      {cx:146, cy:dpadY,    w:50,h:44, key:'jump',      label:'↑', col:0x60c0ff},
      {cx:W-42, cy:dpadY,   w:50,h:44, key:'atk',       label:'⚔', col:0xe03030},
      {cx:W-96, cy:dpadY,   w:50,h:44, key:'special',   label:'✦', col:0x8040c0, cooldownKey:'specialCD', cooldownMax:'specialCooldown'},
      {cx:W-42, cy:dpadY-52,w:50,h:40, key:'superpower',label:'★', col:0xffd060, cooldownKey:'superCD',   cooldownMax:'superCooldownMax'},
      {cx:W-96, cy:dpadY-52,w:50,h:40, key:'mount',     label:'🐾',col:0x40c060, cooldownKey:'mountAbilityCD', cooldownMax:'mountAbilityMax'},
      {cx:W-152,cy:dpadY-52,w:50,h:40, key:'weapon',    label:'🗡', col:0xc0a040},
      {cx:20,   cy:H-100,   w:36,h:36, key:'pause',     label:'⏸', col:0x8080a0},
    ];
    this._touchBtns=BTNS;
    this.vBtn={left:false,right:false,jump:false,atk:false,comp:false,special:false,superpower:false,mount:false};

    // Draw static button backgrounds (low opacity)
    const bg=this.add.graphics().setScrollFactor(0).setDepth(102).setAlpha(BASE_ALPHA);
    BTNS.forEach(b=>{
      bg.fillStyle(0x000000,0.9);
      bg.fillRoundedRect(b.cx-b.w/2,b.cy-b.h/2,b.w,b.h,8);
      bg.lineStyle(1.5,b.col,1);
      bg.strokeRoundedRect(b.cx-b.w/2,b.cy-b.h/2,b.w,b.h,8);
    });

    // Labels
    BTNS.forEach(b=>{
      this.add.text(b.cx,b.cy,b.label,{
        fontFamily:'monospace',fontSize:'14px',
        color:'#'+b.col.toString(16).padStart(6,'0')
      }).setOrigin(0.5).setScrollFactor(0).setDepth(103).setAlpha(BASE_ALPHA+0.1);
    });

    // Press feedback — separate graphics that highlight active buttons
    this._pressGfx=this.add.graphics().setScrollFactor(0).setDepth(104);

    // Weapon popup menu (hidden by default)
    this._weaponMenuOpen=false;
    this._weaponMenuItems=[];

    // Multi-touch state
    this._touches={};
    this._lastAtkTap=0;

    const ptInBtn=(px,py,b)=>px>=b.cx-b.w/2&&px<=b.cx+b.w/2&&py>=b.cy-b.h/2&&py<=b.cy+b.h/2;

    const onDown=(ptr)=>{
      ensureAudio();
      const px=ptr.x,py=ptr.y;
      if(this._weaponMenuOpen&&py<H-130){ this.closeWeaponMenu(); return; }
      BTNS.forEach(b=>{
        if(ptInBtn(px,py,b)){
          if(b.key==='weapon'){ this.toggleWeaponMenu(); return; }
          if(b.key==='pause'){ this.togglePause(); return; }
          this.vBtn[b.key]=true;
          this._touches[ptr.id]=b.key;
        }
      });
    };
    const onUp=(ptr)=>{
      const key=this._touches[ptr.id];
      if(key){ this.vBtn[key]=false; delete this._touches[ptr.id]; }
    };
    const onMove=(ptr)=>{
      if(!ptr.isDown) return;
      const prev=this._touches[ptr.id];
      if(prev){ this.vBtn[prev]=false; }
      const px=ptr.x,py=ptr.y;
      let found=null;
      BTNS.forEach(b=>{ if(b.key!=='weapon'&&ptInBtn(px,py,b)) found=b; });
      if(found){ this.vBtn[found.key]=true; this._touches[ptr.id]=found.key; }
      else delete this._touches[ptr.id];
    };

    this.input.on('pointerdown',onDown);
    this.input.on('pointerup',onUp);
    this.input.on('pointermove',onMove);
    this.input.on('pointercancel',onUp);

    // Update press highlights AND liquid cooldown fills each frame
    this.events.on('preupdate',()=>{
      const g=this._pressGfx; g.clear();
      const p=this.player;
      BTNS.forEach(b=>{
        const bx=b.cx-b.w/2, by=b.cy-b.h/2;

        // Liquid cooldown fill (bottom to top) for ability buttons
        if(b.cooldownKey && p){
          const cd=p[b.cooldownKey]||0;
          let maxCD=0;
          if(b.key==='special'){ const sp=SPECIALS[SAVE.skin]; maxCD=sp?sp.cooldown:10; }
          else if(b.key==='superpower'){ const sp=SUPERPOWERS[SAVE.skin]; maxCD=sp?sp.cooldown:20; }
          else if(b.key==='mount'){ maxCD=8; }

          if(maxCD>0){
            const pct=Math.max(0,Math.min(1, cd>0 ? 1-(cd/maxCD) : 1));
            const fillH=Math.round(b.h*pct);
            const fillY=by+b.h-fillH;

            if(pct<1){
              // Dark empty portion at top
              g.fillStyle(0x000000,0.5);
              g.fillRoundedRect(bx,by,b.w,b.h-fillH,{tl:8,tr:8,bl:0,br:0});
              // Coloured liquid rising from bottom
              g.fillStyle(b.col,0.35);
              g.fillRoundedRect(bx,fillY,b.w,fillH,{tl:0,tr:0,bl:8,br:8});
              // Bright liquid surface line
              g.fillStyle(b.col,0.7);
              g.fillRect(bx,fillY,b.w,2);
              // Bubble shimmer on liquid surface
              g.fillStyle(0xffffff,0.25);
              g.fillCircle(bx+b.w*0.3,fillY+1,2);
              g.fillCircle(bx+b.w*0.7,fillY+2,1.5);
            } else {
              // Fully charged — bright pulsing glow fill
              const pulse=0.5+Math.sin(Date.now()*0.005)*0.3;
              g.fillStyle(b.col,0.2+pulse*0.15);
              g.fillRoundedRect(bx,by,b.w,b.h,8);
              g.lineStyle(2,b.col,0.7+pulse*0.3);
              g.strokeRoundedRect(bx,by,b.w,b.h,8);
            }
          }
        }

        // Press highlight on top of fill
        if(b.key!=='weapon'&&b.key!=='pause'&&this.vBtn[b.key]){
          g.fillStyle(b.col,0.32);
          g.fillRoundedRect(bx,by,b.w,b.h,8);
          g.lineStyle(2,b.col,1);
          g.strokeRoundedRect(bx,by,b.w,b.h,8);
        }
      });
    });
  }

  toggleWeaponMenu(){
    if(this._weaponMenuOpen) this.closeWeaponMenu();
    else this.openWeaponMenu();
  }

  openWeaponMenu(){
    this._weaponMenuOpen=true;
    const owned=SAVE._ownedWeapons||['sword'];
    const icons={sword:'⚔ Sword',bow:'🏹 Bow',axe:'🪓 Axe',staff:'✨ Staff',shield:'🛡 Shield'};
    const menuW=180,itemH=44,menuX=W/2-menuW/2,menuY=H-80-owned.length*itemH;

    // Background panel
    const panel=this.add.graphics().setScrollFactor(0).setDepth(200);
    panel.fillStyle(0x06020f,0.95);panel.fillRoundedRect(menuX-8,menuY-8,menuW+16,owned.length*itemH+16,10);
    panel.lineStyle(1,0xc9a84c,0.6);panel.strokeRoundedRect(menuX-8,menuY-8,menuW+16,owned.length*itemH+16,10);
    this._weaponMenuItems.push(panel);

    owned.forEach((wid,i)=>{
      const iy=menuY+i*itemH;
      const isActive=SAVE.weapon===wid;
      const row=this.add.graphics().setScrollFactor(0).setDepth(201);
      if(isActive){row.fillStyle(0xc9a84c,0.15);row.fillRoundedRect(menuX,iy,menuW,itemH-2,6);}
      this._weaponMenuItems.push(row);

      const label=this.add.text(menuX+12,iy+itemH/2,icons[wid]||wid,{
        fontFamily:'monospace',fontSize:'14px',
        color:isActive?'#c9a84c':'#e8dcc8'
      }).setOrigin(0,0.5).setScrollFactor(0).setDepth(202);
      this._weaponMenuItems.push(label);

      if(isActive){
        const check=this.add.text(menuX+menuW-12,iy+itemH/2,'✓',{fontFamily:'monospace',fontSize:'14px',color:'#40ff80'}).setOrigin(1,0.5).setScrollFactor(0).setDepth(202);
        this._weaponMenuItems.push(check);
      }

      const zone=this.add.zone(menuX,iy,menuW,itemH-2).setOrigin(0).setInteractive().setScrollFactor(0).setDepth(203);
      zone.on('pointerdown',()=>{ this.switchWeapon(wid); this.closeWeaponMenu(); });
      this._weaponMenuItems.push(zone);
    });

    const closeHint=this.add.text(menuX+menuW/2,menuY-20,'Tap weapon to switch',{fontFamily:'monospace',fontSize:'9px',color:'#5a4a6a'}).setOrigin(0.5).setScrollFactor(0).setDepth(202);
    this._weaponMenuItems.push(closeHint);
  }

  closeWeaponMenu(){
    this._weaponMenuOpen=false;
    this._weaponMenuItems.forEach(item=>{ if(item&&item.destroy) item.destroy(); });
    this._weaponMenuItems=[];
  }

  switchWeapon(wid){
    if(!WEAPONS[wid]) return;
    SAVE.weapon=wid;
    SFX.shield();
    this.showDmgNum(this.player.spr.x,this.player.spr.y-60,WEAPONS[wid].name,'#c9a84c');
  }

  cycleWeapon(){
    if(!SAVE._ownedWeapons||SAVE._ownedWeapons.length<2) return;
    const idx=SAVE._ownedWeapons.indexOf(SAVE.weapon);
    const next=SAVE._ownedWeapons[(idx+1)%SAVE._ownedWeapons.length];
    this.switchWeapon(next);
  }

  buildPauseMenu(){
    // Pre-build pause overlay (hidden)
    this.pauseOverlay=this.add.graphics().setScrollFactor(0).setDepth(200);
    this.pauseOverlay.setVisible(false);
    this.pauseText=[];

    const items=[
      {label:'RESUME',y:H/2-20,action:()=>this.togglePause()},
      {label:'RESTART LEVEL',y:H/2+20,action:()=>{gamePaused=false;stopAmbient();this.scene.start('Game',{level:this.levelIndex});}},

      const t=this.add.text(W/2,item.y,item.label,{
        fontFamily:"'Cinzel Decorative',cursive",fontSize:'16px',color:'#c9a84c'
      }).setOrigin(0.5).setScrollFactor(0).setDepth(201).setVisible(false).setInteractive();

  togglePause(){
    gamePaused=!gamePaused;
    SFX.pause();
    this.pauseOverlay.setVisible(gamePaused);
    this.pauseText.forEach(t=>t.setVisible(gamePaused));
    if(gamePaused){
      this.pauseOverlay.clear();
      this.pauseOverlay.fillStyle(0x000000,0.75);this.pauseOverlay.fillRect(0,0,W,H);

      this._pauseStatTxt=this.add.text(W/2,H/2-60,
