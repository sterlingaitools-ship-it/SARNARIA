    this.tweens.add({targets:[box,txt],alpha:{from:0,to:1},duration:500});
    this.time.delayedCall(4000,()=>{
      this.tweens.add({targets:[box,txt],alpha:0,duration:600,onComplete:()=>{box.destroy();txt.destroy();}});
    });
  }

  // ── UPDATE ─────────────────────────────────────────────────────────────────
  update(time,delta){
    const dt=delta*0.001;

    // ESC to pause
    const escJustDown=(!this._escWas&&this.keys.esc.isDown);
    this._escWas=this.keys.esc.isDown;
    if(escJustDown) this.togglePause();
    if(gamePaused) return;

    // Hit pause (freeze frames on heavy impact)
    if(hitPauseFrames>0){ hitPauseFrames--; return; }

    this.t+=dt;
    this.drawBackground();
    this.drawWeather(dt);

    // Victory pose before portal
    if(this.victoryPosing){
      this.victoryTimer-=dt;
      if(this.victoryTimer<=0){ this.victoryPosing=false; this.openPortal(); }
      this.drawAll();
      this.updateHUD();
      this.updateParticles();
      return;
    }

    if(!this.player.dead){
      this.updatePlayer(dt);
      if(this.p2&&!this.p2.dead) this.updateP2(dt);
      else if(this.p2&&this.p2.dead&&MP.active) this.updateP2Ghost(dt);
      this.updateThrownAxe(dt);
      this.updateEnemies(dt);
      this.updateBoss(dt);
      this.updateCompanion(dt);
      this.updateProjectiles(dt);
      this.updateHpOrbs(dt);
      this.updateSpecialFX(dt);
      this.updateMount(dt);
      this.updateSuperpower(dt);
      this.updateRiverCurrent(dt);
      this.checkPortal();
      this.updateRegen(dt);
      this.checkXpLevelUp();
      this.checkTeamworkCombo();
    }

    this.drawAll();
    this.updateHUD();
    this.updateMinimap();
    this.updateVignette();
    this.updateParticles();
    this.syncOnline(dt);

    if(this.comboCount>0){ this.comboTimer-=dt; if(this.comboTimer<=0){this.comboCount=0;} }
    if(this.teamworkTimer>0) this.teamworkTimer-=dt;
  }

  syncOnline(dt){
    if(!ONLINE.active) return;
    const p=this.player, ps=p.spr;

    // Interpolate remote player position (smooth movement)
    ONLINE.interpolate(dt);

    // Send our own state
    ONLINE.sendPlayerState({
      x:Math.round(ps.x), y:Math.round(ps.y),
      dir:p.dir, hp:p.hp, maxHp:p.maxHp,
      atk:p.atk, wk:p.wk||0,
      skin:SAVE.skin, weapon:SAVE.weapon,
    });

    // HOST: send enemy and boss state to guest every 3 frames
    if(ONLINE.isHost){
      if(!this._syncFrame) this._syncFrame=0;
      this._syncFrame++;
      if(this._syncFrame%3===0){
        ONLINE.sendEnemyState(this.enemies, this.boss.active?this.boss:null);
      }
      // Handle remote attacks from guest
      if(!ONLINE._handleRemoteAttack){
        ONLINE._handleRemoteAttack=(payload)=>{
          // Find enemy by id and apply damage
          const e=this.enemies.find(e=>e._id===payload.id&&!e.dead);
          if(e) this.hitEntity(e, payload.dmg, payload.dir||1, true);
          // Boss attack
          if(payload.id==='boss'&&this.boss.active&&!this.boss.dead){
            this.hitBoss(payload.dmg, payload.dir||1);
          }
        };
      }
    }

    // GUEST: apply enemy sync from host
    if(!ONLINE.isHost){
      if(ONLINE._pendingEnemySync){
        const sync=ONLINE._pendingEnemySync;
        ONLINE._pendingEnemySync=null;
        sync.enemies.forEach(es=>{
          const e=this.enemies.find(e=>e._id===es.id);
          if(e){
            e.hp=es.hp;
            if(es.dead&&!e.dead){ e.dead=true; e.dying=true; e.dyingTimer=0.35; }
          }
        });
      }
      if(ONLINE._pendingBossSync){
        const bs=ONLINE._pendingBossSync;
        ONLINE._pendingBossSync=null;
        if(this.boss.active){
          this.boss.hp=bs.hp;
          this.boss.phase=bs.phase;
          if(bs.dead&&!this.boss.dead){
            this.boss.dead=true;
            this.bossTxt.setText(`${this.ld.boss.name} defeated!`);
            SFX.bossRoar();
            this.time.delayedCall(900,()=>{ this.boss.gfx&&this.boss.gfx.clear(); this.victoryPosing=true; this.victoryTimer=2.0; });
          }
        }
      }
    }

    // Draw remote player with full detail
    if(ONLINE.remoteRender){
      this.drawRemotePlayer(this.charGfx, ONLINE.remoteRender);
    }
  }

  drawRemotePlayer(g, state){
    if(!state||!state.x) return;
    const {x,y,dir,hp,maxHp,skin,atk,wk} = state;
    const sk = SKINS[skin] || SKINS.alvano;
    const f = dir||1;
    const t=this.t;

    // Use same detail level as local player
    // Shadow
    g.fillStyle(0x000000,0.2); g.fillEllipse(x,y+22,30,8);

    const ll=Math.sin((wk||0)*1.57)*8;
    const rl=-Math.sin((wk||0)*1.57)*8;

    // Boots
    g.fillStyle(sk.bootCol||0x2a1404,1);
    g.fillEllipse(x-5,y+21+ll,14,8); g.fillEllipse(x+5,y+21+rl,14,8);
    g.fillRect(x-9,y+12+ll,9,11); g.fillRect(x+1,y+12+rl,9,11);

    // Legs
    g.fillStyle(sk.bodyCol,1);
    g.fillRect(x-8,y+2,7,12+ll); g.fillRect(x+1,y+2,7,12+rl);

    // Body/cloak
    g.fillStyle(sk.cloakCol,1);
    g.fillTriangle(x,y-16,x-f*16,y+8,x+f*7,y+8);
    g.fillStyle(sk.bodyCol,1); g.fillRect(x-8,y-16,16,20);

    // Arms
    g.fillStyle(sk.bodyCol,1);
    g.fillRect(x-18,y-16,10,4); g.fillRect(x+8,y-16,10,4);

    // Weapon
    if(atk){
      g.fillStyle(sk.accentCol||0xc9a84c,0.9);
      g.fillRect(x+f*10,y-26,f*3,22);
      g.fillRect(x+f*7,y-14,f*9,3);
    }

    // Head
    g.fillStyle(sk.headCol,1); g.fillCircle(x,y-24,10);
    g.fillStyle(sk.hoodCol,0.85); g.fillCircle(x,y-26,8);
    g.fillStyle(sk.eyeCol,0.9); g.fillCircle(x+f*4,y-25,2.5);
    g.fillStyle(0x000000,0.6); g.fillCircle(x+f*4,y-25,1.2);

    // Special features per skin
    if(skin==='roar'){
      g.fillStyle(sk.hairCol||0x3a1a04,1);g.fillCircle(x,y-26,14);
      g.fillStyle(0xa06010,0.7);g.fillCircle(x,y-26,10);
      g.fillStyle(sk.headCol,1);g.fillEllipse(x,y-24,18,14);
      g.fillStyle(sk.eyeCol,1);g.fillEllipse(x-5,y-26,6,4);g.fillEllipse(x+5,y-26,6,4);
    }
    if(skin==='liam'){
      g.fillStyle(sk.cloakCol,1);
      g.fillTriangle(x,y-52,x-10,y-34,x+10,y-34);
      g.fillRect(x-13,y-36,26,5);
      g.fillStyle(0xc9a84c,0.8);g.fillCircle(x,y-46,2.5);
    }
    if(skin==='vampirina'){
      g.fillStyle(0x300040,0.75);
      g.fillTriangle(x-8,y-20,x-36,y-46,x,y-10);
      g.fillTriangle(x+8,y-20,x+36,y-44,x,y-10);
      g.fillStyle(0xff0030,0.9);g.fillCircle(x-4,y-25,3);g.fillCircle(x+4,y-25,3);
    }
    if(skin==='levi'){
      g.fillStyle(sk.cloakCol,1);g.fillRect(x-12,y-32,24,5);
      g.fillTriangle(x,y-44,x-9,y-32,x+9,y-32);
    }

    // Name tag
    const name=ONLINE.isHost?(MP.p2name||'P2'):(MP.p1name||'P1');
    if(!this._remoteTxt){
      this._remoteTxt=this.add.text(0,0,name,{
        fontFamily:'monospace',fontSize:'9px',color:'#40ff80',
        stroke:'#000000',strokeThickness:2
      }).setDepth(13);
    }
    this._remoteTxt.setPosition(x-this._remoteTxt.width/2, y-50);

    // HP bar
    g.fillStyle(0x002000,0.7); g.fillRect(x-18,y-44,36,4);
    g.fillStyle(0x40ff40,1); g.fillRect(x-18,y-44,Math.max(0,36*(hp/maxHp)),4);
  }

  // ── PLAYER UPDATE ──────────────────────────────────────────────────────────
  updatePlayer(dt){
    const p=this.player,ps=p.spr,k=this.keys,v=this.vBtn;
    if(p.dead) return;

    const jumpJustDown=(!this._jumpWas&&(k.up.isDown||k.z.isDown||v.jump));
    const atkDown=k.x.isDown||k.space.isDown||v.atk;
    const atkJustDown=(!this._atkWas&&atkDown);
    const atkJustUp=(this._atkWas&&!atkDown);
    const specialJustDown=(!this._specialWas&&(k.q.isDown||v.special));
    this._jumpWas=k.up.isDown||k.z.isDown||v.jump;
    this._atkWas=atkDown;
    this._specialWas=k.q.isDown||v.special;

    if(p.inv){p.invTimer-=dt;if(p.invTimer<=0)p.inv=false;}
    if(p.rolling){p.rollTimer-=dt;if(p.rollTimer<=0)p.rolling=false;}
    if(p.atk){p.atkTimer-=dt;if(p.atkTimer<=0)p.atk=false;}

    p.onGround=ps.body.blocked.down;

    const goL=k.left.isDown||v.left;
    const goR=k.right.isDown||v.right;
    const spd=p.rolling?280:180;

    if(goL){ps.setVelocityX(-spd);p.dir=-1;}
    else if(goR){ps.setVelocityX(spd);p.dir=1;}
    else ps.setVelocityX(0);

    if(jumpJustDown&&p.onGround){ ps.setVelocityY(-540); SFX.jump(); p.mountDoubleJumped=false; }
    // Mount double jump
    if(jumpJustDown&&!p.onGround&&p.mount&&MOUNTS[p.mount]?.doubleJump&&!p.mountDoubleJumped){
      ps.setVelocityY(-480); p.mountDoubleJumped=true; SFX.jump();
      this.spawnHits(ps.x,ps.y,0xff80ff);
    }

    // Landing thud
    if(!this._wasOnGround&&ps.body.blocked.down&&Math.abs(ps.body.velocity.y)>100){
      SFX.land();
      if(SAVE.skin==='roar') this.cameras.main.shake(100,0.004); // heavy landing
    }
    this._wasOnGround=ps.body.blocked.down;

    // Float height adjustment per skin
    const sk=SKINS[SAVE.skin]||SKINS.alvano;
    if(sk.floatHeight>0&&p.onGround){
      ps.setY(ps.y-sk.floatHeight*0.3);
    }

    // Mount speed bonus
    if(p.mount&&MOUNTS[p.mount]){
      const mSpd=MOUNTS[p.mount].speed||1;
      ps.setVelocityX(ps.body.velocity.x*mSpd);
    }

    // Superpower (E key or superpower button)
    const superJustDown=(!this._superWas&&(k.e.isDown||v.superpower));
    this._superWas=k.e.isDown||v.superpower||false;
    if(superJustDown&&p.superCD<=0) this.useSuperpower(p,SAVE.skin);
    if(p.superCD>0) p.superCD-=dt;
    if(p.superActive){ p.superTimer-=dt; if(p.superTimer<=0){p.superActive=false;this.endSuperpower(p,SAVE.skin);} }

    // Mount action (separate from special — uses mount button)
    const mountJustDown=(!this._mountWas&&(v.mount));
    this._mountWas=v.mount||false;
    if(mountJustDown&&p.mount) this.useMountAbility(p);

    // Axe charge & throw
    if(SAVE.weapon==='axe'&&!p.axeThrown){
      if(atkDown&&!p.atk){ p.atkHeld+=dt; }
      if(atkJustUp){
        if(p.atkHeld>0.5){
          // Throw!
          this.throwAxe();
          p.atkHeld=0;
        } else {
          // Normal swing
          p.atk=true; p.atkTimer=WEAPONS.axe.speed;
          p.atkHeld=0;
          this.doAttack();
        }
      }
    } else if(SAVE.weapon!=='axe'){
      p.atkHeld=0;
      if(atkJustDown&&!p.atk){
        const w=WEAPONS[SAVE.weapon];
        p.atk=true;p.atkTimer=w.speed;
        this.doAttack();
      }
    }

    // Shield block
    if(SAVE.weapon==='shield'){
      const holdC=k.c.isDown||v.comp;
      p.blocking=holdC; SAVE.blocking=holdC;
    } else {
      p.blocking=false; SAVE.blocking=false;
      if((Phaser.Input.Keyboard.JustDown(k.c)||v.comp)&&SAVE.weapon!=='shield') this.companionAttack();
    }

    // Special move (Q key or mobile special btn)
    if(specialJustDown) this.useSpecial(this.player,SAVE.skin);

    // Special cooldown tick
    if(p.specialCD>0) p.specialCD-=dt;

    if(Math.abs(ps.body.velocity.x)>10&&p.onGround){p.wkT+=dt;if(p.wkT>0.1){p.wkT=0;p.wk=(p.wk+1)%4;}}
    else p.wk=0;
  }

  throwAxe(){
    const p=this.player,ps=p.spr;
    p.axeThrown=true;
    this.thrownAxe={
      x:ps.x, y:ps.y-20,
      vx:p.dir*480, vy:-90,
      spin:0, returning:false,
      hitEnemies:new Set(),
      life:2.4,
    };
    this.showDmgNum(ps.x,ps.y-50,'AXE THROW!','#c9a84c');
    SFX.axeThrow();
  }

  updateThrownAxe(dt){
    const ax=this.thrownAxe;
    if(!ax||!this.player.axeThrown) return;
    const ps=this.player.spr;

    ax.spin+=dt*12;
    ax.life-=dt;

    // Arc out then return
    if(!ax.returning&&ax.life<1.0) ax.returning=true;

    if(ax.returning){
      // Home toward player
      const dx=ps.x-ax.x, dy=ps.y-20-ax.y;
      const dist=Math.hypot(dx,dy);
      const spd=520;
      ax.vx=lerp(ax.vx,(dx/dist)*spd,dt*6);
      ax.vy=lerp(ax.vy,(dy/dist)*spd,dt*6);
      // Catch
      if(dist<30){
        this.thrownAxe=null;
        this.player.axeThrown=false;
        this.showDmgNum(ps.x,ps.y-40,'Caught!','#c9a84c');
        return;
      }
    } else {
      ax.vy+=400*dt; // gravity
    }

    ax.x+=ax.vx*dt;
    ax.y+=ax.vy*dt;

    // Hit enemies on the way
    const hitDmg=32+rnd(0,10);
    this.enemies.forEach(e=>{
      if(e.dead||ax.hitEnemies.has(e)) return;
      if(Math.hypot(e.spr.x-ax.x,e.spr.y-ax.y)<28){
        ax.hitEnemies.add(e);
        if(ax.returning) ax.hitEnemies.clear(); // on return can re-hit
        this.hitEntity(e,hitDmg,Math.sign(ax.vx),true);
      }
    });
    if(this.boss.active&&!this.boss.dead){
      if(Math.hypot(this.boss.spr.x-ax.x,this.boss.spr.y-ax.y)<40){
        this.hitBoss(hitDmg,Math.sign(ax.vx));
      }
    }

    // Bounce off world edges
    if(ax.x<10||ax.x>this.worldW-10) ax.vx*=-1;
    if(ax.y>this.groundY) { ax.vy*=-0.5; ax.y=this.groundY; ax.returning=true; }
  }

  // ── ATTACK ─────────────────────────────────────────────────────────────────
  doAttack(){
    const p=this.player,ps=p.spr;
    const w=WEAPONS[SAVE.weapon];

    if(w.proj){
      this.projectiles.push({x:ps.x+p.dir*20,y:ps.y-10,vx:w.projSpeed*p.dir,vy:0,dmg:rnd(w.dmg[0],w.dmg[1]),color:w.projColor,life:1.2,splash:w.splash||false,r:w===WEAPONS.staff?10:5,owner:'player'});
      SAVE.weapon==='bow'?SFX.arrowShoot():SFX.staffCast();
    } else {
      // Melee
      const range=w.range;
      const ax=ps.x+p.dir*range*0.55;
      let hitSomething=false;

      this.enemies.forEach(e=>{
        if(e.dead) return;
        if(Math.abs(e.spr.x-ax)<range&&Math.abs(e.spr.y-ps.y)<55){
          const dmg=rnd(w.dmg[0],w.dmg[1]);
          this.hitEntity(e,dmg,p.dir,true);
          hitSomething=true;
        }
      });

      if(this.boss.active&&!this.boss.dead){
        const b=this.boss;
        if(Math.abs(b.spr.x-ax)<range+24&&Math.abs(b.spr.y-ps.y)<65){
          const dmg=rnd(w.dmg[0],w.dmg[1]);
          this.hitBoss(dmg,p.dir);
          hitSomething=true;
        }
      }

      if(hitSomething){
        SAVE.weapon==='axe'?SFX.heavyHit():SFX.swordSwing();
        this.comboCount++;this.comboTimer=1.8;
        if(this.comboCount>=3) this.cameras.main.shake(80,0.003);
      }
    }
  }

  hitEntity(e,dmg,dir,fromPlayer){
    if(fromPlayer) dmg=Math.max(1,dmg);
    // If we're guest in online mode, send attack to host instead of processing locally
    if(ONLINE.active&&!ONLINE.isHost&&fromPlayer){
      ONLINE.sendAttack(e._id, dmg, dir);
      // Still show local hit flash for feel
      this.spawnHits(e.spr.x,e.spr.y,0xff4040);
      return;
    }
    // Critical hit — 15% chance
    let isCrit=false;
    if(fromPlayer&&Math.random()<0.15){ dmg=Math.round(dmg*1.5); isCrit=true; }
    e.hp-=dmg;
    e.knockback=dir*5;
    this.spawnHits(e.spr.x,e.spr.y,isCrit?0xffcc00:0xff4040);
    this.showDmgNum(e.spr.x,e.spr.y-24,isCrit?`${dmg}!`:dmg,isCrit?'#ffcc00':'#ff8060');
    if(isCrit){ SFX.crit(); hitPauseFrames=3; }
    this.lastP1HitTime=this.t; // for teamwork tracking
    // Enrage at low HP (Sarnaria difficulty)
    if(this.diff?.enrage&&e.hp>0&&e.hp<e.maxHp*0.25&&!e.enraged){
      e.enraged=true; e.spd=Math.round(e.spd*1.5); e.dmg=Math.round(e.dmg*1.4);
      this.showDmgNum(e.spr.x,e.spr.y-40,'ENRAGED!','#ff4000');
    }
    if(e.hp<=0&&!e.dead){
      e.dead=true;
      const xpGain=rnd(8,18);
      SAVE.xp+=xpGain; SAVE.score+=50;
      this.showDmgNum(e.spr.x,e.spr.y-40,`+${xpGain}XP`,'#80ff80');
      this.onEnemyKilledHeal();
      // Death flash — white shrink fade
      e.dying=true; e.dyingTimer=0.35;
      this.time.delayedCall(350,()=>{ if(e.gfx) e.gfx.clear(); if(e.spr) e.spr.destroy(); });
    }
  }

  hitBoss(dmg,dir){
    // Guest sends boss attack to host
    if(ONLINE.active&&!ONLINE.isHost){
      ONLINE.sendAttack('boss', dmg, dir);
      this.spawnHits(this.boss.spr.x,this.boss.spr.y,0xff40ff);
      return;
    }
    const b=this.boss;
    // Crit check
    let isCrit=Math.random()<0.12;
    if(isCrit) dmg=Math.round(dmg*1.5);
    b.hp-=dmg;
    b.knockback=dir*4;
    this.spawnHits(b.spr.x,b.spr.y,isCrit?0xffcc00:0xff40ff);
    this.showDmgNum(b.spr.x,b.spr.y-35,isCrit?`${dmg}!`:dmg,isCrit?'#ffdd00':'#ff80ff');
    this.cameras.main.shake(isCrit?200:120,isCrit?0.008:0.004);
    if(isCrit){ SFX.crit(); hitPauseFrames=4; }
    if(b.hp<=0&&!b.dead){
      b.dead=true;
      SAVE.xp+=40; SAVE.score+=300;
      this.showDmgNum(b.spr.x,b.spr.y-50,'+40XP','#c9a84c');
      this.bossTxt.setText(`${this.ld.boss.name} defeated!`);
      SFX.bossRoar();
      SFX.victory();
      this.cameras.main.shake(700,0.014);
      const story=STORY_BEATS.bossDefeated[b.type]||`${this.ld.boss.name} has fallen.`;
      this.time.delayedCall(600,()=>this.showStoryBeat(story,'#c9a84c'));
      this.time.delayedCall(900,()=>{
        b.gfx.clear();
        // Victory pose before portal
        this.victoryPosing=true;
        this.victoryTimer=2.0;
        this.showDmgNum(this.player.spr.x,this.player.spr.y-60,'VICTORY!','#ffd060');
      });
    }
  }

  hitPlayer(dmg){
    if(this.player.inv||this.player.dead) return;
    const arm=ARMOURS[SAVE.armour];
    let reduced=Math.max(1,dmg-arm.def);
    // Shield block - reduce by 70% and only if facing attacker
    if(this.player.blocking && SAVE.weapon==='shield'){
      reduced=Math.max(1,Math.round(reduced*0.3));
      this.spawnHits(this.player.spr.x+this.player.dir*20,this.player.spr.y,0x6090ff);
      this.showDmgNum(this.player.spr.x,this.player.spr.y-30,'BLOCKED!','#6090ff');
    }
    this.player.hp-=reduced;
    this.player.inv=true;this.player.invTimer=0.9;
    SFX.playerHit();
    this.cameras.main.shake(180,0.006);
    this.spawnHits(this.player.spr.x,this.player.spr.y,0xff2020);
    if(this.player.hp<=0) this.playerDied();
  }

  // ── REGEN ──────────────────────────────────────────────────────────────────
  updateRegen(dt){
    const p=this.player;
    if(p.hp>=p.maxHp){this.regenTxt.setText('');return;}
    p.regenTimer+=dt;
    if(p.regenTimer>=8){
      p.regenTimer=0;
      const gain=Math.ceil(p.maxHp*0.04);
      p.hp=Math.min(p.maxHp,p.hp+gain);
      this.regenTxt.setText(`+${gain} HP`);
      this.time.delayedCall(900,()=>this.regenTxt.setText(''));
    }
  }


  updateP2(dt){
    const p=this.p2,ps=p.spr,k=this.keys;
    if(!ps.active) return;
    if(p.inv){p.invTimer-=dt;if(p.invTimer<=0)p.inv=false;}
    if(p.atk){p.atkTimer-=dt;if(p.atkTimer<=0)p.atk=false;}
    if(p.specialCD>0) p.specialCD-=dt;
    p.onGround=ps.body.blocked.down;
    const goL=k.p2left.isDown,goR=k.p2right.isDown;

    else if(goR){ps.setVelocityX(180);p.dir=1;}
    else ps.setVelocityX(0);
    if(!this._p2jumpWas&&k.p2up.isDown&&p.onGround) ps.setVelocityY(-540);
    this._p2jumpWas=k.p2up.isDown;
    const atkDown2=k.p2atk.isDown;
    if(!this._p2atkWas&&atkDown2&&!p.atk){p.atk=true;p.atkTimer=0.25;this.doAttackFor(p,SAVE.p2weapon||"sword",SAVE.p2skin||"liam");}
    this._p2atkWas=atkDown2;

    this._p2specialWas=k.p2special.isDown;
    if(!p.regenTimer) p.regenTimer=0;
    p.regenTimer+=dt;
    if(p.regenTimer>=8){p.regenTimer=0;p.hp=Math.min(p.maxHp,p.hp+Math.ceil(p.maxHp*0.04));}
  }

  doAttackFor(player,weapon,skin){

  updateSpecialFX(dt){

    allPlayers.forEach(pl=>{

      if(pl.teleportFlash>0){pl.teleportFlash=Math.max(0,(pl.teleportFlash||0)-dt*3);g.fillStyle(0x4080ff,pl.teleportFlash*0.3);g.fillCircle(pl.spr.x,pl.spr.y-20,40*pl.teleportFlash);}
      if(pl.vineSnares) pl.vineSnares=pl.vineSnares.filter(vs=>{vs.life-=dt;if(vs.life<=0) return false;const al=Math.min(1,vs.life)*0.7;for(let i=0;i<6;i++){const vx=vs.x-22+i*9+Math.sin(this.t*3+i)*3,vy=vs.y+8,vh=25+i%3*9;g.fillStyle(0x208010,al);g.fillRect(vx,vy-vh,3,vh);g.fillStyle(0x40c020,al*0.6);g.fillEllipse(vx+2,vy-vh,9,6);}return true;});
      // Marcel — electric arc trail (dots not lines)
      if(pl.electricArcs){
        pl.electricArcs=pl.electricArcs.filter(a=>{
          a.life-=dt*2.5; if(a.life<=0) return false;
          a.x+=a.dx*dt; a.y+=a.dy*dt;
          g.fillStyle(a.col||0xffee00,a.life*0.7);
          g.fillCircle(a.x,a.y,2.5*a.life);
          g.fillStyle(0xffffff,a.life*0.3);
          g.fillCircle(a.x,a.y,1.2*a.life);
          return true;
        });
      }
      // Marcel — spark aura when moving fast
      if(SAVE.skin==='marcel'||SAVE.p2skin==='marcel'){
        const mps=pl.spr;
        if(Math.abs(mps.body?.velocity?.x||0)>100){
          // Cheek spark
          g.fillStyle(0xffee00,0.4+Math.sin(this.t*8)*0.3);
          g.fillCircle(mps.x-5,mps.y-22,4+Math.sin(this.t*10)*1.5);
          g.fillCircle(mps.x+5,mps.y-22,4+Math.sin(this.t*10+1)*1.5);
        }
      }
      // Marcel thunderbolts (superpower)
      if(pl.thunderbolts){
        pl.thunderbolts=pl.thunderbolts.filter(tb=>{
          tb.life-=dt*2.5; if(tb.life<=0) return false;
          const alpha=tb.life;
          // Jagged bolt as filled rects
          const segH=(tb.y1-(tb.y0||0))/8;
          let py=tb.y0||0;
          for(let s=0;s<8;s++){
            const jag=(s%2===0?1:-1)*(6+s*1.5);
            g.fillStyle(0xffee00,alpha*0.9);
            g.fillRect(tb.x+jag-2,py,5,segH+1);
            g.fillStyle(0xffffff,alpha*0.4);
            g.fillRect(tb.x+jag-1,py,3,segH+1);
            py+=segH;
          }
          // Glow column
          g.fillStyle(0xffee00,alpha*0.12);
          g.fillRect(tb.x-14,tb.y0||0,28,tb.y1-(tb.y0||0));
          // Impact
          g.fillStyle(0xffffff,alpha*0.7);g.fillCircle(tb.x,tb.y1,14*alpha);
          g.fillStyle(0xffee00,alpha);g.fillCircle(tb.x,tb.y1,7*alpha);
          return true;
        });
      }

  updateHpOrbs(dt){
    const g=this.fxGfx;
    this.hpOrbs.forEach(orb=>{
      if(orb.collected) return;
      orb.bob+=dt*2.5;
      const oy=orb.y+Math.sin(orb.bob)*6;
      // Draw orb
      g.fillStyle(0xff4060,0.2+Math.sin(orb.bob)*0.12);g.fillCircle(orb.x,oy,18);
      g.fillStyle(0xff4060,0.9);g.fillCircle(orb.x,oy,8);
      g.fillStyle(0xff8898,0.8);g.fillCircle(orb.x-3,oy-3,4);
      // Cross symbol
      g.fillStyle(0xffffff,0.9);
      g.fillRect(orb.x-4,oy-1,8,2);g.fillRect(orb.x-1,oy-4,2,8);
      // Collect
      if(Math.hypot(ps.x-orb.x,ps.y-oy)<28){

        this.showDmgNum(orb.x,oy-20,`+${gain} HP`,'#ff4060');

  // Kill enemies to restore a little HP
  onEnemyKilledHeal(){
    const p=this.player;
    if(p.hp>=p.maxHp) return;
    const gain=Math.round(p.maxHp*0.04);
    p.hp=Math.min(p.maxHp,p.hp+gain);
    this.showDmgNum(p.spr.x,p.spr.y-36,`+${gain}`,`#80ff80`);
  }
  updateProjectiles(dt){
    const ps=this.player.spr;
    this.projectiles=this.projectiles.filter(pr=>{
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;
      if(pr.life<=0||pr.x<0||pr.x>this.worldW) return false;

      // Hit enemies/boss
      let hit=false;
      this.enemies.forEach(e=>{
        if(e.dead||hit) return;
        if(Math.abs(e.spr.x-pr.x)<22&&Math.abs(e.spr.y-pr.y)<28){
          this.hitEntity(e,pr.dmg,Math.sign(pr.vx),true);
          if(pr.splash) this.splashDmg(pr.x,pr.y,60,pr.dmg*0.5);
          hit=true;
        }
      });
      if(this.boss.active&&!this.boss.dead&&!hit){
        if(Math.abs(this.boss.spr.x-pr.x)<34&&Math.abs(this.boss.spr.y-pr.y)<40){
          this.hitBoss(pr.dmg,Math.sign(pr.vx));
          if(pr.splash) this.splashDmg(pr.x,pr.y,70,pr.dmg*0.5);
          hit=true;
        }
      }
      return !hit;
    });

    // Enemy projectiles
    this.enemyProjectiles=this.enemyProjectiles.filter(pr=>{
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;
      if(pr.life<=0||pr.x<0||pr.x>this.worldW) return false;
      if(Math.abs(ps.x-pr.x)<18&&Math.abs(ps.y-pr.y)<24){
        this.hitPlayer(pr.dmg);return false;
      }
      return true;
    });
  }

  splashDmg(x,y,r,dmg){
    this.enemies.forEach(e=>{
      if(e.dead) return;
      if(Math.hypot(e.spr.x-x,e.spr.y-y)<r) this.hitEntity(e,Math.round(dmg),0,true);
    });
    this.spawnHits(x,y,0x8040ff);
  }

  // ── ENEMY UPDATE ───────────────────────────────────────────────────────────
  updateEnemies(dt){
    const ps=this.player.spr;
    this.enemies.forEach(e=>{
      if(e.dead) return;
      const es=e.spr;
      if(e.frozen>0){e.frozen-=dt;es.setVelocityX(0);return;}
      if(e.knockback!==0){es.setVelocityX(e.knockback*140);e.knockback*=0.8;if(Math.abs(e.knockback)<0.1)e.knockback=0;return;}

      const dist=ps.x-es.x,abs=Math.abs(dist);
      e.dir=dist>0?1:-1;
      const leashDist=Math.abs(es.x-e.startX);
      const inChaseRange=abs<280&&leashDist<400;
      const returning=leashDist>420; // snap back to patrol

      // Wind-up before strike
      if(!e.windingUp) e.windingUp=false;
      if(!e.lungeT) e.lungeT=0;
      e.lungeT=Math.max(0,e.lungeT-dt);

      if(returning){
        // Return to patrol zone
        const rd=e.startX-es.x;
        es.setVelocityX(Math.sign(rd)*e.spd*0.7);
        e.windingUp=false;
      } else if(inChaseRange){
        if(e.ranged&&abs>90){
          // Stand and aim, then fire
          es.setVelocityX(0);
          e.projT-=dt;
          if(e.projT<=0){
            e.projT=2.0+Math.random();
            // Track player height
            const dy=ps.y-es.y;
            const spd=260;
            const vx=e.dir*spd;
            const vy=Math.max(-120,Math.min(80,dy));
            this.enemyProjectiles.push({x:es.x,y:es.y-12,vx,vy,dmg:e.dmg*0.7,life:1.5});
          }
        } else if(abs>50){
          // Chase player
          es.setVelocityX(e.spd*e.dir);
          e.windingUp=false;
        } else {
          // In melee range — wind up then lunge strike
          es.setVelocityX(0);
          e.atkT-=dt;
          if(!e.windingUp&&e.atkT<=0){
            e.windingUp=true;
            e.windTimer=0.4;
          }
          if(e.windingUp){
            e.windTimer-=dt;
            if(e.windTimer<=0){
              es.setVelocityX(e.dir*220);
              e.lungeT=0.18;
              e.windingUp=false;
              e.atkT=1.0+Math.random()*0.5;
              this.hitPlayer(e.dmg);
            }
          }
        }
      } else {
        // Patrol around start position
        if(es.x<e.startX-100)e.dir=1;
        if(es.x>e.startX+100)e.dir=-1;
        es.setVelocityX(e.spd*0.35*e.dir);
      }

      if(Math.abs(es.body.velocity.x)>5){e.wkT+=dt;if(e.wkT>0.13){e.wkT=0;e.wk=(e.wk+1)%4;}}
    });
  }

  // ── BOSS UPDATE ────────────────────────────────────────────────────────────
  updateBoss(dt){
    const b=this.boss,bs=b.spr,ps=this.player.spr;
    if(b.dead) return;
    if(!b.active&&ps.x>this.bossArenaX){
      b.active=true;
      this.bossTxt.setText(`⚔  ${this.ld.boss.name}  ⚔`);
      SFX.bossRoar();
      // Camera pan to boss then back
      this.bossEntrancePlaying=true;
      this.cameras.main.stopFollow();
      this.cameras.main.pan(bs.x,bs.y,900,'Sine.easeInOut',true,(_cam,prog)=>{
        if(prog>=1){
          this.time.delayedCall(700,()=>{
            this.cameras.main.pan(ps.x,ps.y,700,'Sine.easeInOut',true,(_c2,p2)=>{
              if(p2>=1){ this.cameras.main.startFollow(ps,true,0.09,0.09); this.bossEntrancePlaying=false; }
            });
          });
        }
      });
      this.cameras.main.shake(500,0.01);
      this.cameras.main.flash(400,80,0,0);
    }
    if(!b.active) return;
    if(b.knockback!==0){bs.setVelocityX(b.knockback*180);b.knockback=0;}

    b.phase=b.hp<b.maxHp/2?1:0;
    const spd=b.phase?90:55;
    const dist=ps.x-bs.x;
    b.dir=dist>0?1:-1;

    bs.setVelocityX(spd*b.dir);

    // Jump — much less frequent, only when stuck or in phase 2
    b.jumpT-=dt;
    const stuckOnGround=bs.body.blocked.down&&Math.abs(bs.body.velocity.x)<10;
    const jumpRate=b.phase?4.0:7.0;
    if(b.jumpT<=0&&bs.body.blocked.down){
      b.jumpT=jumpRate+Math.random()*3;
      // Only jump if player is elevated or boss is stuck
      if(this.player.spr.y<bs.y-40||stuckOnGround){
        bs.setVelocityY(-380);
      }
    }

    // Projectile attack (ranged bosses)
    if(['kraken','stefano','shadow'].includes(b.type)){
      b.projT-=dt;
      const rate=b.phase?1.0:1.8;
      if(b.projT<=0){
        b.projT=rate;
        this.enemyProjectiles.push({x:bs.x,y:bs.y-20,vx:b.dir*300,vy:-60,dmg:18,life:1.5});
        if(b.phase) this.enemyProjectiles.push({x:bs.x,y:bs.y-20,vx:b.dir*260,vy:-120,dmg:14,life:1.5});
      }
    }

    // Melee
    if(Math.abs(dist)<50&&Math.abs(bs.y-ps.y)<60){
      b.atkT-=dt;if(b.atkT<=0){b.atkT=b.phase?0.7:1.0;this.hitPlayer(b.phase?24:16);}
    }

    b.wkT+=dt;if(b.wkT>0.09){b.wkT=0;b.wk=(b.wk+1)%4;}
  }

  // ── COMPANION UPDATE ───────────────────────────────────────────────────────
  updateCompanion(dt){
    const comp=this.companion;
    if(!comp) return;
    const cd=COMPANIONS[SAVE.companion];

    // Respawn logic
    if(comp.dead){
      comp.respawnT-=dt;
      if(comp.respawnT<=0){
        comp.dead=false;comp.hp=cd.maxHp;
        comp.spr.setX(this.player.spr.x-60);
        comp.spr.setY(this.groundY-30);
      }
      return;
    }

    const cs=comp.spr, ps=this.player.spr;
    if(comp.invTimer>0) comp.invTimer-=dt;

    // Cooldown recharge
    if(comp.onCooldown){
      comp.cooldownT-=dt;
      if(comp.cooldownT<=0){ comp.onCooldown=false; comp.charges=cd.chargeMax; }
    }

    // Follow player
    const tx=ps.x-70*this.player.dir;
    const dx=tx-cs.x;
    cs.setVelocityX(Math.sign(dx)*Math.min(Math.abs(dx)*3,160));
    if(Math.abs(dx)>220) cs.setX(ps.x-80*this.player.dir);

    // Take damage from nearby enemies
    if(comp.invTimer<=0){
      this.enemies.forEach(e=>{
        if(e.dead) return;
        if(Math.hypot(e.spr.x-cs.x,e.spr.y-cs.y)<40){
          comp.hp-=e.dmg*0.6;
          comp.invTimer=1.2;
          this.spawnHits(cs.x,cs.y,0xff8040);
        }
      });
      if(this.boss.active&&!this.boss.dead){
        if(Math.hypot(this.boss.spr.x-cs.x,this.boss.spr.y-cs.y)<60){
          comp.hp-=12;comp.invTimer=1.0;
          this.spawnHits(cs.x,cs.y,0xff8040);
        }
      }
      if(comp.hp<=0){
        comp.dead=true;comp.respawnT=15;
        comp.gfx.clear();
        this.showDmgNum(cs.x,cs.y-30,'Companion down! 15s..','#ff8040');
        return;
      }
    }

    // Auto attack — only if not on cooldown and has charges
    comp.atkT-=dt;
    if(comp.atkT<=0&&!comp.onCooldown&&comp.charges>0){
      let nearest=null,nd=cd.atkRange;
      this.enemies.forEach(e=>{
        if(e.dead) return;
        const d=Math.hypot(e.spr.x-cs.x,e.spr.y-cs.y);
        if(d<nd){nd=d;nearest=e;}
      });
      if(!nearest&&this.boss.active&&!this.boss.dead){
        const d=Math.hypot(this.boss.spr.x-cs.x,this.boss.spr.y-cs.y);
        if(d<cd.atkRange) nearest={spr:this.boss.spr};
      }
      if(nearest){
        comp.atkT=cd.atkRate;
        comp.charges--;
        if(comp.charges<=0){ comp.onCooldown=true; comp.cooldownT=cd.cooldown; }

        const dir=Math.sign(nearest.spr.x-cs.x)||1;
        if(cd.ranged){
          this.projectiles.push({x:cs.x,y:cs.y-10,vx:dir*320,vy:0,dmg:cd.atkDmg,color:cd.projColor,life:0.9,splash:false,r:5,owner:'companion'});
        } else {
          // Mermaid freeze aura
          this.enemies.forEach(e=>{ if(!e.dead&&Math.hypot(e.spr.x-cs.x,e.spr.y-cs.y)<cd.atkRange) e.frozen=2.0; });
          this.spawnHits(cs.x,cs.y,0x00ffcc);
        }
      }
    }

    comp.wkT+=dt;if(comp.wkT>0.13){comp.wkT=0;comp.wk=(comp.wk+1)%4;}

  companionAttack(){
    const comp=this.companion;
    if(!comp||comp.dead||comp.onCooldown||comp.charges<=0) return;
    const cd=COMPANIONS[SAVE.companion];
    const cs=comp.spr,dir=this.player.dir;

  updateVignette(){
    const g=this.vignetteGfx;g.clear();
    const hpPct=this.player.hp/this.player.maxHp;
    if(hpPct<0.35){
      const pulse=0.5+Math.sin(this.t*4)*(0.35-hpPct)*3;
      const intensity=Math.min(0.5,(1-hpPct/0.35)*0.4+pulse*0.12);
      for(let i=0;i<10;i++){
        const a=intensity*(1-i/10)*0.7;
        g.fillStyle(0xff0000,a);
        g.fillRect(0,i*5,W,5);g.fillRect(0,H-i*5-5,W,5);
        g.fillRect(i*5,0,5,H);g.fillRect(W-i*5-5,0,5,H);

    g.fillStyle(progPct>0.8?0xff4040:progPct>0.5?0xffa040:0x40c060,0.65);

  // ── MOUNTS ─────────────────────────────────────────────────────────────────
  updateMount(dt){
    const p=this.player;
    if(!p.mount||!MOUNTS[p.mount]) return;
    const m=MOUNTS[p.mount],ps=p.spr;

    // Tick mount ability cooldown
    if(p.mountAbilityCD>0) p.mountAbilityCD-=dt;

    // Tiger pounce landing — damage on impact
    if(p.tigerPouncing&&ps.body.blocked.down){
      p.tigerPouncing=false;
      this.cameras.main.shake(150,0.005);
      this.enemies.forEach(e=>{
        if(!e.dead&&Math.abs(e.spr.x-ps.x)<70) this.hitEntity(e,rnd(18,28),Math.sign(ps.x-e.spr.x)*-1,true);
      });
      this.spawnHits(ps.x,ps.y,0xd06010);
    }

    // Dragon mount — damage enemies on contact
    if(m.contactDmg){
      p.mountContactTimer=(p.mountContactTimer||0)-dt;
      if(p.mountContactTimer<=0){
        p.mountContactTimer=0.8;
        this.enemies.forEach(e=>{
          if(!e.dead&&Math.hypot(e.spr.x-ps.x,e.spr.y-ps.y)<50){
            this.hitEntity(e,rnd(12,18),Math.sign(ps.x-e.spr.x)*-1,true);
            this.spawnHits(e.spr.x,e.spr.y,0xff4400);
          }
        });
      }
    }

    // Unicorn sparkle trail
    if(m.sparkle&&Math.abs(ps.body.velocity.x)>20){
      p.mountSparkles=(p.mountSparkles||[]);
      p.mountSparkles.push({x:ps.x+rnd(-8,8),y:ps.y+rnd(10,20),life:0.6,col:Math.random()>0.5?0xff80ff:0xc0c0ff});
    }
    if(p.mountSparkles){
      const g=this.fxGfx;
      p.mountSparkles=p.mountSparkles.filter(s=>{
        s.life-=dt*2;if(s.life<=0) return false;
        g.fillStyle(s.col,s.life*0.7);g.fillCircle(s.x,s.y,3*s.life);
        s.y-=dt*20;
        return true;
      });
    }

    // Worm — warp cooldown
    if(m.burrow) p.mountWormCooldown=Math.max(0,(p.mountWormCooldown||0)-dt);
  }

  useMountAbility(player){
    const m=player.mount;
    if(!m||!MOUNTS[m]) return;
    const ps=player.spr;
    if(player.mountAbilityCD>0) return;

    switch(m){
      case 'worm':{
        // Burrow underground — disappear, move forward, emerge
        player.mountAbilityCD=8;
        player.inv=true;player.invTimer=1.5;
        const startX=ps.x, dir=player.dir;
        // Visual: sink into ground
        this.tweens.add({targets:ps,y:this.groundY+30,duration:300,onComplete:()=>{
          // Move underground
          ps.setX(startX+dir*200);
          this.spawnHits(ps.x,this.groundY,0x6a3a08);
          // Damage enemies near emergence
          this.enemies.forEach(e=>{
            if(!e.dead&&Math.abs(e.spr.x-ps.x)<60) this.hitEntity(e,rnd(25,40),dir,true);
          });
          // Emerge
          this.tweens.add({targets:ps,y:this.groundY-40,duration:250,onComplete:()=>{
            this.spawnHits(ps.x,this.groundY,0x8a4a08);
            this.cameras.main.shake(200,0.006);
          }});
        }});
        this.showDmgNum(ps.x,ps.y-50,'BURROW!','#8a4a08');
        SFX.land();

      }
      case 'tiger':{

        player.mountAbilityCD=5;
        ps.setVelocityX(player.dir*600);ps.setVelocityY(-300);

      case 'unicorn':{

        player.mountAbilityCD=6;

        this.enemies.forEach(e=>{
          if(!e.dead&&Math.hypot(e.spr.x-ps.x,e.spr.y-ps.y)<150){
            e.knockback=Math.sign(e.spr.x-ps.x)*8;
            this.spawnHits(e.spr.x,e.spr.y,0xff80ff);
          }
        });
        for(let i=0;i<12;i++) this.hitParticles.push({x:ps.x+rnd(-30,30),y:ps.y+rnd(-30,10),vx:(Math.random()-0.5)*4,vy:Math.random()*-4-1,life:1,col:0xff80ff,r:rnd(3,6)});
        this.showDmgNum(ps.x,ps.y-50,'+HEAL BURST','#ff80ff');
        SFX.levelUp();
        break;
      }
      case 'dragon_mount':{
        // Fire breath — projectile burst forward
        player.mountAbilityCD=4;
        for(let i=0;i<3;i++){
          this.time.delayedCall(i*100,()=>{
            this.projectiles.push({x:ps.x+player.dir*20,y:ps.y-15,vx:player.dir*520,vy:(i-1)*80,dmg:rnd(20,30),color:0xff6600,life:0.8,splash:true,r:9,owner:'player'});
          });
        }
        this.showDmgNum(ps.x,ps.y-50,'FIRE!','#ff6600');
        SFX.bossRoar();

  useSuperpower(player,skinKey){
    const sp=SUPERPOWERS[skinKey];
    if(!sp||player.superCD>0) return;
    player.superActive=true;
    player.superCD=sp.cooldown;
    const ps=player.spr;

    switch(skinKey){
      case 'alvano':{
        // Shadow Clone
        player.superTimer=8;
        player.clone={x:ps.x+player.dir*30,y:ps.y,dir:-player.dir,atkTimer:0,life:8};
        this.showDmgNum(ps.x,ps.y-60,'Shadow Clone!','#8040c0');
        SFX.shadowDash();
        break;
      }
      case 'liam':{
        // Time Slow — slow all enemies
        player.superTimer=5;
        player.timeSlowActive=true;
        this.enemies.forEach(e=>{e._savedSpd=e.spd;e.spd=Math.round(e.spd*0.3);});
        if(this.boss.active&&!this.boss.dead){this.boss._savedSpd=this.boss.spd;this.boss.spd=Math.round(this.boss.spd*0.3);}
        this.cameras.main.flash(300,100,150,255,false);
        this.showDmgNum(ps.x,ps.y-60,'TIME SLOW!','#40c0ff');
        SFX.staffCast();
        break;
      }
      case 'levi':{
        // Nature's Fury — 3 falling tree trunks
        player.superTimer=2;
        player.fallingTrunks=[];
        for(let i=0;i<3;i++){
          const tx=ps.x+player.dir*(60+i*80);
          player.fallingTrunks.push({x:tx,y:-60,vy:600,hit:false});
          this.time.delayedCall(i*200,()=>{
            this.spawnHits(tx,this.groundY-20,0x40c020);
          });
        }
        this.showDmgNum(ps.x,ps.y-60,'NATURES FURY!','#40ff40');
        SFX.vineSnare();
        break;
      }
      case 'roar':{
        // Apex Predator — invincible + 3x damage
        player.superTimer=4;
        player.inv=true;player.invTimer=4;
        player.apexActive=true;
        this.cameras.main.flash(400,255,200,0,false);
        this.showDmgNum(ps.x,ps.y-60,'APEX PREDATOR!','#ffd060');
        SFX.sonicRoar();
        break;
      }
      case 'vampirina':{
        // Drain Life
        player.superTimer=3;
        const range=240;
        let totalDrain=0;
        this.enemies.forEach(e=>{
          if(e.dead) return;
          const d=Math.hypot(e.spr.x-ps.x,e.spr.y-ps.y);
          if(d<range){
            const drain=rnd(15,30);
            this.hitEntity(e,drain,0,true);
            totalDrain+=drain;
            this.spawnHits(e.spr.x,e.spr.y,0xff2040);
          }
        });
        if(totalDrain>0){
          player.hp=Math.min(player.maxHp,player.hp+Math.round(totalDrain*0.5));
          this.showDmgNum(ps.x,ps.y-60,`Drain +${Math.round(totalDrain*0.5)}HP`,'#ff2040');
        }
        SFX.bossRoar();
        break;
      }
      case 'marcel':{
        // Thunderstorm — 5 lightning bolts strike from sky
        player.superTimer=3;
        player.superActive=true;
        player.superCD=SUPERPOWERS.marcel.cooldown;
        player.thunderbolts=[];
        // Pick targets — random enemies or positions
        const targets=[];
        const aliveEnemies=this.enemies.filter(e=>!e.dead);
        for(let i=0;i<5;i++){
          if(aliveEnemies.length>0){
            const tgt=aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
            targets.push({x:tgt.spr.x,y:tgt.spr.y,enemy:tgt});
          } else {
            targets.push({x:ps.x+rnd(-200,200),y:this.groundY-20,enemy:null});
          }
        }
        targets.forEach((tgt,i)=>{
          this.time.delayedCall(i*350,()=>{
            // Lightning bolt
            player.thunderbolts=(player.thunderbolts||[]);
            player.thunderbolts.push({x:tgt.x,life:0.5,y0:0,y1:tgt.y});
            // Damage
            if(tgt.enemy&&!tgt.enemy.dead) this.hitEntity(tgt.enemy,rnd(35,55),0,true);
            if(this.boss.active&&!this.boss.dead&&Math.abs(this.boss.spr.x-tgt.x)<60) this.hitBoss(rnd(25,40),0);
            // Area damage
            this.enemies.forEach(e=>{if(!e.dead&&Math.abs(e.spr.x-tgt.x)<40)this.hitEntity(e,rnd(15,25),0,true);});
            // Screen flash
            this.cameras.main.flash(120,255,238,100,false);
            playTone(220,0.3,'sawtooth',0.2); playNoise(0.2,0.2,400);
            this.cameras.main.shake(200,0.007);
            this.spawnHits(tgt.x,tgt.y,0xffee00);
          });
        });
        this.showDmgNum(ps.x,ps.y-60,'THUNDERSTORM!','#ffee00');
        break;
      }
    }
  }

  updateSuperpower(dt){
    const p=this.player,ps=p.spr;
    if(!p.superActive) return;
    p.superTimer-=dt;

    // Alvano clone
    if(p.clone&&SAVE.skin==='alvano'){
      p.clone.life-=dt;
      if(p.clone.life<=0){p.clone=null;}
      else{
        p.clone.atkTimer-=dt;
        if(p.clone.atkTimer<=0){
          p.clone.atkTimer=0.6;
          const ax=p.clone.x+p.clone.dir*50;
          this.enemies.forEach(e=>{if(!e.dead&&Math.abs(e.spr.x-ax)<50&&Math.abs(e.spr.y-p.clone.y)<50)this.hitEntity(e,rnd(14,22),p.clone.dir,true);});
          if(this.boss.active&&!this.boss.dead&&Math.abs(this.boss.spr.x-ax)<50)this.hitBoss(rnd(14,22),p.clone.dir);
        }
        p.clone.x+=p.clone.dir*80*dt;
        if(p.clone.x>this.worldW-50||p.clone.x<50) p.clone.dir*=-1;
        // Draw clone
        const g=this.charGfx;
        g.fillStyle(0x6020a0,0.35+Math.sin(this.t*6)*0.15);
        g.fillRect(p.clone.x-8,p.clone.y-22,16,44);
        g.fillCircle(p.clone.x,p.clone.y-34,9);
        g.fillStyle(0xc080ff,0.5);g.fillCircle(p.clone.x+p.clone.dir*4,p.clone.y-34,2.5);
      }
    }

    // Liam time slow screen tint
    if(p.timeSlowActive&&SAVE.skin==='liam'){
      const g=this.vignetteGfx;
      g.fillStyle(0x0020ff,0.04+Math.sin(this.t*3)*0.02);
      g.fillRect(0,0,W,H);
      // Restore speed when done
      if(p.superTimer<=0){
        p.timeSlowActive=false;
        this.enemies.forEach(e=>{if(e._savedSpd){e.spd=e._savedSpd;delete e._savedSpd;}});
        if(this.boss.active&&this.boss._savedSpd){this.boss.spd=this.boss._savedSpd;delete this.boss._savedSpd;}
      }
    }

    // Levi falling trunks
    if(p.fallingTrunks&&p.fallingTrunks.length){
      const g=this.charGfx;
      p.fallingTrunks.forEach(trunk=>{
        trunk.y+=trunk.vy*dt;
        // Draw trunk
        g.fillStyle(0x5a3010,0.95);g.fillRect(trunk.x-8,trunk.y,16,60);
        g.fillStyle(0x3a2008,0.6);g.fillRect(trunk.x-8,trunk.y,16,4);
        // Impact on ground
        if(!trunk.hit&&trunk.y>this.groundY-60){
          trunk.hit=true;
          this.cameras.main.shake(200,0.006);
          this.spawnHits(trunk.x,this.groundY,0x40c020);
          this.enemies.forEach(e=>{if(!e.dead&&Math.abs(e.spr.x-trunk.x)<40)this.hitEntity(e,rnd(30,50),Math.sign(e.spr.x-trunk.x)||1,true);});
          if(this.boss.active&&!this.boss.dead&&Math.abs(this.boss.spr.x-trunk.x)<50)this.hitBoss(rnd(20,35),Math.sign(this.boss.spr.x-trunk.x)||1);
        }
      });
      p.fallingTrunks=p.fallingTrunks.filter(t=>t.y<this.groundY+40);
    }

    // King Roar apex — golden glow
    if(p.apexActive&&SAVE.skin==='roar'){
      const g=this.fxGfx;
      g.fillStyle(0xffd060,0.08+Math.sin(this.t*6)*0.05);g.fillCircle(ps.x,ps.y-20,40);
      if(p.superTimer<=0) p.apexActive=false;
    }

    // Vampirina — orbiting bats
    if(SAVE.skin==='vampirina'){
      if(!p.bats||p.bats.length===0){
        p.bats=Array.from({length:5},(_,i)=>({angle:i*1.256,r:35,speed:3+i*0.5}));
      }
      const g=this.charGfx;
      p.bats.forEach(bat=>{
        bat.angle+=bat.speed*dt;
        const bx=ps.x+Math.cos(bat.angle)*bat.r;
        const by=ps.y-20+Math.sin(bat.angle)*bat.r*0.5;
        g.fillStyle(0x200030,0.9);
        g.fillTriangle(bx-6,by,bx,by-5,bx+6,by);
        g.fillTriangle(bx-9,by-2,bx,by+3,bx-3,by-7);
        g.fillTriangle(bx+9,by-2,bx,by+3,bx+3,by-7);
        g.fillStyle(0xff2040,0.9);g.fillCircle(bx,by-2,2);
        // Bat attacks nearby enemies
        this.enemies.forEach(e=>{if(!e.dead&&Math.hypot(e.spr.x-bx,e.spr.y-by)<20)this.hitEntity(e,rnd(4,8),0,true);});
      });
    }

    if(p.superTimer<=0){ p.superActive=false; if(p.bats) p.bats=[]; }
  }

  endSuperpower(player,skinKey){
    if(skinKey==='liam'&&player.timeSlowActive){
      player.timeSlowActive=false;
      this.enemies.forEach(e=>{if(e._savedSpd){e.spd=e._savedSpd;delete e._savedSpd;}});
    }
    if(skinKey==='roar') player.apexActive=false;
    if(player.bats) player.bats=[];
  }

  // ── RIVER CURRENT ──────────────────────────────────────────────────────────
  updateRiverCurrent(dt){
    if(this.ld.bg!=='river') return;
    const ps=this.player.spr;
    // River flows in the middle section — push player
    if(ps.y>this.groundY-80){
      ps.setVelocityX(ps.body.velocity.x-60*dt); // gentle downstream push
    }
    // Moving log platforms
    if(this.logPlatforms){
      this.logPlatforms.forEach(lp=>{
        lp.x-=lp.speed*dt;
        if(lp.x<-100) lp.x=this.worldW+100;
        lp.body.setX(lp.x);lp.body.reset(lp.x,lp.y);
      });
    }
  }

  updateP2Ghost(dt){
    if(!this.p2||!this.p2.dead) return;
    const remain=Math.ceil(10-this.p2respawnTimer);
    if(this.p2respawnTimer>=10){
      this.p2respawnTimer=0;this.p2.dead=false;this.p2.hp=this.p2.maxHp;
      this.p2.spr.setX(this.player.spr.x+40);this.p2.spr.setY(this.player.spr.y);
      if(this._ghostTxt){this._ghostTxt.destroy();this._ghostTxt=null;}
      this.showDmgNum(this.player.spr.x,this.player.spr.y-50,`${MP.p2name} respawned!`,'#40c0ff');
    } else {
      if(!this.p2ghost) this.p2ghost={x:this.player.spr.x+40,y:this.player.spr.y};
      this.p2ghost.x+=(this.player.spr.x+40-this.p2ghost.x)*dt*1.5;
      this.p2ghost.y+=(this.player.spr.y-this.p2ghost.y)*dt*1.5;
      const gx=this.p2ghost.x,gy=this.p2ghost.y+Math.sin(this.t*3)*8;
      this.charGfx.fillStyle(0x40c0ff,0.22+Math.sin(this.t*4)*0.1);this.charGfx.fillCircle(gx,gy,18);
      this.charGfx.fillStyle(0x40c0ff,0.5);this.charGfx.fillCircle(gx,gy-5,10);
      if(!this._ghostTxt) this._ghostTxt=this.add.text(0,0,'',{fontFamily:'monospace',fontSize:'10px',color:'#40c0ff'}).setOrigin(0.5).setDepth(12);
      this._ghostTxt.setPosition(gx,gy-30).setText(`${remain}s`);
    }
  }

  playerDied(){
    this.player.dead=true;

  drawBossChar(g){

    const wk=b.wk;

    if(b.phase===1){g.fillStyle(0xaa00ff,0.06+Math.sin(this.t*6)*0.04);g.fillCircle(x,y,65);}

    switch(b.type){
      case 'forestOgre':
        // Giant tree-ogre
        g.fillStyle(0x203810,1);

  drawHeart(){

    const pulse=Math.sin(t*3)*0.3;

  drawPortal(){
    const g=this.portalGfx;g.clear();
    if(!this.portalOpen) return;
    const x=this.portalX,y=this.portalY,t=this.t;
    const col=this.ld.portalColor;
    const spin=t*2;

    // Outer glow rings
    for(let r2=50;r2>=20;r2-=10){
      g.fillStyle(col,0.04+(50-r2)*0.004);
      g.fillCircle(x,y,r2+Math.sin(t*2)*4);
    }
    // Spinning ring
    for(let i=0;i<12;i++){
      const a=spin+i*0.524;
      g.fillStyle(col,0.5+Math.sin(a*2)*0.3);
      g.fillCircle(x+Math.cos(a)*36,y+Math.sin(a)*36,4+Math.sin(a+t)*2);
    }
    // Inner portal
    g.fillStyle(col,0.15+Math.sin(t*3)*0.08);g.fillCircle(x,y,28);
    g.fillStyle(0x000010,0.85);g.fillCircle(x,y,22);
    // Swirl inside
    for(let i=0;i<6;i++){
      const a=-spin*1.5+i*1.047;
      g.fillStyle(col,0.3+Math.sin(a)*0.2);
      g.fillCircle(x+Math.cos(a)*12,y+Math.sin(a)*12,4);
    }
    // Portal shimmer center
    g.fillStyle(0xffffff,0.1+Math.sin(t*5)*0.08);g.fillCircle(x,y,8);

    // Arrow pointing to portal
    const arrowY=y-70+Math.sin(t*3)*6;
    g.fillStyle(col,0.9);
    g.fillTriangle(x,arrowY+20,x-12,arrowY,x+12,arrowY);
    g.fillRect(x-4,arrowY-12,8,14);
  }

  drawThrownAxeGfx(g){
    const ax=this.thrownAxe;
    if(!ax) return;
    const x=ax.x,y=ax.y,a=ax.spin;
    const cos=Math.cos(a),sin=Math.sin(a);

    // Trail
    for(let i=1;i<=4;i++){
      g.fillStyle(0xc09040,0.15*i);
      g.fillCircle(x-ax.vx*0.002*i,y-ax.vy*0.002*i,6-i);
    }

    // Axe shape rotated
    // Handle
    const hx1=x+cos*-16,hy1=y+sin*-16;
    const hx2=x+cos*10, hy2=y+sin*10;
    g.lineStyle(4,0x6a3a10,1);
    g.lineBetween(hx1,hy1,hx2,hy2);

    // Blade — crescent shape built from 3 points rotated
    const bPerp={x:-sin,y:cos};
    const tipX=x+cos*14,tipY=y+sin*14;
    const backX=x+cos*4, backY=y+sin*4;
    const edgeX=tipX+bPerp.x*18,edgeY=tipY+bPerp.y*18;
    const beardX=backX+bPerp.x*14,beardY=backY+bPerp.y*14;

    g.fillStyle(0xa0b0c0,1);
    g.fillTriangle(tipX,tipY,edgeX,edgeY,backX,backY);
    g.fillTriangle(edgeX,edgeY,backX,backY,beardX,beardY);
    // Blade edge highlight
    g.lineStyle(2,0xd0e0f0,0.7);
    g.lineBetween(tipX,tipY,edgeX,edgeY);
    g.lineBetween(edgeX,edgeY,beardX,beardY);

    // Return glow when homing
    if(ax.returning){
      g.fillStyle(0xffd060,0.2+Math.sin(this.t*8)*0.15);
      g.fillCircle(x,y,18);
    }
  }

  bgOcean(g,cx){
    const t=this.t;
    // Deep night sky
    g.fillStyle(0x030c1a,1);g.fillRect(cx,0,W,H);

    // Stars low on horizon
    for(let i=0;i<28;i++){
      const sx=(i*131+cx*0.05)%W+cx,sy=10+i%5*20;
      g.fillStyle(0xffffff,0.2+Math.sin(t+i)*0.18);g.fillCircle(sx,sy,1);
    }
    // Moon reflection column
    g.fillStyle(0xf0e8c0,0.85);g.fillCircle(cx+W*0.82,38,20);
    // Moon shimmer on water
    for(let i=0;i<8;i++){
      const my=this.groundY-60+i*8,mw=6+i*4;
      g.fillStyle(0xf0e8c0,0.06-i*0.005);
      g.fillRect(cx+W*0.82-mw/2+Math.sin(t*2+i)*4,my,mw,5);
    }

    // Horizon haze
    g.fillStyle(0x0a3060,0.28);g.fillRect(cx,H*0.4,W,18);
    g.fillStyle(0x0a4080,0.12);g.fillRect(cx,H*0.38,W,12);

    // ── DEEP WATER BODY (below surface line) ──────────────────────────────
    const surfaceY=this.groundY-48;

    // Deep ocean base colour — gradient layers
    g.fillStyle(0x020c20,1);g.fillRect(cx,surfaceY,W,H-surfaceY);
    g.fillStyle(0x041828,0.8);g.fillRect(cx,surfaceY,W,(H-surfaceY)*0.5);
    g.fillStyle(0x061a30,0.4);g.fillRect(cx,surfaceY,W,(H-surfaceY)*0.25);

    // Underwater caustic light shafts (shimmer from above)
    for(let i=0;i<6;i++){
      const lx=cx+W*0.08+i*W*0.16+Math.sin(t*0.4+i)*20;
      const lw=20+Math.sin(t*0.7+i)*10;
      const la=0.03+Math.sin(t*0.8+i)*0.02;
      g.fillStyle(0x40a0ff,la);
      g.fillTriangle(lx-lw,surfaceY,lx+lw,surfaceY,lx+lw*0.3,surfaceY+80);
    }

    // Bioluminescent deep glow orbs
    for(let i=0;i<5;i++){
      const bx=(i*340+cx*0.8+t*18)%(this.worldW)+cx;
      const by=surfaceY+30+Math.sin(t*0.6+i)*20;
      g.fillStyle(0x00ffcc,0.03+Math.sin(t*1.5+i)*0.02);
      g.fillCircle(bx,by,35+Math.sin(t+i)*10);
      g.fillStyle(0x00ffcc,0.06);g.fillCircle(bx,by,12);
    }

    // Underwater bubbles rising
    for(let i=0;i<12;i++){
      const bx2=(i*180+cx*0.5+t*15)%(this.worldW)+cx;
      const by2=surfaceY+15+((t*30+i*40)%(H-surfaceY-10));
      g.fillStyle(0x80c0ff,0.12+Math.sin(t*4+i)*0.08);
      g.fillCircle(bx2,by2,1.5+Math.sin(i)*1);
    }

    // ── SURFACE & WAVES ───────────────────────────────────────────────────

    // Surface base — the sea floor level highlight
    g.fillStyle(0x0a4a80,0.35);g.fillRect(cx,surfaceY-4,W,10);

    // Large swell waves (slow, deep)
    for(let wi=0;wi<5;wi++){
      const wx=(wi*380+t*22)%(this.worldW)+cx;
      const wy=surfaceY-14+Math.sin(t*0.4+wi)*7;
      g.fillStyle(0x0a5090,0.22);
      g.fillEllipse(wx,wy,320,24);
    }

    // Mid waves (medium speed)
    for(let wi=0;wi<9;wi++){
      const wx=(wi*210+t*38)%(this.worldW)+cx;
      const wy=surfaceY-8+Math.sin(t*0.7+wi)*6;
      g.fillStyle(0x1060a0,0.28);
      g.fillEllipse(wx,wy,170,14);
      // Crest highlight
      g.fillStyle(0x60b0ff,0.1);
      g.fillEllipse(wx+8,wy-4,110,5);
    }

    // Small choppy waves on surface
    for(let wi=0;wi<16;wi++){
      const wx=(wi*115+t*58)%(this.worldW)+cx;
      const wy=surfaceY-3+Math.sin(t*1.2+wi*0.8)*4;
      g.fillStyle(0x2080c0,0.2);
      g.fillEllipse(wx,wy,90,8);
    }

    // Foam / white caps on wave peaks
    for(let wi=0;wi<12;wi++){
      const wx=(wi*155+t*48)%(this.worldW)+cx;
      const wy=surfaceY-12+Math.sin(t*0.9+wi)*8;
      g.fillStyle(0xffffff,0.07+Math.sin(t*2+wi)*0.04);
      g.fillEllipse(wx,wy,60+Math.sin(wi)*20,4);
    }

    // Surface shimmer line
    for(let i=0;i<W;i+=7){
      const sy2=surfaceY+Math.sin(i*0.04+t*1.5)*4;
      g.fillStyle(0x80d0ff,0.06+Math.sin(i*0.08+t)*0.04);
      g.fillRect(cx+i,sy2,5,2);
    }

    // Sea floor / ground — sandy dark ocean bed
    g.fillStyle(0x060e1a,1);g.fillRect(cx,this.groundY,this.worldW,62);
    g.fillStyle(0x0a2030,0.5);g.fillRect(cx,this.groundY,this.worldW,5);
    // Sea floor texture — rocks and sand
    for(let i=0;i<20;i++){
      const rx=(i*220+cx*0.7)%(this.worldW)+cx;
      g.fillStyle(0x081828,0.6);
      g.fillEllipse(rx,this.groundY+12,rnd(20,50),rnd(8,16));
    }

    // Water over floor — shallow glow
    g.fillStyle(0x0a3050,0.25);g.fillRect(cx,this.groundY-20,this.worldW,22);
  }

  bgJungle(g,cx,deep){
    const t=this.t;
    const skyCol=deep?0x020a04:0x041208;
    g.fillStyle(skyCol,1);g.fillRect(cx,0,W,H);

    // Canopy glow — filtered light through leaves
    for(let i=0;i<8;i++){
      const lx=cx+W*0.05+i*W*0.13+Math.sin(t*0.3+i)*15;
      g.fillStyle(deep?0x204010:0x308020,0.04+Math.sin(t*0.5+i)*0.02);
      g.fillRect(lx,0,W*0.08,H*0.6);
    }

    // Far canopy layer
    for(let i=0;i<22;i++){
      const tx=(i*130+cx*0.2)%this.worldW;
      const th=H*0.18+Math.sin(i*0.9)*H*0.06;
      g.fillStyle(deep?0x061a04:0x0a2808,0.85);
      g.fillEllipse(tx,H*0.12,th*2.2,th*1.4);
    }

    // Mid canopy — denser, different greens
    for(let i=0;i<28;i++){
      const tx=(i*105+cx*0.45)%this.worldW;
      const th=H*0.14+Math.sin(i*1.1)*H*0.05;
      g.fillStyle(deep?0x082008:0x0e3410,0.9);
      g.fillEllipse(tx,H*0.18,th*2.5,th*1.6);
    }

    // Large jungle trees with visible roots
    for(let i=0;i<14;i++){
      const tx=(i*180+cx*0.65)%this.worldW;
      const th=H*0.45+Math.sin(i)*H*0.1;

      g.fillRect(tx-8,H*0.55-th,16,th);

    // STATIC BACKGROUND ANIMALS

      g.fillEllipse(mx,my+12,12,14); // body
      g.fillStyle(0x4a2810,0.7);
      g.fillCircle(mx-6,my-2,5); // ear

    }

      g.fillStyle(0x20c020,0.7); // green wing
      g.fillEllipse(px+4,py,8,12);
      g.fillStyle(0xffc020,0.8); // yellow head
      g.fillCircle(px,py-10,5);
      g.fillStyle(0x202020,0.8); g.fillCircle(px+2,py-11,1.5); // eye

    // Butterflies drifting

      const bx=cx+W*0.1+i*W*0.16+Math.sin(t*1.2+i)*30;

      g.fillEllipse(bx-6,by,10+wing*4,7);
      g.fillEllipse(bx+6,by,10+wing*4,7);
      g.fillStyle(0x202020,0.6);g.fillRect(bx-1,by-5,2,10);

    // Fireflies/glowbugs at ground level
    for(let i=0;i<16;i++){
      const fx=(i*195+t*12+cx*0.8)%this.worldW;
      const fy=this.groundY-20+Math.sin(t*2+i)*18;

      g.fillCircle(fx,fy,2.5);

    // Ground — rich jungle floor
    g.fillStyle(deep?0x060e04:0x0a1808,1);g.fillRect(cx,this.groundY,this.worldW,62);
    // Moss/fern at ground level
    g.fillStyle(deep?0x103010:0x1a4010,0.4);g.fillRect(cx,this.groundY,this.worldW,8);
    // Fallen leaves texture
    for(let i=0;i<24;i++){
      const lx=(i*200+cx*0.6)%this.worldW;

  bgRiver(g,cx){
    const t=this.t;
    // Lush green sky / overcast

    // Far rolling hills
    for(let i=0;i<W+100;i+=8){

    // ── WATERFALL (background, fixed position) ────────────────────────────────
    const wfX=cx+W*0.5,wfTop=0,wfBot=H*0.42;
    // Cliff edge
    g.fillStyle(0x1a3010,1);g.fillRect(wfX-40,wfTop,80,wfBot-30);
    // Waterfall curtain
    for(let i=0;i<5;i++){
      const wx=wfX-18+i*8,drift=Math.sin(t*2+i)*3;
      g.fillStyle(0x60c0ff,0.22+Math.sin(t*3+i)*0.08);
      g.fillRect(wx+drift,wfTop+10,5,wfBot-40);
    }
    // Mist at base
    g.fillStyle(0x80d0ff,0.15+Math.sin(t*2)*0.06);
    g.fillEllipse(wfX,wfBot-10,100,28);

    // ── RIVER ─────────────────────────────────────────────────────────────────
    const riverTop=this.groundY-55,riverH=55+62;
    // Deep water
    g.fillStyle(0x0a3060,1);g.fillRect(cx,riverTop,W*4,riverH);
    // River current lines (animated)
    for(let i=0;i<14;i++){
      const rx=(i*220-t*80+cx)%((this.worldW+220))-220+cx;
      const ry=riverTop+8+i%3*14+Math.sin(t+i)*4;
      g.fillStyle(0x2080c0,0.25+Math.sin(t*1.5+i)*0.12);
      g.fillEllipse(rx,ry,140+Math.sin(t+i)*30,8);
    }
    // Surface shimmer
    for(let i=0;i<20;i++){
      const sx=(i*170-t*60+cx)%((this.worldW+170))-170+cx;
      const sy=riverTop+Math.sin(t*1.2+i*0.5)*6;
      g.fillStyle(0x80d0ff,0.08+Math.sin(t*2+i)*0.05);
      g.fillEllipse(sx,sy,80,4);
    }
    // Underwater caustic glimmers
    for(let i=0;i<8;i++){
      const gx=(i*340+cx*0.8)%(this.worldW)+cx;
      g.fillStyle(0x40c0ff,0.04+Math.sin(t*2+i)*0.03);
      g.fillCircle(gx,riverTop+30,20+Math.sin(t+i)*8);
    }

    // ── LOG PLATFORMS (visual only — physics handled separately) ──────────────
    if(!this._logPositions){
      this._logPositions=[];
      for(let i=0;i<6;i++) this._logPositions.push({x:400+i*400,speed:25+i*5,phase:i*0.8});
    }
    this._logPositions.forEach(lp=>{
      lp.x-=lp.speed*0.016;
      if(lp.x<cx-120) lp.x=cx+W+100;
      const ly=riverTop+8,lw=90,lh=16;
      // Log body
      g.fillStyle(0x5a3010,1);g.fillRect(lp.x-lw/2,ly,lw,lh);
      // Log rings
      g.fillStyle(0x4a2808,0.6);
      g.fillEllipse(lp.x-lw/2+8,ly+lh/2,14,lh*0.8);
      g.fillEllipse(lp.x+lw/2-8,ly+lh/2,14,lh*0.8);
      // Moss
      g.fillStyle(0x2a5010,0.5);g.fillRect(lp.x-lw/2+4,ly,lw-8,4);
      // Water ripple
      g.fillStyle(0x40a0e0,0.15);g.fillEllipse(lp.x,ly+lh+6,lw+20,10);
    });

    // River creatures (decorative fish jumps)
    for(let i=0;i<3;i++){
      const fx=(i*700+t*40+cx)%(this.worldW)+cx;
      const ft=((t*0.8+i)%2);
      if(ft<0.3){
        const fy=riverTop+5-Math.sin(ft*Math.PI/0.3)*20;
        g.fillStyle(0xff8030,0.8);
        g.fillEllipse(fx,fy,14,6);
        g.fillTriangle(fx-7,fy,fx-14,fy-5,fx-14,fy+5);
      }
    }

    // River banks
    g.fillStyle(0x1a3a10,1);g.fillRect(cx,riverTop-8,this.worldW,12);
    g.fillStyle(0x1a3a10,1);g.fillRect(cx,this.groundY,this.worldW,62);
    // Bank texture
    g.fillStyle(0x2a5018,0.4);g.fillRect(cx,riverTop-8,this.worldW,5);
    g.fillStyle(0x2a5018,0.4);g.fillRect(cx,this.groundY,this.worldW,5);

    // ── BRIDGE ────────────────────────────────────────────────────────────────
    const bridgeX=this.worldW*0.5,bridgeW=160;
    g.fillStyle(0x5a3a10,1);g.fillRect(bridgeX-bridgeW/2,riverTop-8,bridgeW,14);
    // Bridge planks
    g.fillStyle(0x3a2008,0.5);
    for(let i=0;i<8;i++) g.fillRect(bridgeX-bridgeW/2+i*(bridgeW/8),riverTop-8,bridgeW/8-2,14);
    // Rails
    g.fillStyle(0x5a3a10,1);
    g.fillRect(bridgeX-bridgeW/2,riverTop-20,bridgeW,4);
    for(let i=0;i<=8;i++) g.fillRect(bridgeX-bridgeW/2+i*(bridgeW/8),riverTop-20,3,12);

    // Trees on banks
    for(let i=0;i<16;i++){
      const tx=(i*180+cx*0.5)%(this.worldW),th=60+Math.sin(i)*25,tw=22;
      const ty=riverTop-8;
      g.fillStyle(0x0c2008,0.9);
      g.fillTriangle(tx,ty-th,tx-tw,ty,tx+tw,ty);
      g.fillTriangle(tx,ty-th*0.65,tx-tw*1.3,ty-th*0.22,tx+tw*1.3,ty-th*0.22);
      g.fillRect(tx-4,ty-th*0.22,8,th*0.24);
    }
  }

  bgMountain(g,cx){
    const t=this.t;
    g.fillStyle(0x040810,1);g.fillRect(cx,0,W,H);
    for(let i=0;i<44;i++){const sx=(i*125+cx*0.05)%W+cx,sy=8+i%7*26;g.fillStyle(0xffffff,0.28+Math.sin(t*0.5+i)*0.28);g.fillCircle(sx,sy,1+Math.sin(i)*0.4);}
    for(let i=0;i<8;i++){const px=(i*176+cx*0.18)%this.worldW+cx,ph=H*0.35+Math.sin(i)*H*0.08;g.fillStyle(0x0a1428,0.88);g.fillTriangle(px,H*0.5-ph,px-W*0.1,H*0.55,px+W*0.1,H*0.55);g.fillStyle(0xd0e0f0,0.28);g.fillTriangle(px,H*0.5-ph,px-W*0.032,H*0.5-ph*0.6,px+W*0.032,H*0.5-ph*0.6);}
    this.snowFlakes.forEach(s=>{s.y+=s.vy;s.x+=s.vx;if(s.y>H)s.y=0;g.fillStyle(0xd0e8ff,0.6);g.fillCircle(s.x,s.y,s.r);});
    g.fillStyle(0x060c1e,1);g.fillRect(cx,this.groundY,this.worldW,62);g.fillStyle(0x8090b0,0.1);g.fillRect(cx,this.groundY,this.worldW,4);
  }

  bgVolcano(g,cx){
    const t=this.t;
    // Dark orange/red sky
    g.fillStyle(0x200404,1);g.fillRect(cx,0,W,H);

    // Ash clouds in sky
    for(let i=0;i<8;i++){
      const acx=cx+W*0.1+i*W*0.12+Math.sin(t*0.2+i)*20;
      const acy=H*0.1+Math.sin(t*0.15+i)*15;
      g.fillStyle(0x402020,0.25+Math.sin(t*0.3+i)*0.1);
      g.fillEllipse(acx,acy,120+Math.sin(t+i)*20,40+Math.sin(t*0.7+i)*12);
    }

    // Volcano in background
    const vx=cx+W*0.5,vbase=H*0.55;
    g.fillStyle(0x200806,1);
    g.fillTriangle(vx,H*0.08,vx-W*0.22,vbase,vx+W*0.22,vbase);
    // Crater glow
    g.fillStyle(0xff4400,0.35+Math.sin(t*1.5)*0.15);
    g.fillEllipse(vx,H*0.1,60,22);
    g.fillStyle(0xff8800,0.5+Math.sin(t*2)*0.2);
    g.fillEllipse(vx,H*0.1,28,12);
    // Lava streams down volcano
    for(let i=0;i<4;i++){
      const lx=vx-12+i*8+Math.sin(t+i)*4;
      const la=0.4+Math.sin(t*2+i)*0.2;
      g.fillStyle(0xff4400,la);
      g.fillRect(lx,H*0.12,4,H*0.35+Math.sin(t+i)*10);
    }

    // Lava eruption particles (slow)
    for(let i=0;i<6;i++){
      const et=(t*0.4+i*0.17)%1;
      const ex=vx+Math.sin(i*2.1)*30;
      const ey=H*0.08-et*H*0.3;
      if(et<0.5){
        g.fillStyle(0xff6600,0.8-et*0.8);
        g.fillCircle(ex,ey,5+et*3);
      }
    }

    // Distant lava lake (background)
    g.fillStyle(0xff3300,0.25);g.fillRect(cx,H*0.55,W,H*0.08);
    for(let i=0;i<8;i++){
      const lx2=(i*150-t*30+cx)%(W+150)-150+cx;
      g.fillStyle(0xff6600,0.15+Math.sin(t*2+i)*0.1);
      g.fillEllipse(lx2,H*0.58,100,14);
    }

    // Rocky terrain mid (larger steps = fewer draw calls)
    g.fillStyle(0x1a0604,1);
    for(let i=0;i<W;i+=18){
      const ry=H*0.6+Math.sin(i*0.03+1.5)*20+Math.sin(i*0.015)*15;
      g.fillRect(cx+i,ry,18,H-ry);
    }

    // Lava floor — glowing cracks (fixed positions, no rnd per frame)
    g.fillStyle(0x280802,1);g.fillRect(cx,this.groundY,this.worldW,62);
    const crackSeeds=[40,80,140,170,220,260,310,360,400,440,480,520,560,610,650,690,730,770];
    crackSeeds.forEach((seed,i)=>{
      const cx2=(seed*4+cx*0.6)%(this.worldW)+cx;
      const cw=20+seed%40; // fixed width per crack
      g.fillStyle(0xff4400,0.3+Math.sin(t*3+i)*0.2);
      g.fillRect(cx2,this.groundY,cw,3);
      g.fillStyle(0xff8800,0.15+Math.sin(t*4+i)*0.1);
      g.fillRect(cx2,this.groundY,Math.floor(cw*0.5),6);
    });

    // Floating ember particles (deterministic, no random per frame)
    for(let i=0;i<16;i++){
      const ex2=(i*190+t*25+cx)%(this.worldW)+cx;
      const ey2=this.groundY-20-((t*40+i*30)%(H*0.5));
      g.fillStyle(0xff6600,0.5+Math.sin(t*4+i)*0.3);
      g.fillCircle(ex2,ey2,1.5+Math.sin(t+i));
    }
  }

  bgPeak(g,cx){
    const t=this.t;g.fillRect(cx,0,W,H);
    for(let i=0;i<5;i++){const sx=cx+W*0.2+i*W*0.15+Math.cos(t*0.4+i)*50,sy=H*0.25+Math.sin(t*0.3+i)*40;g.fillStyle(0x8800cc,0.04+Math.sin(t*0.6+i)*0.03);g.fillCircle(sx,sy,50+Math.sin(t+i)*18);}
    g.fillStyle(0xff2288,0.1+Math.sin(t*2)*0.05);g.fillCircle(this.heartX,this.heartY-30,55);
    this.snowFlakes.forEach(s=>{s.y+=s.vy;s.x+=s.vx;if(s.y>H)s.y=0;g.fillStyle(0xaa44ff,0.4);g.fillCircle(s.x,s.y,s.r);});
    g.fillStyle(0x0c0220,1);g.fillRect(cx,this.groundY,this.worldW,62);
    for(let i=0;i<10;i++){const kx=(i*230+cx*0.7)%(this.worldW)+cx;g.fillStyle(0xaa44ff,0.18+Math.sin(t*3+i)*0.12);g.fillCircle(kx,this.groundY+rnd(-8,2),2+Math.sin(t+i));}
  }

  // ── PARTICLES ──────────────────────────────────────────────────────────────
  spawnHits(x,y,col){
    for(let i=0;i<8;i++) this.hitParticles.push({x,y,vx:(Math.random()-0.5)*5,vy:Math.random()*-4.5-0.5,life:1,col,r:Math.random()*4+2});
  }

  showDmgNum(x,y,val,color){
    const t=this.add.text(x,y,`${val}`,{fontFamily:'monospace',fontSize:'14px',color,stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(50);
    this.tweens.add({targets:t,y:y-42,alpha:0,duration:850,onComplete:()=>t.destroy()});
  }

  updateParticles(){
    const g=this.fxGfx;g.clear();
    this.hitParticles=this.hitParticles.filter(p=>{
      p.life-=0.038;p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;
      if(p.life<=0) return false;
      g.fillStyle(p.col,p.life*0.85);g.fillCircle(p.x,p.y,p.r*p.life);
      return true;
    });
    // Proj trails
    this.projectiles.forEach(pr=>{g.fillStyle(pr.color,0.3);g.fillCircle(pr.x-pr.vx*0.025,pr.y,pr.r*0.5||3);});
    this.enemyProjectiles.forEach(pr=>{g.fillStyle(0xff6000,0.25);g.fillCircle(pr.x-pr.vx*0.025,pr.y,5);});
  }

  playerDied(){
    this.player.dead=true;
    this.cameras.main.shake(600,0.016);
    this.cameras.main.fade(1300,0,0,0);
    this.time.delayedCall(1500,()=>this.scene.start('Death',{level:this.levelIndex}));
  }
}

// DEATH + TIPS
// ═══════════════════════════════════════════════════════════════════════════════
const TIPS = [
  { tip:'Kill enemies to restore a little HP after each fight — keep moving.', icon:'⚔' },
  { tip:'Hold ATK with the War Axe to charge a throw. It returns like Thor\'s hammer.', icon:'🪓' },
  { tip:'The Shield blocks 70% of damage. Hold C while equipped to raise it.', icon:'🛡' },
  { tip:'Companions have limited charges before cooldown. Save them for bosses.', icon:'🐉' },
  { tip:'Ranged enemies aim at your height. Jump to dodge their projectiles.', icon:'🏹' },
  { tip:'Buy HP Orbs in the shop — they appear as collectibles in the next level.', icon:'❤' },
  { tip:'Enemies return to patrol if you run far enough. Use this to heal.', icon:'🏃' },
  { tip:'The Magic Staff has splash damage — great for groups of enemies.', icon:'✨' },
  { tip:'Bosses enter Phase 2 at half HP — they get faster and more aggressive.', icon:'💀' },
  { tip:'XP and gear are never lost on death. Grind enemies to upgrade before bosses.', icon:'⭐' },
  { tip:'The Mermaid companion freezes nearby enemies — perfect for tight spaces.', icon:'🧜' },
  { tip:'Walk into the glowing portal after defeating the boss to reach the shop.', icon:'🌀' },
  { tip:'Combo 3+ hits in a row for bonus shake damage and screen effects.', icon:'💥' },
  { tip:'The Elven Bow deals consistent damage from safety — great for bosses.', icon:'🏹' },
  { tip:'Chain Mail and Magic Armour reduce damage taken — worth saving XP for.', icon:'🛡' },
];

class DeathScene extends Phaser.Scene {
  constructor(){super('Death');}
  init(d){this.levelIndex=d.level;}
  create(){
    const tip=TIPS[Math.floor(Math.random()*TIPS.length)];
    const bg=this.add.graphics();
    bg.fillStyle(0x000000,0.97);bg.fillRect(0,0,W,H);
    // Red dramatic top
    bg.fillStyle(0x1a0000,1);bg.fillRect(0,0,W,H*0.38);
    bg.lineStyle(2,0x600000,0.7);bg.lineBetween(0,H*0.38,W,H*0.38);

    this.add.text(W/2,H*0.1,'YOU FELL',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'44px',color:'#e03030',stroke:'#600000',strokeThickness:4,shadow:{x:0,y:0,color:'#e03030',blur:30,fill:true}}).setOrigin(0.5);
    this.add.text(W/2,H*0.24,`Score: ${SAVE.score}`,{fontFamily:'monospace',fontSize:'16px',color:'#c9a84c'}).setOrigin(0.5);

    // XP banked
    bg.fillStyle(0x001a00,0.8);bg.fillRoundedRect(W/2-160,H*0.32,320,28,6);
    this.add.text(W/2,H*0.345,`✓  XP ${SAVE.xp} banked  ·  Gear saved`,{fontFamily:'monospace',fontSize:'12px',color:'#40ff80'}).setOrigin(0.5);

    // Tip box
    bg.fillStyle(0x0a0818,0.95);bg.fillRoundedRect(40,H*0.44,W-80,H*0.32,10);
    bg.lineStyle(1,0x5a3d80,0.8);bg.strokeRoundedRect(40,H*0.44,W-80,H*0.32,10);

    this.add.text(W/2,H*0.47,'— BATTLE TIP —',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'11px',color:'#c9a84c',letterSpacing:4}).setOrigin(0.5);
    this.add.text(W/2,H*0.52,tip.icon,{fontSize:'28px'}).setOrigin(0.5);
    this.add.text(W/2,H*0.61,tip.tip,{fontFamily:'monospace',fontSize:'12px',color:'#e8dcc8',wordWrap:{width:W-120},align:'center'}).setOrigin(0.5);

    const r=this.add.text(W/2,H*0.84,'— Try Again —',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'16px',color:'#c9a84c'}).setOrigin(0.5);
    this.tweens.add({targets:r,alpha:{from:0.2,to:1},duration:700,yoyo:true,repeat:-1});
    this.add.text(W/2,H*0.93,'[ TAP or PRESS ANY KEY ]',{fontFamily:'monospace',fontSize:'11px',color:'#4a3a5a'}).setOrigin(0.5);

    SAVE.softReset();
    SFX.death();
    stopAmbient();
    this.time.delayedCall(600,()=>{
      this.input.keyboard.once('keydown',()=>this.scene.start('Game',{level:this.levelIndex}));
      this.input.once('pointerdown',()=>this.scene.start('Game',{level:this.levelIndex}));
    });
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// WIN
// ═══════════════════════════════════════════════════════════════════════════════
class WinScene extends Phaser.Scene {
  constructor(){super('Win');}
  init(d){
    this.score=d.score||0;this.xp=d.xp||0;
    if(this.score>SAVE.highScore) SAVE.highScore=this.score;
  }
  create(){
    this.t=0;this.bg=this.add.graphics();
    this.add.text(W/2,H*0.14,'✦ HARMONY RESTORED ✦',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'26px',color:'#c9a84c',stroke:'#4a2000',strokeThickness:2}).setOrigin(0.5);
    this.add.text(W/2,H*0.3,'Alvano retrieved the Heart of the Forest.',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'14px',color:'#e8dcc8'}).setOrigin(0.5);
    this.add.text(W/2,H*0.4,'Sonaria is free. Your mother will live.',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'14px',color:'#e8dcc8'}).setOrigin(0.5);
    this.add.text(W/2,H*0.5,'Stefano was never heard from again.',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'13px',color:'#8a6a9a'}).setOrigin(0.5);
    this.add.text(W/2,H*0.62,`Final Score: ${this.score}   Total XP: ${this.xp}`,{fontFamily:'monospace',fontSize:'18px',color:'#c9a84c'}).setOrigin(0.5);
    const r=this.add.text(W/2,H*0.8,'— Play Again —',{fontFamily:"'Cinzel Decorative',cursive",fontSize:'16px',color:'#c9a84c'}).setOrigin(0.5);
    this.tweens.add({targets:r,alpha:{from:0.2,to:1},duration:800,yoyo:true,repeat:-1});
    this.pts=Array.from({length:70},()=>({x:rnd(0,W),y:rnd(0,H),vy:-Math.random()*1-0.3,r:Math.random()*3+0.5,ph:Math.random()*Math.PI*2,col:Math.random()>0.5?0xc9a84c:0xff88cc}));
    this.input.keyboard.once('keydown',()=>{SAVE.reset();this.scene.start('Title');});
    this.input.once('pointerdown',()=>{SAVE.reset();this.scene.start('Title');});
  }
  update(){
    this.t+=0.016;const g=this.bg;g.clear();
    g.fillStyle(0x060010,1);g.fillRect(0,0,W,H);
    this.pts.forEach(p=>{p.y+=p.vy;if(p.y<-5)p.y=H+5;g.fillStyle(p.col,0.5+Math.sin(this.t*2+p.ph)*0.4);g.fillCircle(p.x,p.y,p.r);});
  }
}

// LAUNCH

new Phaser.Game({
  type:Phaser.AUTO,
  width:W,height:H,
  backgroundColor:'#000000',
  parent:'game-container',
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:[BootScene,TitleScene,IntroScene,DifficultyScene,ModeScene,OnlineLobbyScene,SkinScene,ShopScene,GameScene,DeathScene,WinScene]
});
