// ── AUDIO ENGINE ────────────────────────────────────────────
// Initialised inside the start button click (only reliable
// way to unlock AudioContext on Chrome/Safari/iOS)
let AC = null;
let masterGain = null;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(AC.destination);
}

function playTone(freq, type, dur, vol, startTime) {
  if (!AC) return;
  var t = startTime !== undefined ? startTime : AC.currentTime;
  var osc = AC.createOscillator();
  var g = AC.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime((vol || 0.3), t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t + dur + 0.01);
}

// ── ONLINE / SUPABASE ────────────────────────────────────────
var SB = null; // Supabase client
var SB_CHANNEL = null;
var SB_SEND_TICK = 0;
var SB_SEND_INTERVAL = 50; // ms (~20/sec)

function sbInit() {
  if (typeof supabase === 'undefined') return;
  if (typeof SUPABASE_URL === 'undefined') return;
  SB = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function sbJoinRoom(code, isHost, onEvent) {
  if (!SB) return;
  if (SB_CHANNEL) { SB.removeChannel(SB_CHANNEL); SB_CHANNEL = null; }
  SB_CHANNEL = SB.channel('sonaria_room_' + code, { config: { broadcast: { self: false } } });
  SB_CHANNEL.on('broadcast', { event: '*' }, function(payload) {
    if (onEvent) onEvent(payload);
  }).subscribe();
  GS.online = true;
  GS.isHost = isHost;
  GS.roomCode = code;
}

function sbSend(type, data) {
  if (!SB_CHANNEL) return;
  SB_CHANNEL.send({ type: 'broadcast', event: type, payload: data });
}

function sbLeave() {
  if (SB_CHANNEL) { SB.removeChannel(SB_CHANNEL); SB_CHANNEL = null; }
  GS.online = false;
}

// ── HELPER UTILITIES ─────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function hexToRGB(hex) {
  return { r: (hex >> 16) & 0xff, g: (hex >> 8) & 0xff, b: hex & 0xff };
}

// ── FILL-ONLY BORDER HELPER ──────────────────────────────────
// Draws a border as 4 fillRect calls. No lineStyle, no stroke.
function fillBorder(g, x, y, w, h, thickness, color) {
  g.fillStyle(color, 1);
  g.fillRect(x, y, w, thickness);              // top
  g.fillRect(x, y + h - thickness, w, thickness); // bottom
  g.fillRect(x, y, thickness, h);              // left
  g.fillRect(x + w - thickness, y, thickness, h); // right
}

// ── GLOW HELPER (fill circles, no stroke) ────────────────────
function fillGlow(g, x, y, radius, color, alpha) {
  g.fillStyle(color, alpha);
  g.fillCircle(x, y, radius);
}

function drawMount(g, mountId, x, y, t) {

    g.fillEllipse(x, y - 10, 44, 26);

    g.fillRect(x + 14, y - 22, 18, 14);
    // spikes
    g.fillStyle(0xff6600, 1);
    g.fillTriangle(x - 8, y - 28, x - 2, y - 28, x - 5, y - 40);
    g.fillTriangle(x,     y - 28, x + 6, y - 28, x + 3, y - 38);
    g.fillTriangle(x + 8, y - 28, x + 14,y - 28, x + 11,y - 36);
  } else if (mountId === 'worm') {
    // segments
    var si, sx, sc;

      g.fillCircle(sx + Math.sin(t * 4 + si) * 2, y - 8, 9);

    g.fillCircle(x + 22, y - 10, 11);

    g.fillRect(x - 16, y - 4 + legSwing, 5, 14);
    g.fillRect(x - 6,  y - 4 - legSwing, 5, 14);
    g.fillRect(x + 2,  y - 4 + legSwing, 5, 14);
    g.fillRect(x + 12, y - 4 - legSwing, 5, 14);
    // head
    g.fillStyle(0xe87820, 1);
    g.fillRect(x + 14, y - 22, 16, 16);
    g.fillStyle(0xf0b060, 1);
    g.fillRect(x + 17, y - 18, 8, 10);

}

// ── BOSS VISUALS ─────────────────────────────────────────────
function drawBoss(g, level, bx, by, hp, maxHp, t) {
  var boss = LEVELS[level].boss;
  var col = boss.color;
  var pulseR = Math.sin(t * 4) * 3;
  if (level === 0) { // Forest Ogre
    g.fillStyle(0x3d5c1e, 1);
    g.fillRect(bx - 30, by - 80, 60, 60);
    g.fillStyle(0x4a7a2a, 1);
    g.fillRect(bx - 28, by - 78, 56, 56);
    g.fillStyle(0x5c3d1e, 1);
    g.fillRect(bx - 25, by - 20, 20, 20);
    g.fillRect(bx + 5, by - 20, 20, 20);
    g.fillStyle(0x4a7a2a, 1);
    g.fillRect(bx - 28, by - 80, 56, 24);
    g.fillStyle(0x1a3d00, 1);
    g.fillRect(bx - 10, by - 66, 8, 8);
    g.fillRect(bx + 2, by - 66, 8, 8);
    g.fillStyle(0x8b3a00, 1);
    g.fillRect(bx - 8, by - 56, 16, 6);
    // club
    g.fillStyle(0x5c3d1e, 1);
    g.fillRect(bx + 32, by - 80 + Math.sin(t*2)*8, 10, 40);
    g.fillEllipse(bx + 37, by - 82 + Math.sin(t*2)*8, 20, 16);
  } else if (level === 1) { // Great Kraken
    // body
    g.fillStyle(0x204060, 1);
    g.fillEllipse(bx, by - 50, 80, 60);
    // tentacles
    var ti, ta, tr, tx2, ty2;
    for (ti = 0; ti < 8; ti++) {
      ta = (ti / 8) * Math.PI * 2 + t * 1.5;
      tr = 44 + Math.sin(t * 3 + ti) * 8;
      tx2 = bx + Math.cos(ta) * tr;
      ty2 = by - 30 + Math.sin(ta) * tr * 0.5;
      g.fillStyle(0x1a3550, 1);
      g.fillEllipse(tx2, ty2, 12, 12);
    }
    // eyes
    g.fillStyle(0xff4400, 1);
    g.fillCircle(bx - 20, by - 56, 10 + pulseR * 0.5);
    g.fillCircle(bx + 20, by - 56, 10 + pulseR * 0.5);
    g.fillStyle(0x1a0000, 1);
    g.fillCircle(bx - 20, by - 56, 5);
    g.fillCircle(bx + 20, by - 56, 5);
  } else if (level === 2) { // River Serpent
    // coiled body
    var ri, rx, ry;
    for (ri = 0; ri < 10; ri++) {
      rx = bx + Math.cos(ri * 0.7 + t) * (20 + ri * 4);
      ry = by - 20 + Math.sin(ri * 0.7 + t) * 16;
      g.fillStyle(0x207040, 1);
      g.fillCircle(rx, ry, 14 - ri);
    }
    // head
    g.fillStyle(0x2d9050, 1);
    g.fillEllipse(bx + 50, by - 40, 36, 24);
    g.fillStyle(0xff4400, 1);
    g.fillCircle(bx + 58, by - 44, 5);
    // forked tongue
    g.fillStyle(0xff2200, 1);
    g.fillRect(bx + 64, by - 40, 12, 2);
    g.fillRect(bx + 74, by - 43, 6, 2);
    g.fillRect(bx + 74, by - 39, 6, 2);
  } else if (level === 3) { // Jungle Queen (spider)
    // abdomen
    g.fillStyle(0x8b2252, 1);
    g.fillEllipse(bx - 10, by - 20, 50, 38);
    // thorax + head
    g.fillStyle(0x6d1a3e, 1);
    g.fillEllipse(bx + 24, by - 44, 30, 26);
    // 8 legs
    var li2, la, llx, lly, lsx, lsy;
    for (li2 = 0; li2 < 8; li2++) {
      la = ((li2 / 8) * Math.PI * 1.6 - 0.3) + (li2 >= 4 ? 0.3 : 0);
      llx = bx + 14 + Math.cos(la) * 40;
      lly = by - 30 + Math.sin(la + t * 2 + li2 * 0.4) * 14;
      g.fillStyle(0x4d0a2a, 1);
      g.fillRect(bx + 14, by - 30, (llx - bx - 14) * 0.5, 5);
      g.fillRect(bx + 14 + (llx - bx - 14) * 0.5, by - 30 + (lly - by + 30) * 0.5, (llx - bx - 14) * 0.5, 5);
    }
    // 8 eyes
    var ei;
    for (ei = 0; ei < 8; ei++) {
      g.fillStyle(0xff2288, 1);
      g.fillCircle(bx + 16 + (ei % 4) * 5, by - 48 + Math.floor(ei / 4) * 6, 3 + pulseR * 0.3);
    }
  } else if (level === 4) { // Venom Drake
    // serpentine body
    g.fillStyle(0x3d7a1a, 1);
    g.fillEllipse(bx - 10, by - 30, 60, 40);
    // wings
    g.fillStyle(0x2d5a10, 0.85);
    g.fillTriangle(bx - 10, by - 40, bx - 60, by - 80 + Math.sin(t*3)*10, bx - 10, by - 10);
    g.fillTriangle(bx + 10, by - 40, bx + 60, by - 80 + Math.sin(t*3)*10, bx + 10, by - 10);
    // head
    g.fillStyle(0x4a9020, 1);
    g.fillRect(bx + 22, by - 50, 30, 22);
    // venom drip
    g.fillStyle(0x88ff44, 0.8);
    g.fillRect(bx + 44, by - 30 + Math.sin(t*5)*4, 3, 8);
    g.fillCircle(bx + 45, by - 22 + Math.sin(t*5)*4, 4);
    // eyes
    g.fillStyle(0x00ff44, 1);
    g.fillCircle(bx + 30, by - 42, 5 + pulseR * 0.3);
    g.fillCircle(bx + 42, by - 42, 5 + pulseR * 0.3);
  } else if (level === 5) { // Blizzard Giant
    // body
    g.fillStyle(0xa0b0c8, 1);
    g.fillRect(bx - 35, by - 100, 70, 80);
    // ice armour plates
    g.fillStyle(0xc8d8f0, 0.7);
    g.fillRect(bx - 33, by - 98, 30, 24);
    g.fillRect(bx + 3, by - 98, 30, 24);
    g.fillRect(bx - 33, by - 70, 66, 24);
    // arms
    g.fillStyle(0x8898b0, 1);
    g.fillRect(bx - 60 + Math.sin(t*2)*6, by - 88, 28, 20);
    g.fillRect(bx + 32, by - 88 + Math.sin(t*2)*6, 28, 20);
    // head
    g.fillStyle(0xb0c0d8, 1);
    g.fillRect(bx - 24, by - 124, 48, 30);
    // ice crown
    g.fillStyle(0xd0e8ff, 1);
    g.fillTriangle(bx - 22, by - 124, bx - 14, by - 124, bx - 18, by - 140);

  } else if (level === 6) { // Lava Beast

    g.fillRect(bx - 32, by - 88, 64, 70);
    // lava cracks
    g.fillStyle(0xff4400, 0.8);
    g.fillRect(bx - 20, by - 80, 6, 30);
    g.fillRect(bx + 4, by - 70, 6, 40);
    g.fillRect(bx - 28, by - 50, 56, 6);
    // glow
    g.fillStyle(0xff6600, 0.2 + Math.sin(t*3)*0.1);
    g.fillRect(bx - 36, by - 92, 72, 78);
    // arms
    g.fillStyle(0x881800, 1);
    g.fillRect(bx - 64, by - 80 + Math.sin(t*1.5)*10, 36, 18);
    g.fillRect(bx + 28, by - 80 + Math.sin(t*1.5+1)*10, 36, 18);
    // head
    g.fillStyle(0x882200, 1);
    g.fillRect(bx - 24, by - 110, 48, 28);
    // magma eyes
    g.fillStyle(0xff8800, 1);
    g.fillCircle(bx - 10, by - 96, 8 + pulseR * 0.5);
    g.fillCircle(bx + 10, by - 96, 8 + pulseR * 0.5);
    // lava drip glow
    g.fillStyle(0xff2200, 0.7);
    g.fillCircle(bx - 22, by - 20 + Math.sin(t*6)*5, 5);
    g.fillCircle(bx + 22, by - 20 + Math.sin(t*4)*5, 5);
  } else if (level === 7) { // Stefano (final boss)
    // dark cloak
    g.fillStyle(0x220044, 0.95);
    g.fillRect(bx - 28, by - 90, 56, 72);
    // robe pattern
    g.fillStyle(0x440088, 0.6);
    g.fillTriangle(bx - 28, by - 18, bx + 28, by - 18, bx, by - 90);
    // energy aura
    var ai;
    for (ai = 0; ai < 8; ai++) {
      g.fillStyle(0x8800ff, 0.12 + Math.sin(t*3+ai)*0.06);
      g.fillCircle(bx + Math.cos(ai*0.785+t*2)*36, by - 50 + Math.sin(ai*0.785+t*2)*24, 8 + pulseR);
    }
    // head
    g.fillStyle(0xd0c0e0, 1);
    g.fillRect(bx - 16, by - 112, 32, 26);
    // hood
    g.fillStyle(0x1a0033, 1);
    g.fillRect(bx - 18, by - 114, 36, 10);
    g.fillTriangle(bx - 18, by - 114, bx + 18, by - 114, bx, by - 130);

    g.fillStyle(0x00ff88, 1);
    g.fillCircle(bx - 6, by - 100, 5 + pulseR * 0.5);
    g.fillCircle(bx + 6, by - 100, 5 + pulseR * 0.5);

    g.fillStyle(0x00cc66, 0.3 + Math.sin(t*4)*0.15);

    g.fillStyle(0x00ff88, 0.8);
    g.fillCircle(bx, by - 128, 12 + pulseR * 0.5);
    g.fillStyle(0xffffff, 0.9);
    g.fillCircle(bx, by - 128, 6);
  }
  // boss HP bar — fill only
  var barW = 120;
  var barH = 8;
  var barX = bx - barW / 2;
  var barY = by - 140;
  var hpFrac = clamp(hp / maxHp, 0, 1);
  // bg
  g.fillStyle(0x220000, 1);
  g.fillRect(barX, barY, barW, barH);
  // fill
  g.fillStyle(0xe04040, 1);
  g.fillRect(barX, barY, barW * hpFrac, barH);
  // border (4 fillRect)
  fillBorder(g, barX, barY, barW, barH, 1, 0x880000);
}

// ── ENEMY VISUALS ────────────────────────────────────────────
function drawEnemy(g, type, x, y, hp, maxHp, t) {
  var hpFrac = clamp(hp / maxHp, 0, 1);
  if (type === 'goblin') {
    g.fillStyle(0x4a7a2a, 1);
    g.fillRect(x - 7, y - 28, 14, 18);
    g.fillRect(x - 6, y - 42, 12, 14);
    g.fillStyle(0x2d5c10, 1);
    g.fillRect(x - 4, y - 36, 4, 4);
    g.fillRect(x, y - 36, 4, 4);
    g.fillStyle(0xb06030, 1);
    g.fillRect(x - 8, y - 10, 6, 10);
    g.fillRect(x + 2, y - 10, 6, 10);
    // ears
    g.fillStyle(0x4a7a2a, 1);
    g.fillTriangle(x - 8, y - 42, x - 4, y - 42, x - 8, y - 52);
    g.fillTriangle(x + 4, y - 42, x + 8, y - 42, x + 8, y - 52);
  } else if (type === 'skeleton') {
    g.fillStyle(0xe0e0d0, 1);
    g.fillRect(x - 6, y - 28, 12, 18);
    g.fillRect(x - 5, y - 42, 10, 14);
    // ribs
    g.fillStyle(0xb0b0a0, 1);
    g.fillRect(x - 5, y - 26, 10, 2);
    g.fillRect(x - 5, y - 22, 10, 2);
    g.fillRect(x - 5, y - 18, 10, 2);
    // eye sockets
    g.fillStyle(0x1a1a00, 1);
    g.fillRect(x - 4, y - 38, 3, 4);
    g.fillRect(x + 1, y - 38, 3, 4);
    g.fillStyle(0xe0e0d0, 1);
    g.fillRect(x - 6, y - 10, 5, 10);
    g.fillRect(x + 1, y - 10, 5, 10);
  } else if (type === 'bat') {
    var bf = Math.sin(t * 8) * 5;
    g.fillStyle(0x4a1a4a, 0.9);
    g.fillTriangle(x - 6, y - 14, x - 22, y - 14 - bf, x - 6, y - 4);
    g.fillTriangle(x + 6, y - 14, x + 22, y - 14 - bf, x + 6, y - 4);
    g.fillStyle(0x6a2a6a, 1);
    g.fillCircle(x, y - 10, 8);
    g.fillStyle(0xff2288, 0.9);
    g.fillCircle(x - 3, y - 12, 2);
    g.fillCircle(x + 3, y - 12, 2);
  } else if (type === 'snake') {
    var si2, ssx, ssy;
    for (si2 = 0; si2 < 6; si2++) {
      ssx = x - 20 + si2 * 8 + Math.sin(t*3+si2*0.8)*3;
      ssy = y - 6;
      g.fillStyle(0x3d7a1a, 1);
      g.fillCircle(ssx, ssy, 6);
    }
    g.fillStyle(0x4a9020, 1);
    g.fillEllipse(x + 26, y - 10, 16, 10);
    g.fillStyle(0xff4400, 1);
    g.fillCircle(x + 30, y - 12, 2);
  }
  // small HP bar
  var sbW = 30;
  g.fillStyle(0x440000, 1);
  g.fillRect(x - 15, y - 50, sbW, 4);
  g.fillStyle(0xe04040, 1);
  g.fillRect(x - 15, y - 50, sbW * hpFrac, 4);
}

// ── PROJECTILE VISUALS ───────────────────────────────────────
function drawProjectile(g, type, x, y, dir, charge, t) {
  if (type === 'arrow') {
    g.fillStyle(0x8b5e3c, 1);
    g.fillRect(x - 8 * dir, y - 1, 16, 2);
    g.fillStyle(0xc0c0d0, 1);
    g.fillTriangle(x + 6 * dir, y - 4, x + 6 * dir, y + 4, x + 12 * dir, y);
    if (charge && charge > 0.5) {
      g.fillStyle(0xffee44, 0.5 + charge * 0.4);
      g.fillCircle(x, y, 6 * charge);
    }
  } else if (type === 'thrown_axe') {
    var angle = t * 8;
    var cs = Math.cos(angle);
    var sn = Math.sin(angle);
    g.fillStyle(0x808090, 1);
    g.fillRect(x - 6, y - 6, 12, 12);
    g.fillStyle(0xc0c0d0, 1);
    g.fillRect(x - 2, y - 10, 4, 6);
  } else if (type === 'staff_orb') {
    g.fillStyle(0x8844cc, 0.7);
    g.fillCircle(x, y, 10);
    g.fillStyle(0xee88ff, 0.9);
    g.fillCircle(x, y, 6);
    g.fillStyle(0xffffff, 0.8);
    g.fillCircle(x - 2, y - 2, 3);
    // homing glow
    g.fillStyle(0xcc44ff, 0.2);
    g.fillCircle(x, y, 16 + Math.sin(t*6)*2);
  } else if (type === 'thunder_bolt') {
    g.fillStyle(0xffee44, 0.9);
    g.fillRect(x - 2, y, 4, 20);
    g.fillStyle(0xffffff, 0.7);
    g.fillRect(x - 1, y, 2, 20);
    g.fillStyle(0xffee44, 0.3);
    g.fillCircle(x, y + 10, 8);
  } else if (type === 'vine') {
    var vi, vx, vy;
    for (vi = 0; vi < 5; vi++) {
      vx = x + Math.sin(vi * 0.6 + t * 4) * 4;
      vy = y + vi * 6;
      g.fillStyle(0x3d7a3d, 1);
      g.fillCircle(vx, vy, 4);
    }
  }
}

// ── PARTICLE SYSTEM ──────────────────────────────────────────
// All particles stored in a pool. No Math.random in draw loop.
// Seed stored at spawn time.
var PARTICLES = [];
var P_MAX = 200;

function spawnParticle(x, y, vx, vy, color, life, size, alpha) {
  var i;
  for (i = 0; i < P_MAX; i++) {
    if (!PARTICLES[i] || PARTICLES[i].dead) {
      PARTICLES[i] = {
        x: x, y: y, vx: vx, vy: vy,
        color: color, life: life, maxLife: life,
        size: size || 4, alpha: alpha !== undefined ? alpha : 1,
        dead: false
      };
      return;
    }
  }
}

function spawnHitParticles(x, y, color) {
  var ang, spd, px, py;
  for (var i = 0; i < 6; i++) {
    ang = (i / 6) * Math.PI * 2;
    spd = 60 + (i * 17) % 60;
    spawnParticle(x, y, Math.cos(ang)*spd, Math.sin(ang)*spd - 40, color, 0.4, 3, 0.9);
  }
}

function spawnXpParticles(x, y) {
  for (var i = 0; i < 5; i++) {
    var ang = (i / 5) * Math.PI * 2;
    spawnParticle(x, y, Math.cos(ang)*40, Math.sin(ang)*40 - 60, C.xp, 0.8, 4, 1);
  }
}

function updateParticles(dt) {
  var p;
  for (var i = 0; i < P_MAX; i++) {
    p = PARTICLES[i];
    if (!p || p.dead) continue;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 120 * dt;
    p.life -= dt;
    if (p.life <= 0) p.dead = true;
  }
}

function drawParticles(g) {
  var p, a;
  for (var i = 0; i < P_MAX; i++) {
    p = PARTICLES[i];
    if (!p || p.dead) continue;
    a = clamp(p.life / p.maxLife, 0, 1) * p.alpha;
    g.fillStyle(p.color, a);
    g.fillCircle(p.x, p.y, p.size);
  }
}
